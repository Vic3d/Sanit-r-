<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schutzeichel Backoffice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', hover: '#2d3a4d' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { background: #334155; color: #f1f5f9; }
    .tab-inactive { color: #94a3b8; }
    .tab-inactive:hover { color: #cbd5e1; background: #1e293b; }
    .badge-nord { background: #991b1b; color: #fca5a5; }
    .badge-ost { background: #1e3a5f; color: #93c5fd; }
    .badge-contacted { background: #065f46; color: #6ee7b7; }
    .badge-open { background: #991b1b; color: #fca5a5; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    .expand-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .expand-content.open { max-height: 2000px; }
    .progress-bar { background: #334155; border-radius: 9999px; height: 8px; }
    .progress-fill { border-radius: 9999px; height: 8px; transition: width 0.5s ease; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-dot { animation: pulse-dot 1.5s infinite; }
    input[type="text"] { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    input[type="text"]::placeholder { color: #64748b; }
    input[type="text"]:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(96,165,250,0.2); }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-7xl mx-auto px-4 py-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🔧</span>
        <h1 class="text-xl font-bold text-white">Schutzeichel Backoffice</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="lastUpdate" class="text-sm text-slate-400"></span>
        <button onclick="loadData(true)" id="refreshBtn"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
          Aktualisieren
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-white" id="statTotal">-</div>
        <div class="text-sm text-slate-400">Offen</div>
      </div>
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-red-400" id="statNeedContact">-</div>
        <div class="text-sm text-slate-400">Anschreiben</div>
      </div>
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-green-400" id="statContacted">-</div>
        <div class="text-sm text-slate-400">Kontaktiert</div>
      </div>
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-blue-400" id="statGroups">-</div>
        <div class="text-sm text-slate-400">Adress-Gruppen</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 mb-4 overflow-x-auto pb-1">
      <button onclick="switchTab('orders')" id="tab-orders"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-active">📋 Alle Aufträge</button>
      <button onclick="switchTab('contact')" id="tab-contact"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">📞 Anschreiben</button>
      <button onclick="switchTab('routes')" id="tab-routes"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">🗺️ Routen</button>
      <button onclick="switchTab('techs')" id="tab-techs"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">👷 Monteure</button>
    </div>

    <!-- Tab Content -->
    <div id="content-orders"></div>
    <div id="content-contact" class="hidden"></div>
    <div id="content-routes" class="hidden"></div>
    <div id="content-techs" class="hidden"></div>

    <!-- Loading -->
    <div id="loading" class="text-center py-16">
      <div class="flex justify-center gap-2 mb-4">
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.3s"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.6s"></div>
      </div>
      <p class="text-slate-400">Daten werden geladen…</p>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let DATA = null;
let currentTab = 'orders';
let searchQuery = '';
let sortField = 'date';
let sortDir = 'desc';

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData(force = false) {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⏳ Laden…';
  btn.disabled = true;

  try {
    const url = '/api/state' + (force ? '?refresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    document.getElementById('loading').classList.add('hidden');
    updateStats();
    renderCurrentTab();
    updateLastUpdate();
  } catch (err) {
    console.error('Laden fehlgeschlagen:', err);
    document.getElementById('loading').innerHTML =
      `<p class="text-red-400">❌ Fehler beim Laden: ${err.message}</p>
       <button onclick="loadData(true)" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg">Erneut versuchen</button>`;
  } finally {
    btn.textContent = 'Aktualisieren';
    btn.disabled = false;
  }
}

function updateLastUpdate() {
  const el = document.getElementById('lastUpdate');
  const now = new Date();
  el.textContent = `Letzte: ${now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}`;
}

function updateStats() {
  if (!DATA?.stats) return;
  document.getElementById('statTotal').textContent = DATA.stats.total;
  document.getElementById('statNeedContact').textContent = DATA.stats.needContact;
  document.getElementById('statContacted').textContent = DATA.stats.contacted;
  document.getElementById('statGroups').textContent = DATA.stats.addressGroups;
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  ['orders', 'contact', 'routes', 'techs'].forEach(t => {
    document.getElementById('content-' + t).classList.toggle('hidden', t !== tab);
    document.getElementById('tab-' + t).className =
      `px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${t === tab ? 'tab-active' : 'tab-inactive'}`;
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!DATA) return;
  switch (currentTab) {
    case 'orders': renderOrders(); break;
    case 'contact': renderContact(); break;
    case 'routes': renderRoutes(); break;
    case 'techs': renderTechs(); break;
  }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function regionBadge(region) {
  if (!region) return '<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">—</span>';
  if (region === 'nord') return '<span class="px-2 py-0.5 text-xs rounded-full badge-nord font-medium">Nord 🔴</span>';
  if (region === 'ost') return '<span class="px-2 py-0.5 text-xs rounded-full badge-ost font-medium">Ost 🔵</span>';
  return `<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">${esc(region)}</span>`;
}

function contactBadge(matched) {
  if (matched) return '<span class="px-2 py-0.5 text-xs rounded-full badge-contacted font-medium">🟢 Kontaktiert</span>';
  return '<span class="px-2 py-0.5 text-xs rounded-full badge-open font-medium">🔴 Noch offen</span>';
}

function phoneLink(phone) {
  if (!phone || phone === '-') return '<span class="text-slate-500">—</span>';
  const clean = phone.replace(/[^\d+]/g, '');
  return `<a href="tel:${esc(clean)}" class="text-blue-400 hover:text-blue-300 hover:underline">${esc(phone)}</a>`;
}

function allPhonesDisplay(order) {
  const phones = order._allPhones || [];
  const mainPhone = order.Telephone || '';
  if (phones.length <= 1) return phoneLink(mainPhone);
  // Show main phone + extras from Remarks
  let html = phoneLink(mainPhone);
  const mainNorm = phones[0] || '';
  const extras = phones.filter((p, i) => i > 0 || !mainPhone);
  if (extras.length) {
    html += '<div class="mt-1">';
    for (const p of extras) {
      html += `<div class="text-xs"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)}</a></div>`;
    }
    html += '</div>';
  }
  return html;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
  } catch { return dateStr; }
}

function getSourceId(order) {
  return order.ID?.SourceId || order.SourceId || '';
}

function matchesSearch(order, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  const fields = [
    getSourceId(order), order.Renter, order.Street, order.City,
    order.Zipcode, order.Telephone, order.Craft, order.DisturbanceType,
    order.Damage
  ];
  return fields.some(f => f && String(f).toLowerCase().includes(lower));
}

function sortOrders(orders, field, dir) {
  const mult = dir === 'asc' ? 1 : -1;
  return [...orders].sort((a, b) => {
    let va, vb;
    switch (field) {
      case 'date':
        va = a.DateOfReceipt || ''; vb = b.DateOfReceipt || '';
        return mult * va.localeCompare(vb);
      case 'region':
        va = a._region || 'zzz'; vb = b._region || 'zzz';
        return mult * va.localeCompare(vb);
      case 'contact':
        va = a._match?.matched ? 1 : 0; vb = b._match?.matched ? 1 : 0;
        return mult * (va - vb);
      case 'plz':
        va = a.Zipcode || ''; vb = b.Zipcode || '';
        return mult * va.localeCompare(vb);
      default:
        return 0;
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// TAB 1: ALLE AUFTRÄGE
// ═══════════════════════════════════════════════════════════════
function renderOrders() {
  const container = document.getElementById('content-orders');
  const allOrders = [...(DATA.orders?.needContact || []), ...(DATA.orders?.contacted || [])];

  // Search + Sort controls
  let html = `
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <input type="text" id="searchOrders" placeholder="🔍 Suche nach Name, Adresse, Vorgangsnr…"
        class="flex-1 px-4 py-2 rounded-lg text-sm" value="${esc(searchQuery)}" oninput="searchQuery=this.value;renderOrders()">
      <div class="flex gap-2">
        <select onchange="sortField=this.value;renderOrders()"
          class="px-3 py-2 rounded-lg text-sm bg-dark-card border border-dark-border text-slate-300">
          <option value="date" ${sortField==='date'?'selected':''}>Datum</option>
          <option value="region" ${sortField==='region'?'selected':''}>Region</option>
          <option value="contact" ${sortField==='contact'?'selected':''}>Status</option>
          <option value="plz" ${sortField==='plz'?'selected':''}>PLZ</option>
        </select>
        <button onclick="sortDir=sortDir==='asc'?'desc':'asc';renderOrders()"
          class="px-3 py-2 rounded-lg text-sm bg-dark-card border border-dark-border text-slate-300 hover:bg-dark-hover">
          ${sortDir === 'asc' ? '↑' : '↓'}
        </button>
      </div>
    </div>`;

  let filtered = allOrders.filter(o => matchesSearch(o, searchQuery));
  filtered = sortOrders(filtered, sortField, sortDir);

  if (!filtered.length) {
    html += '<div class="card p-8 text-center text-slate-400">Keine Aufträge gefunden</div>';
  } else {
    // Desktop: Tabelle
    html += `<div class="hidden md:block overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-left text-slate-400 border-b border-dark-border">
        <th class="px-3 py-2">Vorgang</th>
        <th class="px-3 py-2">Datum</th>
        <th class="px-3 py-2">Mieter</th>
        <th class="px-3 py-2">Adresse</th>
        <th class="px-3 py-2">PLZ/Stadt</th>
        <th class="px-3 py-2">Telefon</th>
        <th class="px-3 py-2">Störung</th>
        <th class="px-3 py-2">Status</th>
        <th class="px-3 py-2">Region</th>
      </tr></thead><tbody>`;

    for (const o of filtered) {
      const emergency = o.Emergency === 1;
      const rowClass = emergency ? 'bg-red-900/20' : '';
      html += `<tr class="border-b border-dark-border/50 hover:bg-dark-hover ${rowClass}">
        <td class="px-3 py-2.5 font-mono text-xs text-slate-300">${emergency ? '⚡ ' : ''}${esc(getSourceId(o))}</td>
        <td class="px-3 py-2.5 text-xs text-slate-400 whitespace-nowrap">${formatDate(o.DateOfReceipt)}</td>
        <td class="px-3 py-2.5 text-white">${esc(o.Renter)}</td>
        <td class="px-3 py-2.5 text-slate-300">${esc(o.Street)}</td>
        <td class="px-3 py-2.5 text-slate-400">${esc(o.Zipcode)} ${esc(o.City)}</td>
        <td class="px-3 py-2.5">${allPhonesDisplay(o)}</td>
        <td class="px-3 py-2.5 text-slate-400 text-xs">${esc(o.Craft || o.DisturbanceType)}</td>
        <td class="px-3 py-2.5">${contactBadge(o._match?.matched)}</td>
        <td class="px-3 py-2.5">${regionBadge(o._region)}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';

    // Mobile: Karten
    html += '<div class="md:hidden space-y-3">';
    for (const o of filtered) {
      const emergency = o.Emergency === 1;
      html += `<div class="card p-4 ${emergency ? 'border-red-700' : ''}">
        <div class="flex justify-between items-start mb-2">
          <span class="font-mono text-xs text-slate-400">${emergency ? '⚡ ' : ''}${esc(getSourceId(o))}</span>
          <div class="flex gap-1">${contactBadge(o._match?.matched)} ${regionBadge(o._region)}</div>
        </div>
        <div class="text-white font-medium">${esc(o.Renter)}</div>
        <div class="text-sm text-slate-400 mt-1">${esc(o.Street)}, ${esc(o.Zipcode)} ${esc(o.City)}</div>
        <div class="flex justify-between items-center mt-2">
          <div class="text-sm">${phoneLink(o.Telephone)}</div>
          <div class="text-xs text-slate-500">${formatDate(o.DateOfReceipt)} · ${esc(o.Craft)}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  html += `<div class="mt-3 text-xs text-slate-500">${filtered.length} von ${allOrders.length} Aufträgen</div>`;
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// TAB 2: NOCH ANSCHREIBEN
// ═══════════════════════════════════════════════════════════════
function renderContact() {
  const container = document.getElementById('content-contact');
  const orders = DATA.orders?.needContact || [];

  if (!orders.length) {
    container.innerHTML = '<div class="card p-8 text-center"><div class="text-4xl mb-3">🎉</div><div class="text-green-400 font-medium">Alle Kunden kontaktiert!</div></div>';
    return;
  }

  // Group by region
  const nord = orders.filter(o => o._region === 'nord');
  const ost = orders.filter(o => o._region === 'ost');
  const other = orders.filter(o => o._region !== 'nord' && o._region !== 'ost');

  let html = '';

  function renderRegionGroup(title, regionOrders, colorClass) {
    if (!regionOrders.length) return '';
    let h = `<div class="mb-6">
      <h3 class="text-lg font-bold mb-3 ${colorClass}">${title} (${regionOrders.length})</h3>
      <div class="grid gap-3 md:grid-cols-2 lg:grid-cols-3">`;
    
    for (const o of regionOrders) {
      const techRec = o._recommendedTech;
      h += `<div class="card p-4">
        <div class="flex justify-between items-start mb-3">
          <div>
            <span class="font-mono text-xs text-slate-400">${esc(getSourceId(o))}</span>
            <span class="text-xs text-slate-500 ml-2">${formatDate(o.DateOfReceipt)}</span>
          </div>
          ${regionBadge(o._region)}
        </div>
        <div class="text-white font-medium mb-1">${esc(o.Renter)}</div>
        <div class="text-sm text-slate-400 mb-3">${esc(o.Street)}, ${esc(o.Zipcode)} ${esc(o.City)}</div>
        ${(o._allPhones && o._allPhones.length) || (o.Telephone && o.Telephone !== '-') ? `
          <div class="mb-3">
            ${o.Telephone && o.Telephone !== '-' ? `<div class="text-xl font-bold text-blue-400">
              <a href="tel:${esc(o.Telephone.replace(/[^\d+]/g,''))}" class="hover:text-blue-300">📞 ${esc(o.Telephone)}</a>
            </div>` : ''}
            ${(o._allPhones || []).filter(p => {
              const mainClean = (o.Telephone || '').replace(/[^\d+]/g, '');
              return p !== mainClean && !mainClean.includes(p.replace('+49','0').replace(/^0/,''));
            }).map(p => `<div class="text-sm mt-1"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)} <span class="text-xs text-slate-500">(aus Beschreibung)</span></a></div>`).join('')}
          </div>` : '<div class="text-slate-500 mb-3">Keine Telefonnummer</div>'}
        <div class="text-xs text-slate-500 mb-2">${esc(o.Craft)} — ${esc(o.Damage || o.DisturbanceType || '')}</div>
        ${techRec ? `<div class="text-xs text-slate-400">👷 Empfehlung: <span class="text-white font-medium">${esc(techRec.name)}</span></div>` : ''}
        ${o.Remarks ? `<div class="text-xs text-yellow-500 mt-2">📝 ${esc(o.Remarks.substring(0, 100))}${o.Remarks.length > 100 ? '…' : ''}</div>` : ''}
      </div>`;
    }
    h += '</div></div>';
    return h;
  }

  html += renderRegionGroup('🔴 Region Nord', nord, 'text-red-400');
  html += renderRegionGroup('🔵 Region Ost', ost, 'text-blue-400');
  if (other.length) html += renderRegionGroup('— Ohne Region', other, 'text-slate-400');

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// TAB 3: ROUTEN / ADRESS-GRUPPEN
// ═══════════════════════════════════════════════════════════════
function renderRoutes() {
  const container = document.getElementById('content-routes');
  const groups = DATA.addressGroups || [];

  if (!groups.length) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Adress-Gruppen</div>';
    return;
  }

  let html = '<div class="space-y-3">';
  for (let i = 0; i < groups.length; i++) {
    const g = groups[i];
    const count = g.orders.length;
    const multi = count > 1;

    html += `<div class="card overflow-hidden">
      <div class="p-4 cursor-pointer hover:bg-dark-hover flex items-center justify-between" onclick="toggleExpand(${i})">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold ${multi ? 'text-amber-400' : 'text-slate-400'}">${count}</span>
          <div>
            <div class="text-white font-medium">${esc(g.street)}</div>
            <div class="text-sm text-slate-400">${esc(g.zipcode)} ${esc(g.city)}</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${regionBadge(g.region)}
          <svg id="expand-icon-${i}" class="w-5 h-5 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </div>
      <div id="expand-${i}" class="expand-content">
        <div class="border-t border-dark-border px-4 pb-4 pt-2 space-y-2">`;

    for (const o of g.orders) {
      html += `<div class="flex flex-col sm:flex-row sm:items-center gap-2 py-2 border-b border-dark-border/30 last:border-0">
        <span class="font-mono text-xs text-slate-400 w-24">${o.Emergency === 1 ? '⚡ ' : ''}${esc(getSourceId(o))}</span>
        <span class="text-white text-sm flex-1">${esc(o.Renter)}</span>
        <span class="text-sm">${phoneLink(o.Telephone)}</span>
        <span class="text-xs text-slate-500">${esc(o.Craft)}</span>
        ${contactBadge(o._match?.matched)}
      </div>`;
    }

    html += '</div></div></div>';
  }
  html += '</div>';

  // Summary
  const multiGroups = groups.filter(g => g.orders.length > 1);
  if (multiGroups.length) {
    html += `<div class="mt-4 card p-4 border-amber-700">
      <div class="text-amber-400 font-medium">💡 ${multiGroups.length} Adressen mit mehreren Aufträgen</div>
      <div class="text-sm text-slate-400 mt-1">Diese können zusammengelegt werden: ${multiGroups.reduce((s,g) => s + g.orders.length, 0)} Aufträge an ${multiGroups.length} Adressen</div>
    </div>`;
  }

  container.innerHTML = html;
}

function toggleExpand(i) {
  const el = document.getElementById('expand-' + i);
  const icon = document.getElementById('expand-icon-' + i);
  el.classList.toggle('open');
  icon.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : '';
}

// ═══════════════════════════════════════════════════════════════
// TAB 4: MONTEURE
// ═══════════════════════════════════════════════════════════════
function renderTechs() {
  const container = document.getElementById('content-techs');
  const techs = DATA.technicians;
  if (!techs) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Monteur-Daten</div>';
    return;
  }

  let html = '';

  function renderRegion(title, region, colorBg, colorFill, emoji) {
    const regionTechs = techs[region] || [];
    if (!regionTechs.length) return '';
    
    const maxJobs = Math.max(...regionTechs.map(t => t.jobs), 1);
    const totalJobs = regionTechs.reduce((s, t) => s + t.jobs, 0);
    const minJobsTech = regionTechs.reduce((min, t) => t.jobs < min.jobs ? t : min, regionTechs[0]);
    const maxJobsTech = regionTechs.reduce((max, t) => t.jobs > max.jobs ? t : max, regionTechs[0]);

    let h = `<div class="card p-5 mb-4">
      <h3 class="text-lg font-bold mb-4">${emoji} ${title} <span class="text-sm font-normal text-slate-400">(${totalJobs} offene Aufträge)</span></h3>
      <div class="space-y-4">`;

    for (const t of regionTechs) {
      const pct = maxJobs > 0 ? Math.round((t.jobs / maxJobs) * 100) : 0;
      const isMin = t.name === minJobsTech.name && regionTechs.length > 1 && minJobsTech.jobs < maxJobsTech.jobs;
      h += `<div>
        <div class="flex justify-between items-center mb-1">
          <span class="text-white font-medium">${esc(t.name)} ${isMin ? '⭐' : ''}</span>
          <span class="text-sm ${isMin ? 'text-green-400' : 'text-slate-400'}">${t.jobs} Jobs</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${colorFill}" style="width: ${pct}%"></div>
        </div>
      </div>`;
    }

    // Recommendation
    if (minJobsTech.jobs < maxJobsTech.jobs && regionTechs.length > 1) {
      const diff = maxJobsTech.jobs - minJobsTech.jobs;
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-slate-300">
        💡 <strong>${esc(minJobsTech.name)}</strong> hat ${diff} Job${diff !== 1 ? 's' : ''} weniger als ${esc(maxJobsTech.name)} → nächsten ${title.split(' ')[1]}-Auftrag an <strong>${esc(minJobsTech.name)}</strong>
      </div>`;
    } else if (regionTechs.length > 1) {
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-green-400">
        ✅ Gleichmäßig verteilt
      </div>`;
    }

    h += '</div></div>';
    return h;
  }

  html += renderRegion('Region Nord', 'nord', 'bg-red-900/30', 'bg-red-500', '🔴');
  html += renderRegion('Region Ost', 'ost', 'bg-blue-900/30', 'bg-blue-500', '🔵');

  container.innerHTML = html;
}
