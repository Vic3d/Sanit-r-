<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schutzeichel Backoffice</title>
  <meta name="version" content="1.0.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', hover: '#2d3a4d' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { background: #334155; color: #f1f5f9; }
    .tab-inactive { color: #94a3b8; }
    .tab-inactive:hover { color: #cbd5e1; background: #1e293b; }
    .badge-nord { background: #991b1b; color: #fca5a5; }
    .badge-ost { background: #1e3a5f; color: #93c5fd; }
    .badge-contacted { background: #065f46; color: #6ee7b7; }
    .badge-open { background: #991b1b; color: #fca5a5; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    .expand-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .expand-content.open { max-height: 2000px; }
    .progress-bar { background: #334155; border-radius: 9999px; height: 8px; }
    .progress-fill { border-radius: 9999px; height: 8px; transition: width 0.5s ease; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-dot { animation: pulse-dot 1.5s infinite; }
    input[type="text"] { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    input[type="text"]::placeholder { color: #64748b; }
    input[type="text"]:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(96,165,250,0.2); }
    #route-map { height: 450px; width: 100%; border-radius: 0.75rem; z-index: 1; }
    .leaflet-popup-content-wrapper { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .leaflet-popup-tip { background: #1e293b; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
    .leaflet-popup-content a { color: #60a5fa; }
    .tech-marker { font-size: 20px; line-height: 1; text-align: center; }
    .route-loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; }
    .route-loading .spinner { width: 24px; height: 24px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-7xl mx-auto px-4 py-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🔧</span>
        <h1 class="text-xl font-bold text-white">Schutzeichel Backoffice</h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-slate-600 font-mono">v1.6.1</span>
        <span id="lastUpdate" class="text-sm text-slate-400"></span>
        <button onclick="loadData(true)" id="refreshBtn"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
          Aktualisieren
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-white" id="statTotal">-</div>
        <div class="text-sm text-slate-400">Offen</div>
      </div>
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-red-400" id="statNeedContact">-</div>
        <div class="text-sm text-slate-400">Anschreiben</div>
      </div>
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-green-400" id="statContacted">-</div>
        <div class="text-sm text-slate-400">Kontaktiert</div>
      </div>
      <div class="card p-4 text-center">
        <div class="text-2xl font-bold text-blue-400" id="statGroups">-</div>
        <div class="text-sm text-slate-400">Adress-Gruppen</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 mb-4 overflow-x-auto pb-1">
      <button onclick="switchTab('orders')" id="tab-orders"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-active">📋 Alle Aufträge</button>
      <button onclick="switchTab('contact')" id="tab-contact"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">📞 Anschreiben</button>
      <button onclick="switchTab('routes')" id="tab-routes"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">🗺️ Routen</button>
      <button onclick="switchTab('techs')" id="tab-techs"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">👷 Monteure</button>
    </div>

    <!-- Tab Content -->
    <div id="content-orders"></div>
    <div id="content-contact" class="hidden"></div>
    <div id="content-routes" class="hidden"></div>
    <div id="content-techs" class="hidden"></div>

    <!-- Loading -->
    <div id="loading" class="text-center py-16">
      <div class="flex justify-center gap-2 mb-4">
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.3s"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.6s"></div>
      </div>
      <p class="text-slate-400">Daten werden geladen…</p>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let DATA = null;
let currentTab = 'orders';
let searchQuery = '';
let sortField = 'date';
let sortDir = 'desc';

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData(force = false) {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⏳ Laden…';
  btn.disabled = true;

  try {
    const url = '/api/state' + (force ? '?refresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    document.getElementById('loading').classList.add('hidden');
    updateStats();
    renderCurrentTab();
    updateLastUpdate();
  } catch (err) {
    console.error('Laden fehlgeschlagen:', err);
    document.getElementById('loading').innerHTML =
      `<p class="text-red-400">❌ Fehler beim Laden: ${err.message}</p>
       <button onclick="loadData(true)" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg">Erneut versuchen</button>`;
  } finally {
    btn.textContent = 'Aktualisieren';
    btn.disabled = false;
  }
}

function updateLastUpdate() {
  const el = document.getElementById('lastUpdate');
  const now = new Date();
  el.textContent = `Letzte: ${now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}`;
}

function updateStats() {
  if (!DATA?.stats) return;
  document.getElementById('statTotal').textContent = DATA.stats.total;
  document.getElementById('statNeedContact').textContent = DATA.stats.needContact;
  document.getElementById('statContacted').textContent = DATA.stats.contacted;
  document.getElementById('statGroups').textContent = DATA.stats.addressGroups;
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  ['orders', 'contact', 'routes', 'techs'].forEach(t => {
    document.getElementById('content-' + t).classList.toggle('hidden', t !== tab);
    document.getElementById('tab-' + t).className =
      `px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${t === tab ? 'tab-active' : 'tab-inactive'}`;
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!DATA) return;
  switch (currentTab) {
    case 'orders': renderOrders(); break;
    case 'contact': renderContact(); break;
    case 'routes': renderRoutes(); break;
    case 'techs': renderTechs(); break;
  }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function regionBadge(region) {
  if (!region) return '<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">—</span>';
  if (region === 'nord') return '<span class="px-2 py-0.5 text-xs rounded-full badge-nord font-medium">Nord 🔴</span>';
  if (region === 'ost') return '<span class="px-2 py-0.5 text-xs rounded-full badge-ost font-medium">Ost 🔵</span>';
  return `<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">${esc(region)}</span>`;
}

function contactBadge(matched) {
  if (matched) return '<span class="px-2 py-0.5 text-xs rounded-full badge-contacted font-medium">🟢 Kontaktiert</span>';
  return '<span class="px-2 py-0.5 text-xs rounded-full badge-open font-medium">🔴 Noch offen</span>';
}

function phoneLink(phone) {
  if (!phone || phone === '-') return '<span class="text-slate-500">—</span>';
  const clean = phone.replace(/[^\d+]/g, '');
  return `<a href="tel:${esc(clean)}" class="text-blue-400 hover:text-blue-300 hover:underline">${esc(phone)}</a>`;
}

function allPhonesDisplay(order) {
  const phones = order._allPhones || [];
  const mainPhone = order.Telephone || '';
  if (phones.length <= 1) return phoneLink(mainPhone);
  // Show main phone + extras from Remarks
  let html = phoneLink(mainPhone);
  const mainNorm = phones[0] || '';
  const extras = phones.filter((p, i) => i > 0 || !mainPhone);
  if (extras.length) {
    html += '<div class="mt-1">';
    for (const p of extras) {
      html += `<div class="text-xs"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)}</a></div>`;
    }
    html += '</div>';
  }
  return html;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
  } catch { return dateStr; }
}

function getSourceId(order) {
  return order.ID?.SourceId || order.SourceId || '';
}

function matchesSearch(order, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  const fields = [
    getSourceId(order), order.Renter, order.Street, order.City,
    order.Zipcode, order.Telephone, order.Craft, order.DisturbanceType,
    order.Damage
  ];
  return fields.some(f => f && String(f).toLowerCase().includes(lower));
}

function sortOrders(orders, field, dir) {
  const mult = dir === 'asc' ? 1 : -1;
  return [...orders].sort((a, b) => {
    let va, vb;
    switch (field) {
      case 'date':
        va = a.DateOfReceipt || ''; vb = b.DateOfReceipt || '';
        return mult * va.localeCompare(vb);
      case 'region':
        va = a._region || 'zzz'; vb = b._region || 'zzz';
        return mult * va.localeCompare(vb);
      case 'contact':
        va = a._match?.matched ? 1 : 0; vb = b._match?.matched ? 1 : 0;
        return mult * (va - vb);
      case 'plz':
        va = a.Zipcode || ''; vb = b.Zipcode || '';
        return mult * va.localeCompare(vb);
      default:
        return 0;
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// TAB 1: ALLE AUFTRÄGE
// ═══════════════════════════════════════════════════════════════
function renderOrders() {
  const container = document.getElementById('content-orders');
  const allOrders = [...(DATA.orders?.needContact || []), ...(DATA.orders?.contacted || [])];

  // Search + Sort controls
  let html = `
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <input type="text" id="searchOrders" placeholder="🔍 Suche nach Name, Adresse, Vorgangsnr…"
        class="flex-1 px-4 py-2 rounded-lg text-sm" value="${esc(searchQuery)}" oninput="searchQuery=this.value;renderOrders()">
      <div class="flex gap-2">
        <select onchange="sortField=this.value;renderOrders()"
          class="px-3 py-2 rounded-lg text-sm bg-dark-card border border-dark-border text-slate-300">
          <option value="date" ${sortField==='date'?'selected':''}>Datum</option>
          <option value="region" ${sortField==='region'?'selected':''}>Region</option>
          <option value="contact" ${sortField==='contact'?'selected':''}>Status</option>
          <option value="plz" ${sortField==='plz'?'selected':''}>PLZ</option>
        </select>
        <button onclick="sortDir=sortDir==='asc'?'desc':'asc';renderOrders()"
          class="px-3 py-2 rounded-lg text-sm bg-dark-card border border-dark-border text-slate-300 hover:bg-dark-hover">
          ${sortDir === 'asc' ? '↑' : '↓'}
        </button>
      </div>
    </div>`;

  let filtered = allOrders.filter(o => matchesSearch(o, searchQuery));
  filtered = sortOrders(filtered, sortField, sortDir);

  if (!filtered.length) {
    html += '<div class="card p-8 text-center text-slate-400">Keine Aufträge gefunden</div>';
  } else {
    // Desktop: Tabelle
    html += `<div class="hidden md:block overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="text-left text-slate-400 border-b border-dark-border">
        <th class="px-3 py-2">Vorgang</th>
        <th class="px-3 py-2">Datum</th>
        <th class="px-3 py-2">Mieter</th>
        <th class="px-3 py-2">Adresse</th>
        <th class="px-3 py-2">PLZ/Stadt</th>
        <th class="px-3 py-2">Telefon</th>
        <th class="px-3 py-2">Störung</th>
        <th class="px-3 py-2">Status</th>
        <th class="px-3 py-2">Region</th>
      </tr></thead><tbody>`;

    for (const o of filtered) {
      const emergency = o.Emergency === 1;
      const rowClass = emergency ? 'bg-red-900/20' : '';
      html += `<tr class="border-b border-dark-border/50 hover:bg-dark-hover ${rowClass}">
        <td class="px-3 py-2.5 font-mono text-xs text-slate-300">${emergency ? '⚡ ' : ''}${esc(getSourceId(o))}</td>
        <td class="px-3 py-2.5 text-xs text-slate-400 whitespace-nowrap">${formatDate(o.DateOfReceipt)}</td>
        <td class="px-3 py-2.5 text-white">${esc(o.Renter)}</td>
        <td class="px-3 py-2.5 text-slate-300">${esc(o.Street)}</td>
        <td class="px-3 py-2.5 text-slate-400">${esc(o.Zipcode)} ${esc(o.City)}</td>
        <td class="px-3 py-2.5">${allPhonesDisplay(o)}</td>
        <td class="px-3 py-2.5 text-slate-400 text-xs">${esc(o.Craft || o.DisturbanceType)}</td>
        <td class="px-3 py-2.5">${contactBadge(o._match?.matched)}</td>
        <td class="px-3 py-2.5">${regionBadge(o._region)}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';

    // Mobile: Karten
    html += '<div class="md:hidden space-y-3">';
    for (const o of filtered) {
      const emergency = o.Emergency === 1;
      html += `<div class="card p-4 ${emergency ? 'border-red-700' : ''}">
        <div class="flex justify-between items-start mb-2">
          <span class="font-mono text-xs text-slate-400">${emergency ? '⚡ ' : ''}${esc(getSourceId(o))}</span>
          <div class="flex gap-1">${contactBadge(o._match?.matched)} ${regionBadge(o._region)}</div>
        </div>
        <div class="text-white font-medium">${esc(o.Renter)}</div>
        <div class="text-sm text-slate-400 mt-1">${esc(o.Street)}, ${esc(o.Zipcode)} ${esc(o.City)}</div>
        <div class="flex justify-between items-center mt-2">
          <div class="text-sm">${phoneLink(o.Telephone)}</div>
          <div class="text-xs text-slate-500">${formatDate(o.DateOfReceipt)} · ${esc(o.Craft)}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  html += `<div class="mt-3 text-xs text-slate-500">${filtered.length} von ${allOrders.length} Aufträgen</div>`;
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// TAB 2: NOCH ANSCHREIBEN
// ═══════════════════════════════════════════════════════════════
function renderContact() {
  const container = document.getElementById('content-contact');
  const orders = DATA.orders?.needContact || [];

  if (!orders.length) {
    container.innerHTML = '<div class="card p-8 text-center"><div class="text-4xl mb-3">🎉</div><div class="text-green-400 font-medium">Alle Kunden kontaktiert!</div></div>';
    return;
  }

  // Group by region
  const nord = orders.filter(o => o._region === 'nord');
  const ost = orders.filter(o => o._region === 'ost');
  const other = orders.filter(o => o._region !== 'nord' && o._region !== 'ost');

  let html = '';

  function renderRegionGroup(title, regionOrders, colorClass) {
    if (!regionOrders.length) return '';
    let h = `<div class="mb-6">
      <h3 class="text-lg font-bold mb-3 ${colorClass}">${title} (${regionOrders.length})</h3>
      <div class="grid gap-3 md:grid-cols-2 lg:grid-cols-3">`;
    
    for (const o of regionOrders) {
      const techRec = o._recommendedTech;
      h += `<div class="card p-4">
        <div class="flex justify-between items-start mb-3">
          <div>
            <span class="font-mono text-xs text-slate-400">${esc(getSourceId(o))}</span>
            <span class="text-xs text-slate-500 ml-2">${formatDate(o.DateOfReceipt)}</span>
          </div>
          ${regionBadge(o._region)}
        </div>
        <div class="text-white font-medium mb-1">${esc(o.Renter)}</div>
        <div class="text-sm text-slate-400 mb-3">${esc(o.Street)}, ${esc(o.Zipcode)} ${esc(o.City)}</div>
        ${(o._allPhones && o._allPhones.length) || (o.Telephone && o.Telephone !== '-') ? `
          <div class="mb-3">
            ${o.Telephone && o.Telephone !== '-' ? `<div class="text-xl font-bold text-blue-400">
              <a href="tel:${esc(o.Telephone.replace(/[^\d+]/g,''))}" class="hover:text-blue-300">📞 ${esc(o.Telephone)}</a>
            </div>` : ''}
            ${(o._allPhones || []).filter(p => {
              const mainClean = (o.Telephone || '').replace(/[^\d+]/g, '');
              return p !== mainClean && !mainClean.includes(p.replace('+49','0').replace(/^0/,''));
            }).map(p => `<div class="text-sm mt-1"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)} <span class="text-xs text-slate-500">(aus Beschreibung)</span></a></div>`).join('')}
          </div>` : '<div class="text-slate-500 mb-3">Keine Telefonnummer</div>'}
        <div class="text-xs text-slate-500 mb-2">${esc(o.Craft)} — ${esc(o.Damage || o.DisturbanceType || '')}</div>
        ${techRec ? `<div class="text-xs text-slate-400">👷 Empfehlung: <span class="text-white font-medium">${esc(techRec.name)}</span></div>` : ''}
        ${o.Remarks ? `<div class="text-xs text-yellow-500 mt-2">📝 ${esc(o.Remarks.substring(0, 100))}${o.Remarks.length > 100 ? '…' : ''}</div>` : ''}
      </div>`;
    }
    h += '</div></div>';
    return h;
  }

  html += renderRegionGroup('🔴 Region Nord', nord, 'text-red-400');
  html += renderRegionGroup('🔵 Region Ost', ost, 'text-blue-400');
  if (other.length) html += renderRegionGroup('— Ohne Region', other, 'text-slate-400');

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// TAB 3: ROUTENPLANER
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// TAB 3: ROUTENPLANER (Monteur-basiert)
// ═══════════════════════════════════════════════════════════════
const TECHS = [
  { id: 1, name: 'Nico Kussio', city: 'Gütersloh', home: [8.3858, 51.9069], color: '#3b82f6' },
  { id: 2, name: 'Nico Walczak', city: 'Sundern', home: [8.0011, 51.3279], color: '#22c55e' },
  { id: 3, name: 'Adem', city: 'Sundern', home: [8.0011, 51.3279], color: '#f59e0b' },
  { id: 4, name: 'Ramiz', city: 'Hamm', home: [7.8159, 51.6739], color: '#ef4444' },
];
let routeMap = null;
let routeMapLayers = [];
let routeAllOrders = null; // cached from GET /api/routes
let routeSelectedTech = null;
let routeSelectedOrders = new Set();

function renderRoutes() {
  const container = document.getElementById('content-routes');

  const techOptions = TECHS.map(t =>
    `<option value="${t.id}" ${routeSelectedTech === t.id ? 'selected' : ''}>${t.name} (${t.city})</option>`
  ).join('');

  // Default: no date filter (show all orders)
  const today = new Date().toISOString().split('T')[0];

  container.innerHTML = `
    <div class="card p-3 mb-4 flex flex-wrap items-center gap-3">
      <h2 class="text-base font-bold text-white">🗺️ Routenplaner</h2>
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-400">Monteur:</label>
        <select id="techSelect" onchange="onTechSelected()" class="bg-slate-800 border border-dark-border text-white rounded-lg px-3 py-1.5 text-sm focus:border-blue-500 focus:outline-none">
          <option value="">— Wählen —</option>
          ${techOptions}
        </select>
      </div>
      <div class="flex items-center gap-2">
        <label class="text-sm text-slate-400">Von:</label>
        <input type="date" id="routeDateFrom" value="" class="bg-slate-800 border border-dark-border text-white rounded-lg px-2 py-1.5 text-sm focus:border-blue-500 focus:outline-none">
        <label class="text-sm text-slate-400">Bis:</label>
        <input type="date" id="routeDateTo" value="" class="bg-slate-800 border border-dark-border text-white rounded-lg px-2 py-1.5 text-sm focus:border-blue-500 focus:outline-none">
        <span class="text-xs text-slate-600">(leer = alle)</span>
      </div>
      <div class="flex gap-2 ml-auto">
        <button onclick="loadRouteOrders()" id="loadOrdersBtn"
          class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium transition-colors">
          📥 Aufträge laden
        </button>
        <button onclick="optimizeSelectedRoute()" id="optimizeBtn" disabled
          class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded-lg text-sm font-medium transition-colors">
          🗺️ Route berechnen
        </button>
      </div>
    </div>

    <!-- Map -->
    <div class="card mb-4 overflow-hidden" style="height:400px">
      <div id="route-map" style="height:100%;width:100%"></div>
    </div>

    <!-- Route result (hidden until calculated) -->
    <div id="route-result" class="mb-4"></div>

    <!-- Order list -->
    <div id="route-order-list">
      <div class="card p-8 text-center text-slate-500">Monteur auswählen und Aufträge laden</div>
    </div>`;

  setTimeout(() => initRouteMap(), 100);
}

function initRouteMap() {
  const mapEl = document.getElementById('route-map');
  if (!mapEl) return;
  if (routeMap) { routeMap.remove(); routeMap = null; }

  routeMap = L.map('route-map', { center: [51.55, 8.1], zoom: 9, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO', maxZoom: 19,
  }).addTo(routeMap);

  // Show selected tech's home or all homes
  showTechHomes();
}

function showTechHomes() {
  if (!routeMap) return;
  const show = routeSelectedTech ? TECHS.filter(t => t.id === routeSelectedTech) : TECHS;
  for (const t of show) {
    const icon = L.divIcon({
      html: `<div style="color:${t.color};font-size:24px;text-shadow:0 0 4px rgba(0,0,0,0.8);">🏠</div>`,
      className: '', iconSize: [28, 28], iconAnchor: [14, 14],
    });
    const m = L.marker([t.home[1], t.home[0]], { icon }).addTo(routeMap)
      .bindPopup(`<strong style="color:${t.color}">${t.name}</strong><br>${t.city} (Start)`);
    routeMapLayers.push(m);
  }
}

function clearRouteMap() {
  if (!routeMap) return;
  for (const l of routeMapLayers) routeMap.removeLayer(l);
  routeMapLayers = [];
}

function onTechSelected() {
  const sel = document.getElementById('techSelect');
  routeSelectedTech = sel.value ? parseInt(sel.value) : null;
  routeSelectedOrders.clear();
  document.getElementById('route-result').innerHTML = '';
  clearRouteMap();
  showTechHomes();
  updateOptimizeBtn();
  // Re-render order list sorted by this tech
  if (routeAllOrders) renderOrderList();
}

function updateOptimizeBtn() {
  const btn = document.getElementById('optimizeBtn');
  if (btn) btn.disabled = !(routeSelectedTech && routeSelectedOrders.size > 0);
}

function toggleOrderSelection(orderId) {
  if (routeSelectedOrders.has(orderId)) {
    routeSelectedOrders.delete(orderId);
  } else {
    routeSelectedOrders.add(orderId);
  }
  // Update checkbox UI
  const cb = document.getElementById('cb-' + orderId);
  if (cb) cb.checked = routeSelectedOrders.has(orderId);
  // Update row highlight
  const row = document.getElementById('row-' + orderId);
  if (row) {
    if (routeSelectedOrders.has(orderId)) {
      row.classList.add('bg-slate-800/60');
      row.classList.remove('hover:bg-dark-hover');
    } else {
      row.classList.remove('bg-slate-800/60');
      row.classList.add('hover:bg-dark-hover');
    }
  }
  updateOptimizeBtn();
  updateSelectionCounter();
  // Update map to show selected markers
  showSelectedOnMap();
}

function selectAllOrders() {
  if (!routeAllOrders) return;
  const sorted = getSortedOrders();
  if (routeSelectedOrders.size === sorted.length) {
    routeSelectedOrders.clear(); // deselect all
  } else {
    sorted.forEach(o => routeSelectedOrders.add(o.id));
  }
  renderOrderList();
  updateOptimizeBtn();
  showSelectedOnMap();
}

function getSortedOrders() {
  if (!routeAllOrders || !routeSelectedTech) return routeAllOrders || [];
  return [...routeAllOrders].sort((a, b) => (a.distances[routeSelectedTech] || 999) - (b.distances[routeSelectedTech] || 999));
}

function updateSelectionCounter() {
  const el = document.getElementById('selection-count');
  if (el) el.textContent = routeSelectedOrders.size;
}

function showSelectedOnMap() {
  clearRouteMap();
  showTechHomes();
  if (!routeMap || !routeAllOrders) return;
  const tech = TECHS.find(t => t.id === routeSelectedTech);
  if (!tech) return;

  for (const o of routeAllOrders) {
    if (!routeSelectedOrders.has(o.id) || !o.coords) continue;
    const icon = L.divIcon({
      html: `<div style="background:${tech.color};color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);">●</div>`,
      className: '', iconSize: [22, 22], iconAnchor: [11, 11],
    });
    const m = L.marker([o.coords[1], o.coords[0]], { icon }).addTo(routeMap)
      .bindPopup(`<strong>${esc(o.renter)}</strong><br>${esc(o.street)}<br>${esc(o.zipcode)} ${esc(o.city)}`);
    routeMapLayers.push(m);
  }
}

async function loadRouteOrders() {
  const btn = document.getElementById('loadOrdersBtn');
  const list = document.getElementById('route-order-list');
  btn.disabled = true;
  btn.textContent = '⏳ Geocoding…';
  list.innerHTML = '<div class="card p-8 text-center text-slate-400">Adressen werden geocoded… (nur PLZs, dauert ~5-10s)</div>';

  try {
    // Use already-loaded orders from DATA — no extra B&O call needed
    // DATA.orders = { needContact: [...], contacted: [...] }
    const allRaw = [
      ...(DATA.orders?.needContact || []),
      ...(DATA.orders?.contacted || []),
    ];

    // Date filter (DateOfReceipt is ISO: "2025-10-06T22:00:00+00:00")
    const fromDate = document.getElementById('routeDateFrom')?.value;
    const toDate = document.getElementById('routeDateTo')?.value;
    const rawOrders = (!fromDate && !toDate) ? allRaw : allRaw.filter(o => {
      if (!o.DateOfReceipt) return true;
      const d = o.DateOfReceipt.substring(0, 10); // "2025-10-06"
      if (fromDate && d < fromDate) return false;
      if (toDate && d > toDate) return false;
      return true;
    });
    console.log('[Routen] Filter:', fromDate||'*', '-', toDate||'*', '| Treffer:', rawOrders.length, '/', allRaw.length);
    if (!rawOrders.length) {
      list.innerHTML = '<div class="card p-8 text-center text-slate-500">Keine Aufträge geladen — erst "Aktualisieren" klicken</div>';
      return;
    }

    // Extract unique PLZs
    const uniquePLZs = [...new Set(rawOrders.map(o => o.Zipcode).filter(Boolean))];

    // Geocode PLZs via API
    const res = await fetch('/api/routes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'geocode', plzList: uniquePLZs }),
    });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'HTTP ' + res.status);
    const { plzCoords } = await res.json();

    // Build routeAllOrders from DATA + PLZ coords
    routeAllOrders = rawOrders
      .filter(o => o.Zipcode && plzCoords[o.Zipcode])
      .map((o, i) => {
        const coords = plzCoords[o.Zipcode];
        const distances = {};
        TECHS.forEach(t => {
          const dLat = (coords[1] - t.home[1]) * Math.PI / 180;
          const dLon = (coords[0] - t.home[0]) * Math.PI / 180;
          const a = Math.sin(dLat/2)**2 + Math.cos(t.home[1]*Math.PI/180) * Math.cos(coords[1]*Math.PI/180) * Math.sin(dLon/2)**2;
          distances[t.id] = Math.round(6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 10) / 10;
        });
        return {
          id: getSourceId(o),
          renter: o.Renter || '',
          street: o.Street || '',
          zipcode: o.Zipcode || '',
          city: o.City || '',
          telephone: o.Telephone || '',
          craft: o.Craft || '',
          disturbanceType: o.DisturbanceType || '',
          emergency: o.Emergency === 1,
          coords,
          distances,
        };
      });

    renderOrderList();
  } catch (err) {
    list.innerHTML = `<div class="card p-6 text-center"><div class="text-red-400 mb-2">❌ ${esc(err.message)}</div>
      <button onclick="loadRouteOrders()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">Erneut</button></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '📥 Aufträge laden';
  }
}

function renderOrderList() {
  const list = document.getElementById('route-order-list');
  if (!routeAllOrders || !routeAllOrders.length) {
    list.innerHTML = '<div class="card p-8 text-center text-slate-500">Keine offenen Aufträge</div>';
    return;
  }

  const sorted = getSortedOrders();
  const allSelected = routeSelectedOrders.size === sorted.length && sorted.length > 0;

  let html = `<div class="card overflow-hidden">
    <div class="p-3 border-b border-dark-border flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="selectAllOrders()" class="px-3 py-1 text-xs font-medium rounded ${allSelected ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${allSelected ? '☑ Alle abwählen' : '☐ Alle auswählen'}</button>
        <span class="text-sm text-slate-400"><span id="selection-count">${routeSelectedOrders.size}</span> / ${sorted.length} ausgewählt</span>
      </div>
      ${routeSelectedTech ? `<span class="text-xs text-slate-500">Sortiert nach Entfernung von ${esc(TECHS.find(t=>t.id===routeSelectedTech)?.name || '')}</span>` : ''}
    </div>
    <div class="divide-y divide-dark-border/30" style="max-height:500px;overflow-y:auto">`;

  for (const o of sorted) {
    const dist = routeSelectedTech ? o.distances?.[routeSelectedTech] : null;
    const checked = routeSelectedOrders.has(o.id);
    const bgClass = checked ? 'bg-slate-800/60' : 'hover:bg-dark-hover';

    html += `<div id="row-${esc(o.id)}" class="p-3 cursor-pointer transition-colors ${bgClass}" onclick="toggleOrderSelection('${esc(o.id)}')">
      <div class="flex items-center gap-3">
        <input type="checkbox" id="cb-${esc(o.id)}" ${checked ? 'checked' : ''} class="w-4 h-4 accent-blue-500 pointer-events-none" tabindex="-1">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-white font-medium text-sm">${esc(o.renter)}</span>
            ${o.emergency ? '<span class="text-red-400 text-xs">⚡ Notfall</span>' : ''}
          </div>
          <div class="text-xs text-slate-400 mt-0.5">${esc(o.street)}, ${esc(o.zipcode)} ${esc(o.city)}</div>
          <div class="text-xs text-slate-500">${esc(o.craft || o.disturbanceType)}${o.telephone ? ' · ' + esc(o.telephone) : ''}</div>
        </div>
        ${dist !== null ? `<div class="text-right flex-shrink-0">
          <div class="text-sm font-bold ${dist < 20 ? 'text-green-400' : dist < 40 ? 'text-amber-400' : 'text-red-400'}">${dist} km</div>
          <div class="text-xs text-slate-500">Luftlinie</div>
        </div>` : ''}
      </div>
    </div>`;
  }

  html += '</div></div>';
  list.innerHTML = html;
  updateSelectionCounter();
}

function formatDuration(seconds) {
  if (!seconds) return '—';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}min` : `${m} min`;
}

async function optimizeSelectedRoute() {
  if (!routeSelectedTech || routeSelectedOrders.size === 0) return;
  const btn = document.getElementById('optimizeBtn');
  const result = document.getElementById('route-result');
  btn.disabled = true;
  btn.textContent = '⏳ Berechne…';
  result.innerHTML = '<div class="card p-4 text-center text-slate-400">Route wird optimiert…</div>';

  try {
    const res = await fetch('/api/routes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ techId: routeSelectedTech, orderIds: [...routeSelectedOrders] }),
    });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'HTTP ' + res.status);
    const data = await res.json();
    renderRouteResult(data);
  } catch (err) {
    result.innerHTML = `<div class="card p-4 text-center text-red-400">❌ ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🗺️ Route berechnen';
    updateOptimizeBtn();
  }
}

function renderRouteResult(data) {
  const result = document.getElementById('route-result');
  const tech = data.tech;
  const orders = data.orders || [];
  if (!orders.length) {
    result.innerHTML = '<div class="card p-4 text-center text-slate-500">Keine Route berechnet</div>';
    return;
  }

  // Google Maps URL: start → waypoints → last stop
  const origin = `${tech.home[1]},${tech.home[0]}`;
  const waypoints = orders.slice(0, -1).map(o => `${o.coords[1]},${o.coords[0]}`).join('|');
  const lastOrder = orders[orders.length - 1];
  const destination = `${lastOrder.coords[1]},${lastOrder.coords[0]}`;
  let gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
  if (waypoints) gmapsUrl += `&waypoints=${waypoints}`;

  let html = `<div class="card overflow-hidden" style="border-left: 4px solid ${tech.color}">
    <div class="p-4 border-b border-dark-border flex items-center justify-between flex-wrap gap-3">
      <div>
        <div class="text-white font-bold text-lg" style="color:${tech.color}">📋 Route: ${esc(tech.name)}</div>
        <div class="text-sm text-slate-400">${orders.length} Aufträge · ${data.totalDistance} km · ${formatDuration(data.totalDuration)}</div>
      </div>
      <div class="flex gap-2">
        <a href="${gmapsUrl}" target="_blank" rel="noopener"
          class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white rounded-lg text-sm font-medium transition-colors whitespace-nowrap">
          📍 In Google Maps öffnen
        </a>
        <button onclick="copyRouteText()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium transition-colors whitespace-nowrap">
          📋 Liste kopieren
        </button>
      </div>
    </div>
    <div class="divide-y divide-dark-border/50">`;

  orders.forEach((o, idx) => {
    html += `<div class="p-3">
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-content:center text-xs font-bold text-white" style="background:${tech.color};display:flex;align-items:center;justify-content:center">${idx + 1}</div>
        <div class="flex-1">
          <div class="text-white font-medium text-sm">${esc(o.renter)} ${o.emergency ? '<span class="text-red-400">⚡</span>' : ''}</div>
          <div class="text-xs text-slate-400">${esc(o.street)}, ${esc(o.zipcode)} ${esc(o.city)}</div>
          <div class="text-xs text-slate-500">${esc(o.craft || o.disturbanceType)}${o.telephone ? ' · <a href="tel:'+esc(o.telephone)+'" class="text-blue-400">'+esc(o.telephone)+'</a>' : ''}</div>
        </div>
      </div>
    </div>`;
  });

  html += '</div></div>';

  // Store for copy
  window._lastRouteText = `Route ${tech.name} (${orders.length} Aufträge, ${data.totalDistance} km):\n` +
    orders.map((o, i) => `${i+1}. ${o.renter} — ${o.street}, ${o.zipcode} ${o.city}${o.telephone ? ' (Tel: '+o.telephone+')' : ''}`).join('\n') +
    `\n\nGoogle Maps: ${gmapsUrl}`;

  result.innerHTML = html;

  // Update map with optimized route
  clearRouteMap();
  showTechHomes();
  if (!routeMap) return;

  const allCoords = [[tech.home[1], tech.home[0]]];

  // Draw actual road route if available
  if (data.routeGeometry && data.routeGeometry.length > 1) {
    const roadCoords = data.routeGeometry.map(c => [c[1], c[0]]);
    const polyline = L.polyline(roadCoords, { color: tech.color, weight: 4, opacity: 0.8 }).addTo(routeMap);
    routeMapLayers.push(polyline);
    roadCoords.forEach(c => allCoords.push(c));
  } else {
    // Fallback: straight lines
    const lineCoords = [[tech.home[1], tech.home[0]], ...orders.map(o => [o.coords[1], o.coords[0]])];
    const polyline = L.polyline(lineCoords, { color: tech.color, weight: 3, opacity: 0.7, dashArray: '8 4' }).addTo(routeMap);
    routeMapLayers.push(polyline);
  }

  // Numbered markers
  orders.forEach((o, idx) => {
    const latLng = [o.coords[1], o.coords[0]];
    allCoords.push(latLng);
    const icon = L.divIcon({
      html: `<div style="background:${tech.color};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);">${idx + 1}</div>`,
      className: '', iconSize: [26, 26], iconAnchor: [13, 13],
    });
    const m = L.marker(latLng, { icon }).addTo(routeMap)
      .bindPopup(`<strong>Stop ${idx+1}</strong><br>${esc(o.renter)}<br>${esc(o.street)}<br>${esc(o.zipcode)} ${esc(o.city)}`);
    routeMapLayers.push(m);
  });

  routeMap.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
}

function copyRouteText() {
  if (window._lastRouteText) {
    navigator.clipboard.writeText(window._lastRouteText).then(() => {
      const btn = event.target;
      btn.textContent = '✅ Kopiert!';
      setTimeout(() => btn.textContent = '📋 Liste kopieren', 2000);
    });
  }
}

function toggleExpand(i) {
  const el = document.getElementById('expand-' + i);
  const icon = document.getElementById('expand-icon-' + i);
  el.classList.toggle('open');
  icon.style.transform = el.classList.contains('open') ? 'rotate(180deg)' : '';
}

// ═══════════════════════════════════════════════════════════════
// TAB 4: MONTEURE
// ═══════════════════════════════════════════════════════════════
function renderTechs() {
  const container = document.getElementById('content-techs');
  const techs = DATA.technicians;
  if (!techs) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Monteur-Daten</div>';
    return;
  }

  let html = '';

  function renderRegion(title, region, colorBg, colorFill, emoji) {
    const regionTechs = techs[region] || [];
    if (!regionTechs.length) return '';
    
    const maxJobs = Math.max(...regionTechs.map(t => t.jobs), 1);
    const totalJobs = regionTechs.reduce((s, t) => s + t.jobs, 0);
    const minJobsTech = regionTechs.reduce((min, t) => t.jobs < min.jobs ? t : min, regionTechs[0]);
    const maxJobsTech = regionTechs.reduce((max, t) => t.jobs > max.jobs ? t : max, regionTechs[0]);

    let h = `<div class="card p-5 mb-4">
      <h3 class="text-lg font-bold mb-4">${emoji} ${title} <span class="text-sm font-normal text-slate-400">(${totalJobs} offene Aufträge)</span></h3>
      <div class="space-y-4">`;

    for (const t of regionTechs) {
      const pct = maxJobs > 0 ? Math.round((t.jobs / maxJobs) * 100) : 0;
      const isMin = t.name === minJobsTech.name && regionTechs.length > 1 && minJobsTech.jobs < maxJobsTech.jobs;
      h += `<div>
        <div class="flex justify-between items-center mb-1">
          <span class="text-white font-medium">${esc(t.name)} ${isMin ? '⭐' : ''}</span>
          <span class="text-sm ${isMin ? 'text-green-400' : 'text-slate-400'}">${t.jobs} Jobs</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${colorFill}" style="width: ${pct}%"></div>
        </div>
      </div>`;
    }

    // Recommendation
    if (minJobsTech.jobs < maxJobsTech.jobs && regionTechs.length > 1) {
      const diff = maxJobsTech.jobs - minJobsTech.jobs;
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-slate-300">
        💡 <strong>${esc(minJobsTech.name)}</strong> hat ${diff} Job${diff !== 1 ? 's' : ''} weniger als ${esc(maxJobsTech.name)} → nächsten ${title.split(' ')[1]}-Auftrag an <strong>${esc(minJobsTech.name)}</strong>
      </div>`;
    } else if (regionTechs.length > 1) {
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-green-400">
        ✅ Gleichmäßig verteilt
      </div>`;
    }

    h += '</div></div>';
    return h;
  }

  html += renderRegion('Region Nord', 'nord', 'bg-red-900/30', 'bg-red-500', '🔴');
  html += renderRegion('Region Ost', 'ost', 'bg-blue-900/30', 'bg-blue-500', '🔵');

  container.innerHTML = html;
}
