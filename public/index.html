<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schutzeichel Backoffice</title>
  <meta name="version" content="1.0.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { bg: '#0f172a', card: '#1e293b', border: '#334155', hover: '#2d3a4d' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { background: #334155; color: #f1f5f9; }
    .tab-inactive { color: #94a3b8; }
    .tab-inactive:hover { color: #cbd5e1; background: #1e293b; }
    .badge-nord { background: #991b1b; color: #fca5a5; }
    .badge-ost { background: #1e3a5f; color: #93c5fd; }
    .badge-contacted { background: #065f46; color: #6ee7b7; }
    .badge-open { background: #991b1b; color: #fca5a5; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    .expand-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .expand-content.open { max-height: 2000px; }
    .progress-bar { background: #334155; border-radius: 9999px; height: 8px; }
    .progress-fill { border-radius: 9999px; height: 8px; transition: width 0.5s ease; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading-dot { animation: pulse-dot 1.5s infinite; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    @media (max-width: 768px) { #app { padding-bottom: 80px; } }
    input[type="text"] { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    input[type="text"]::placeholder { color: #64748b; }
    input[type="text"]:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(96,165,250,0.2); }
    #route-map { height: 450px; width: 100%; border-radius: 0.75rem; z-index: 1; }
    .leaflet-popup-content-wrapper { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .leaflet-popup-tip { background: #1e293b; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
    .leaflet-popup-content a { color: #60a5fa; }
    .tech-marker { font-size: 20px; line-height: 1; text-align: center; }
    .route-loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; }
    .route-loading .spinner { width: 24px; height: 24px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    [draggable="true"] { user-select: none; }
    [draggable="true"]:active { cursor: grabbing; }
    [data-col].bg-slate-800\/50 { outline: 2px dashed #60a5fa; outline-offset: -2px; }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="max-w-7xl mx-auto px-4 py-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🔧</span>
        <h1 class="text-xl font-bold text-white">Schutzeichel Backoffice</h1>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-slate-600 font-mono">v6.0.1</span>
        <span id="lastUpdate" class="text-sm text-slate-400 font-medium"></span>
        <button onclick="loadData(true)" id="refreshBtn"
          class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
          Aktualisieren
        </button>
      </div>
    </div>

    <!-- Stats (mini, im Header) -->
    <div id="stats" class="grid grid-cols-3 gap-3 mb-4">
      <div class="card p-3 text-center">
        <div class="text-xl font-bold text-white" id="statTotal">-</div>
        <div class="text-xs text-slate-400">Offen</div>
      </div>
      <div class="card p-3 text-center">
        <div class="text-xl font-bold text-red-400" id="statNeedContact">-</div>
        <div class="text-xs text-slate-400">Anschreiben</div>
      </div>
      <div class="card p-3 text-center">
        <div class="text-xl font-bold text-green-400" id="statContacted">-</div>
        <div class="text-xs text-slate-400">Kontaktiert</div>
      </div>
    </div>

    <!-- Globale Suche -->
    <div class="mb-4">
      <input type="text" id="globalSearch" placeholder="🔍 Suche: Name, Adresse, PLZ, Telefon, Gewerk..." 
        class="w-full px-4 py-2.5 rounded-lg text-sm" oninput="onGlobalSearch(this.value)">
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 mb-4 overflow-x-auto pb-1">
      <button onclick="switchTab('dashboard')" id="tab-dashboard"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-active">🏠 Start</button>
      <button onclick="switchTab('orders')" id="tab-orders"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">📋 Aufträge</button>
      <button onclick="switchTab('planner')" id="tab-planner"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">📅 Planung</button>
      <button onclick="switchTab('routes')" id="tab-routes"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">🗺️ Routen</button>
      <button onclick="switchTab('calendar')" id="tab-calendar"
        class="px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap tab-inactive">📅 Kalender</button>
    </div>

    <!-- Tab Content -->
    <div id="content-dashboard"></div>
    <div id="content-orders" class="hidden"></div>
    <div id="content-contact" class="hidden"></div>
    <div id="content-planner" class="hidden"></div>
    <div id="content-routes" class="hidden"></div>
    <div id="content-techs" class="hidden"></div>
    <div id="content-calendar" class="hidden"></div>

    <!-- Mobile Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-dark-card border-t border-dark-border md:hidden z-50 safe-bottom">
      <div class="flex justify-around py-2">
        <button onclick="switchTab('dashboard')" id="mob-dashboard" class="flex flex-col items-center gap-0.5 px-3 py-1 text-slate-400">
          <span class="text-lg">🏠</span><span class="text-xs">Start</span>
        </button>
        <button onclick="switchTab('orders')" id="mob-orders" class="flex flex-col items-center gap-0.5 px-3 py-1 text-slate-400">
          <span class="text-lg">📋</span><span class="text-xs">Aufträge</span>
        </button>
        <button onclick="switchTab('planner')" id="mob-planner" class="flex flex-col items-center gap-0.5 px-3 py-1 text-slate-400">
          <span class="text-lg">📅</span><span class="text-xs">Planung</span>
        </button>
        <button onclick="switchTab('routes')" id="mob-routes" class="flex flex-col items-center gap-0.5 px-3 py-1 text-slate-400">
          <span class="text-lg">🗺️</span><span class="text-xs">Routen</span>
        </button>
        <button onclick="switchTab('calendar')" id="mob-calendar" class="flex flex-col items-center gap-0.5 px-3 py-1 text-slate-400">
          <span class="text-lg">📆</span><span class="text-xs">Kalender</span>
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-16 mb-16 md:mb-0">
      <div class="flex justify-center gap-2 mb-4">
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.3s"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.6s"></div>
      </div>
      <p class="text-slate-400">Daten werden geladen…</p>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let DATA = null;
let currentTab = 'dashboard';
let searchQuery = '';
let sortField = 'date';
let sortDir = 'desc';

// ═══════════════════════════════════════════════════════════════
// SHARED STATE — alle Tabs lesen + schreiben hier
// ═══════════════════════════════════════════════════════════════
const STATE = {
  orders: [],           // enriched orders (with coords, distances, age, region, contactStatus)
  assignments: {},      // { techId: [orderId, ...], unassigned: [...] }
  ready: false,
};

// Build enriched orders from DATA — call after loadData()
async function buildSharedState() {
  if (!DATA?.orders) return;
  const plzCoords = await loadPLZCoords();
  // Use ALL orders, but filter out fertiggestellt (4,6,7) + abgerechnet (8,9)
  const allRaw = DATA.orders?.all?.length
    ? DATA.orders.all.filter(o => o.OrderState <= 3)
    : [...(DATA.orders?.needContact || []), ...(DATA.orders?.contacted || [])];

  STATE.orders = allRaw.map(o => {
    const coords = plzCoords[o.Zipcode];
    const distances = {};
    if (coords) {
      TECHS.forEach(t => { distances[t.id] = haversineKm(coords[0], coords[1], t.home[0], t.home[1]); });
    }
    const dateStr = o.DateOfReceipt ? o.DateOfReceipt.substring(0, 10) : '';
    const age = dateStr ? Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000) : null;
    const region = o._region || null;
    const contacted = DATA.orders.contacted?.some(c => getSourceId(c) === getSourceId(o)) || false;

    // Collect ALL phone numbers from all fields
    const allPhones = [];
    const addPhone = (p) => { if (!p) return; const c = p.replace(/[\s/\-()]/g,'').replace(/^49/,'+49'); if (c.length >= 6 && !allPhones.includes(c)) allPhones.push(c); };
    addPhone(o.Telephone);
    addPhone(o.Telephone2);
    // Extract from CustomerContactPerson (e.g. "HM: Name T:021174070-2345")
    const contactText = (o.CustomerContactPerson || '') + ' ' + (o.Damage || '') + ' ' + (o.DisturbanceType || '');
    const phoneMatches = contactText.match(/(?:0[\d\s/\-]{6,15}|\+?49[\d\s/\-]{6,15})/g);
    if (phoneMatches) phoneMatches.forEach(p => addPhone(p));
    const telephone = allPhones[0] || '';

    return {
      id: String(getSourceId(o)),
      renter: o.Renter || '',
      street: o.Street || '',
      zipcode: o.Zipcode || '',
      city: o.City || '',
      telephone,
      allPhones: allPhones.filter(Boolean),
      craft: o.Craft || '',
      damage: o.Damage || '',
      disturbanceType: o.DisturbanceType || '',
      emergency: o.Emergency === 1 || o.Emergency > 0,
      dateStr,
      executionDate: o.ExecutionDate ? o.ExecutionDate.substring(0, 10) : '',
      stateDateTime: o.StateDateTime ? o.StateDateTime.substring(0, 10) : '',
      age,
      region,
      contacted,
      distances,
      coords,
      orderState: o.OrderState,
      currentState: o.OrderCurrentState || '',
      // Keep raw for other tabs
      _raw: o,
    };
  }).sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || ''));

  // Init assignments if not set
  if (!STATE.assignments._init) {
    STATE.assignments = { _init: true, unassigned: STATE.orders.map(o => o.id) };
    TECHS.forEach(t => { STATE.assignments[t.id] = []; });
  }

  STATE.ready = true;
}

// Get assignment for an order: returns tech or null
function getAssignedTech(orderId) {
  for (const t of TECHS) {
    if (STATE.assignments[t.id]?.includes(orderId)) return t;
  }
  return null;
}

// Assign order to tech (used from any tab)
function assignOrderToTech(orderId, techId) {
  // Remove from all columns
  for (const key of Object.keys(STATE.assignments)) {
    if (key === '_init') continue;
    const arr = STATE.assignments[key];
    const idx = arr.indexOf(orderId);
    if (idx !== -1) arr.splice(idx, 1);
  }
  // Add to target
  const targetKey = techId === 'unassigned' ? 'unassigned' : parseInt(techId);
  if (!STATE.assignments[targetKey]) STATE.assignments[targetKey] = [];
  STATE.assignments[targetKey].push(orderId);
}

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData(force = false) {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⏳ Laden…';
  btn.disabled = true;

  try {
    const url = '/api/state' + (force ? '?refresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    document.getElementById('loading').classList.add('hidden');
    await buildSharedState();
    updateStats();
    renderCurrentTab();
    updateLastUpdate();
  } catch (err) {
    console.error('Laden fehlgeschlagen:', err);
    document.getElementById('loading').innerHTML =
      `<p class="text-red-400">❌ Fehler beim Laden: ${err.message}</p>
       <button onclick="loadData(true)" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg">Erneut versuchen</button>`;
  } finally {
    btn.textContent = 'Aktualisieren';
    btn.disabled = false;
  }
}

function updateLastUpdate() {
  const el = document.getElementById('lastUpdate');
  const now = new Date();
  el.textContent = `Letzte: ${now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}`;
}

function updateStats() {
  if (!DATA?.stats) return;
  document.getElementById('statTotal').textContent = DATA.stats.total;
  document.getElementById('statNeedContact').textContent = DATA.stats.needContact;
  document.getElementById('statContacted').textContent = DATA.stats.contacted;
  document.getElementById('statGroups').textContent = DATA.stats.addressGroups;
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  ['dashboard', 'orders', 'contact', 'routes', 'planner', 'techs', 'calendar'].forEach(t => {
    const el = document.getElementById('content-' + t);
    if (el) el.classList.toggle('hidden', t !== tab);
    const tabBtn = document.getElementById('tab-' + t);
    if (tabBtn) tabBtn.className = `px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap ${t === tab ? 'tab-active' : 'tab-inactive'}`;
    // Mobile bottom nav
    const mobBtn = document.getElementById('mob-' + t);
    if (mobBtn) mobBtn.className = `flex flex-col items-center gap-0.5 px-3 py-1 ${t === tab ? 'text-blue-400' : 'text-slate-400'}`;
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!DATA) return;
  switch (currentTab) {
    case 'dashboard': renderDashboard(); break;
    case 'orders': renderOrders(); break;
    case 'contact': renderContact(); break;
    case 'routes': renderRoutes(); break;
    case 'planner': renderPlanner(); break;
    case 'techs': renderTechs(); break;
    case 'calendar': renderCalendar(); break;
  }
}

// ═══════════════════════════════════════════════════════════════
// GLOBALE SUCHE
// ═══════════════════════════════════════════════════════════════
let globalSearchQuery = '';
function onGlobalSearch(q) {
  globalSearchQuery = q.toLowerCase().trim();
  renderCurrentTab();
}

function matchesGlobalSearch(o) {
  if (!globalSearchQuery) return true;
  const q = globalSearchQuery;
  const fields = [o.renter, o.street, o.zipcode, o.city, o.telephone, o.craft, o.damage, o.disturbanceType].filter(Boolean);
  return fields.some(f => f.toLowerCase().includes(q));
}

// ═══════════════════════════════════════════════════════════════
// STATUS + NOTIZEN (localStorage)
// ═══════════════════════════════════════════════════════════════
const STATUS_LABELS = {
  'neu':         { label: 'Neu',         color: '#ef4444', icon: '🔴' },
  'kontaktiert': { label: 'Kontaktiert', color: '#f59e0b', icon: '🟡' },
  'termin':      { label: 'Termin',      color: '#22c55e', icon: '🟢' },
  'erledigt':    { label: 'Erledigt',    color: '#3b82f6', icon: '🔵' },
  'abgerechnet': { label: 'Abgerechnet', color: '#94a3b8', icon: '⚪' },
};

function getOrderStatus(orderId) {
  return localStorage.getItem('josh-status-' + orderId) || (STATE.orders?.find(o => o.id === orderId)?.contacted ? 'kontaktiert' : 'neu');
}

function setOrderStatus(orderId, status) {
  localStorage.setItem('josh-status-' + orderId, status);
  renderCurrentTab();
}

function getOrderNote(orderId) {
  return localStorage.getItem('josh-note-' + orderId) || '';
}

function setOrderNote(orderId, note) {
  localStorage.setItem('josh-note-' + orderId, note);
}

// Wiedervorlage (Follow-up date)
function getOrderFollowUp(orderId) {
  return localStorage.getItem('josh-followup-' + orderId) || '';
}

function setOrderFollowUp(orderId, date) {
  if (date) localStorage.setItem('josh-followup-' + orderId, date);
  else localStorage.removeItem('josh-followup-' + orderId);
  renderCurrentTab();
}

// Termin (Appointment date + time)
function getOrderAppointment(orderId) {
  return localStorage.getItem('josh-appointment-' + orderId) || '';
}

function setOrderAppointment(orderId, datetime) {
  if (datetime) {
    localStorage.setItem('josh-appointment-' + datetime.split('T')[0] + '-' + orderId, orderId);
    localStorage.setItem('josh-appointment-' + orderId, datetime);
  } else {
    const old = localStorage.getItem('josh-appointment-' + orderId);
    if (old) localStorage.removeItem('josh-appointment-' + old.split('T')[0] + '-' + orderId);
    localStorage.removeItem('josh-appointment-' + orderId);
  }
  renderCurrentTab();
}

// Get all appointments for a date (YYYY-MM-DD)
function getAppointmentsForDate(dateStr) {
  const results = [];
  if (!STATE.ready) return results;
  STATE.orders.forEach(o => {
    const apt = getOrderAppointment(o.id);
    if (apt && apt.startsWith(dateStr)) {
      results.push({ order: o, datetime: apt, time: apt.includes('T') ? apt.split('T')[1].substring(0,5) : '' });
    }
  });
  results.sort((a, b) => a.datetime.localeCompare(b.datetime));
  return results;
}

// Get all follow-ups for a date
function getFollowUpsForDate(dateStr) {
  const results = [];
  if (!STATE.ready) return results;
  STATE.orders.forEach(o => {
    const fu = getOrderFollowUp(o.id);
    if (fu === dateStr) results.push(o);
  });
  return results;
}

// ═══════════════════════════════════════════════════════════════
// TAB: DASHBOARD (Start)
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const container = document.getElementById('content-dashboard');
  if (!STATE.ready) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Erst "Aktualisieren" klicken</div>';
    return;
  }

  const orders = STATE.orders.filter(o => matchesGlobalSearch(o));
  const now = new Date();
  const today = now.toISOString().split('T')[0];

  // KPIs
  let neuCount = 0, kontaktiertCount = 0, terminCount = 0, erledigtCount = 0, notfallCount = 0, ueberfaelligCount = 0;
  orders.forEach(o => {
    const s = getOrderStatus(o.id);
    if (s === 'neu') neuCount++;
    else if (s === 'kontaktiert') kontaktiertCount++;
    else if (s === 'termin') terminCount++;
    else if (s === 'erledigt' || s === 'abgerechnet') erledigtCount++;
    if (o.emergency) notfallCount++;
    if (o.age > 7 && s !== 'erledigt' && s !== 'abgerechnet') ueberfaelligCount++;
  });

  let html = `
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
    <div class="card p-4 text-center cursor-pointer hover:border-red-500/50" onclick="dashFilter('neu')">
      <div class="text-2xl font-bold text-red-400">${neuCount}</div>
      <div class="text-xs text-slate-400">🔴 Neu</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-amber-500/50" onclick="dashFilter('kontaktiert')">
      <div class="text-2xl font-bold text-amber-400">${kontaktiertCount}</div>
      <div class="text-xs text-slate-400">🟡 Kontaktiert</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-green-500/50" onclick="dashFilter('termin')">
      <div class="text-2xl font-bold text-green-400">${terminCount}</div>
      <div class="text-xs text-slate-400">🟢 Termin</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-blue-500/50" onclick="dashFilter('erledigt')">
      <div class="text-2xl font-bold text-blue-400">${erledigtCount}</div>
      <div class="text-xs text-slate-400">🔵 Erledigt</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-red-500/50" onclick="dashFilter('notfall')">
      <div class="text-2xl font-bold ${notfallCount > 0 ? 'text-red-400 animate-pulse' : 'text-slate-600'}">${notfallCount}</div>
      <div class="text-xs text-slate-400">⚡ Notfälle</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-amber-500/50" onclick="dashFilter('ueberfaellig')">
      <div class="text-2xl font-bold ${ueberfaelligCount > 0 ? 'text-amber-400' : 'text-slate-600'}">${ueberfaelligCount}</div>
      <div class="text-xs text-slate-400">⏰ Überfällig</div>
    </div>
  </div>`;

  // Wiedervorlagen heute
  const todayStr = now.toISOString().split('T')[0];
  const todayFollowUps = orders.filter(o => getOrderFollowUp(o.id) === todayStr);
  if (todayFollowUps.length) {
    html += `<div class="card p-4 mb-4 border-amber-500/50 bg-amber-900/10">
      <h3 class="text-amber-400 font-bold text-sm mb-2">🔔 Wiedervorlagen heute (${todayFollowUps.length})</h3>
      <div class="grid gap-2">`;
    todayFollowUps.forEach(o => { html += renderOrderCard(o, 'compact'); });
    html += '</div></div>';
  }

  // Termine heute
  const todayApts = getAppointmentsForDate(todayStr);
  if (todayApts.length) {
    html += `<div class="card p-4 mb-4 border-green-500/50 bg-green-900/10">
      <h3 class="text-green-400 font-bold text-sm mb-2">📅 Termine heute (${todayApts.length})</h3>
      <div class="grid gap-2">`;
    todayApts.forEach(a => { html += renderOrderCard(a.order, 'compact'); });
    html += '</div></div>';
  }

  // Monteur-Kapazität
  html += `<h3 class="text-white font-bold mb-3">👷 Monteur-Auslastung</h3>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-6">`;
  TECHS.forEach(t => {
    const assigned = (STATE.assignments[t.id] || []).length;
    const pct = Math.min(100, Math.round(assigned / 8 * 100));
    const color = pct > 90 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#22c55e';
    html += `<div class="card p-4" style="border-left:4px solid ${t.color}">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-bold text-white">${esc(t.name)}</span>
        <span class="text-xs" style="color:${color}">${assigned}/8</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="text-xs text-slate-500 mt-1">${esc(t.city)}</div>
    </div>`;
  });
  html += '</div>';

  // Neueste Aufträge (alle, nach Datum sortiert)
  const newest = [...orders].sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || '')).slice(0, 10);
  if (newest.length) {
    html += `<h3 class="text-white font-bold text-sm mb-3">📥 Neueste Aufträge</h3>
    <div class="grid gap-2 mb-6">`;
    newest.forEach(o => { html += renderOrderCard(o, 'compact'); });
    html += '</div>';
  }

  container.innerHTML = html;
}

function toggleStatusDropdown(orderId) {
  const dd = document.getElementById('status-dd-' + orderId);
  if (!dd) return;
  // Close all other dropdowns first
  document.querySelectorAll('[id^="status-dd-"]').forEach(el => { if (el !== dd) el.classList.add('hidden'); });
  dd.classList.toggle('hidden');
}

function toggleNote(orderId) {
  const el = document.getElementById('note-' + orderId);
  if (el) {
    el.classList.toggle('hidden');
    if (!el.classList.contains('hidden')) {
      const input = document.getElementById('note-input-' + orderId);
      if (input) input.focus();
    }
  }
}

function toggleFollowUp(orderId) {
  const el = document.getElementById('followup-' + orderId);
  if (el) el.classList.toggle('hidden');
}

function toggleAppointment(orderId) {
  const el = document.getElementById('appointment-' + orderId);
  if (el) el.classList.toggle('hidden');
}

// Close dropdowns on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('[id^="status-dd-"]') && !e.target.closest('button')) {
    document.querySelectorAll('[id^="status-dd-"]').forEach(el => el.classList.add('hidden'));
  }
});

// HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function regionBadge(region) {
  if (!region) return '<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">—</span>';
  if (region === 'nord') return '<span class="px-2 py-0.5 text-xs rounded-full badge-nord font-medium">Nord 🔴</span>';
  if (region === 'ost') return '<span class="px-2 py-0.5 text-xs rounded-full badge-ost font-medium">Ost 🔵</span>';
  return `<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">${esc(region)}</span>`;
}

function contactBadge(matched) {
  if (matched) return '<span class="px-2 py-0.5 text-xs rounded-full badge-contacted font-medium">🟢 Kontaktiert</span>';
  return '<span class="px-2 py-0.5 text-xs rounded-full badge-open font-medium">🔴 Noch offen</span>';
}

function phoneLink(phone) {
  if (!phone || phone === '-') return '<span class="text-slate-500">—</span>';
  const clean = phone.replace(/[^\d+]/g, '');
  return `<a href="tel:${esc(clean)}" class="text-blue-400 hover:text-blue-300 hover:underline">${esc(phone)}</a>`;
}

function allPhonesDisplay(order) {
  const phones = order._allPhones || [];
  const mainPhone = order.Telephone || '';
  if (phones.length <= 1) return phoneLink(mainPhone);
  // Show main phone + extras from Remarks
  let html = phoneLink(mainPhone);
  const mainNorm = phones[0] || '';
  const extras = phones.filter((p, i) => i > 0 || !mainPhone);
  if (extras.length) {
    html += '<div class="mt-1">';
    for (const p of extras) {
      html += `<div class="text-xs"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)}</a></div>`;
    }
    html += '</div>';
  }
  return html;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
  } catch { return dateStr; }
}

function getSourceId(order) {
  return order.ID?.SourceId || order.SourceId || '';
}

function matchesSearch(order, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  const fields = [
    getSourceId(order), order.Renter, order.Street, order.City,
    order.Zipcode, order.Telephone, order.Craft, order.DisturbanceType,
    order.Damage
  ];
  return fields.some(f => f && String(f).toLowerCase().includes(lower));
}

function sortOrders(orders, field, dir) {
  const mult = dir === 'asc' ? 1 : -1;
  return [...orders].sort((a, b) => {
    let va, vb;
    switch (field) {
      case 'date':
        va = a.DateOfReceipt || ''; vb = b.DateOfReceipt || '';
        return mult * va.localeCompare(vb);
      case 'region':
        va = a._region || 'zzz'; vb = b._region || 'zzz';
        return mult * va.localeCompare(vb);
      case 'contact':
        va = a._match?.matched ? 1 : 0; vb = b._match?.matched ? 1 : 0;
        return mult * (va - vb);
      case 'plz':
        va = a.Zipcode || ''; vb = b.Zipcode || '';
        return mult * va.localeCompare(vb);
      default:
        return 0;
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// TAB 1: ALLE AUFTRÄGE
// ═══════════════════════════════════════════════════════════════
let orderStatusFilter = 'alle';

function renderOrders() {
  const container = document.getElementById('content-orders');
  if (!STATE.ready) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Erst "Aktualisieren" klicken</div>';
    return;
  }

  const allOrders = STATE.orders.filter(o => matchesGlobalSearch(o));

  // Status filter buttons
  const counts = { alle: allOrders.length, neu: 0, kontaktiert: 0, termin: 0, erledigt: 0, notfall: 0, ueberfaellig: 0 };
  allOrders.forEach(o => {
    const s = getOrderStatus(o.id);
    if (counts[s] !== undefined) counts[s]++;
    if (o.emergency) counts.notfall++;
    if (o.age > 7 && s !== 'erledigt' && s !== 'abgerechnet') counts.ueberfaellig++;
  });

  let html = `<div class="flex flex-wrap gap-2 mb-3">
    ${['alle','neu','kontaktiert','termin','erledigt','ueberfaellig'].map(f => {
      const labels = {alle:'📋 Alle',neu:'🔴 Neu',kontaktiert:'🟡 Kontaktiert',termin:'🟢 Termin',erledigt:'🔵 Erledigt',ueberfaellig:'⏰ Überfällig'};
      return `<button onclick="orderStatusFilter='${f}';renderOrders()"
        class="px-3 py-1.5 rounded-lg text-xs font-medium ${orderStatusFilter===f ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}">${labels[f]} (${counts[f]})</button>`;
    }).join('')}
  </div>
  <div class="flex flex-wrap gap-2 mb-3 items-center">
    <span class="text-xs text-slate-500">Eingang:</span>
    ${(() => {
      const now2 = new Date();
      const todayISO = now2.toISOString().split('T')[0];
      const yesterdayISO = new Date(now2.getTime() - 86400000).toISOString().split('T')[0];
      const threeDaysAgo = new Date(now2.getTime() - 3*86400000).toISOString().split('T')[0];
      const weekAgo = new Date(now2.getTime() - 7*86400000).toISOString().split('T')[0];
      const od = (o) => o.stateDateTime > o.dateStr ? o.stateDateTime : o.dateStr;
      const cToday = allOrders.filter(o => od(o) === todayISO || o.dateStr === todayISO).length;
      const cYesterday = allOrders.filter(o => od(o) === yesterdayISO || o.dateStr === yesterdayISO).length;
      const c3d = allOrders.filter(o => od(o) >= threeDaysAgo || o.dateStr >= threeDaysAgo).length;
      const c7d = allOrders.filter(o => od(o) >= weekAgo || o.dateStr >= weekAgo).length;
      const filters = [
        {k:'alle', l:'Alle', c:allOrders.length},
        {k:'heute', l:'Heute', c:cToday},
        {k:'gestern', l:'Gestern', c:cYesterday},
        {k:'3d', l:'3 Tage', c:c3d},
        {k:'7d', l:'7 Tage', c:c7d},
      ];
      return filters.map(f => `<button onclick="window.dateFilter='${f.k}';renderOrders()" class="px-2 py-1 text-xs rounded ${(window.dateFilter||'alle')===f.k?'bg-green-600 text-white':'bg-slate-700 text-slate-400'}">${f.l} (${f.c})</button>`).join('');
    })()}
  </div>`;

  // Filter
  let filtered = allOrders;
  if (orderStatusFilter === 'notfall') {
    filtered = allOrders.filter(o => o.emergency);
  } else if (orderStatusFilter === 'ueberfaellig') {
    filtered = allOrders.filter(o => o.age > 7 && !['erledigt','abgerechnet'].includes(getOrderStatus(o.id)));
  } else if (orderStatusFilter !== 'alle') {
    filtered = allOrders.filter(o => getOrderStatus(o.id) === orderStatusFilter);
  }

  // Date filter — checks DateOfReceipt OR StateDateTime (when B&O processed it)
  const df = window.dateFilter || 'alle';
  if (df !== 'alle') {
    const now2 = new Date();
    const todayISO = now2.toISOString().split('T')[0];
    const yesterdayISO = new Date(now2.getTime() - 86400000).toISOString().split('T')[0];
    const threeDaysAgo = new Date(now2.getTime() - 3*86400000).toISOString().split('T')[0];
    const weekAgo = new Date(now2.getTime() - 7*86400000).toISOString().split('T')[0];
    const orderDate = (o) => o.stateDateTime > o.dateStr ? o.stateDateTime : o.dateStr;

    if (df === 'heute') {
      filtered = filtered.filter(o => orderDate(o) === todayISO || o.dateStr === todayISO);
    } else if (df === 'gestern') {
      filtered = filtered.filter(o => orderDate(o) === yesterdayISO || o.dateStr === yesterdayISO);
    } else if (df === '3d') {
      filtered = filtered.filter(o => orderDate(o) >= threeDaysAgo || o.dateStr >= threeDaysAgo);
    } else if (df === '7d') {
      filtered = filtered.filter(o => orderDate(o) >= weekAgo || o.dateStr >= weekAgo);
    }
  }

  // Sort: newest first (DateOfReceipt)
  filtered.sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || ''));

  if (!filtered.length) {
    html += '<div class="card p-8 text-center text-slate-400">Keine Aufträge in dieser Kategorie</div>';
  } else {
    html += `<div class="grid gap-2">`;
    filtered.forEach(o => { html += renderOrderCard(o, 'full'); });
    html += '</div>';
  }

  html += `<div class="mt-3 text-xs text-slate-500">${filtered.length} von ${allOrders.length} Aufträgen</div>`;
  container.innerHTML = html;
}

function renderContact() {
  const container = document.getElementById('content-contact');
  const orders = DATA.orders?.needContact || [];

  if (!orders.length) {
    container.innerHTML = '<div class="card p-8 text-center"><div class="text-4xl mb-3">🎉</div><div class="text-green-400 font-medium">Alle Kunden kontaktiert!</div></div>';
    return;
  }

  // Group by region
  const nord = orders.filter(o => o._region === 'nord');
  const ost = orders.filter(o => o._region === 'ost');
  const other = orders.filter(o => o._region !== 'nord' && o._region !== 'ost');

  let html = '';

  function renderRegionGroup(title, regionOrders, colorClass) {
    if (!regionOrders.length) return '';
    let h = `<div class="mb-6">
      <h3 class="text-lg font-bold mb-3 ${colorClass}">${title} (${regionOrders.length})</h3>
      <div class="grid gap-3 md:grid-cols-2 lg:grid-cols-3">`;
    
    for (const o of regionOrders) {
      const techRec = o._recommendedTech;
      h += `<div class="card p-4">
        <div class="flex justify-between items-start mb-3">
          <div>
            <span class="font-mono text-xs text-slate-400">${esc(getSourceId(o))}</span>
            <span class="text-xs text-slate-500 ml-2">${formatDate(o.DateOfReceipt)}</span>
          </div>
          ${regionBadge(o._region)}
        </div>
        <div class="text-white font-medium mb-1">${esc(o.Renter)}</div>
        <div class="text-sm text-slate-400 mb-3">${esc(o.Street)}, ${esc(o.Zipcode)} ${esc(o.City)}</div>
        ${(o._allPhones && o._allPhones.length) || (o.Telephone && o.Telephone !== '-') ? `
          <div class="mb-3">
            ${o.Telephone && o.Telephone !== '-' ? `<div class="text-xl font-bold text-blue-400">
              <a href="tel:${esc(o.Telephone.replace(/[^\d+]/g,''))}" class="hover:text-blue-300">📞 ${esc(o.Telephone)}</a>
            </div>` : ''}
            ${(o._allPhones || []).filter(p => {
              const mainClean = (o.Telephone || '').replace(/[^\d+]/g, '');
              return p !== mainClean && !mainClean.includes(p.replace('+49','0').replace(/^0/,''));
            }).map(p => `<div class="text-sm mt-1"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)} <span class="text-xs text-slate-500">(aus Beschreibung)</span></a></div>`).join('')}
          </div>` : '<div class="text-slate-500 mb-3">Keine Telefonnummer</div>'}
        <div class="text-xs text-slate-500 mb-2">${esc(o.Craft)} — ${esc(o.Damage || o.DisturbanceType || '')}</div>
        ${techRec ? `<div class="text-xs text-slate-400">👷 Empfehlung: <span class="text-white font-medium">${esc(techRec.name)}</span></div>` : ''}
        ${o.Remarks ? `<div class="text-xs text-yellow-500 mt-2">📝 ${esc(o.Remarks.substring(0, 100))}${o.Remarks.length > 100 ? '…' : ''}</div>` : ''}
      </div>`;
    }
    h += '</div></div>';
    return h;
  }

  html += renderRegionGroup('🔴 Region Nord', nord, 'text-red-400');
  html += renderRegionGroup('🔵 Region Ost', ost, 'text-blue-400');
  if (other.length) html += renderRegionGroup('— Ohne Region', other, 'text-slate-400');

  container.innerHTML = html;
}

  { id: 2, name: 'Nico Walczak', city: 'Sundern', home: [8.0011, 51.3279], color: '#22c55e' },
  { id: 3, name: 'Adem', city: 'Sundern', home: [8.0011, 51.3279], color: '#f59e0b' },
  { id: 4, name: 'Ramiz', city: 'Hamm', home: [7.8159, 51.6739], color: '#ef4444' },
];
let routeMap = null;
let routeMapLayers = [];
let routeAllOrders = null;
let routeSelectedTech = null;
let routeSelectedOrders = new Set();
let lastRouteResult = null; // persist last calculated route

        </select>
      </div>

      </div>

        <button onclick="loadRouteOrders()" id="loadOrdersBtn"

          🔄 Aktualisieren
        </button>
        <button onclick="optimizeSelectedRoute()" id="optimizeBtn" disabled
          class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded-lg text-sm font-medium transition-colors">

      </div>

        <button onclick="setRouteSort('oldest')" id="sort-oldest" class="px-2 py-1 text-xs rounded ${window._routeSortMode==='oldest'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">📅 Älteste</button>
        <button onclick="setRouteSort('distance')" id="sort-distance" class="px-2 py-1 text-xs rounded ${window._routeSortMode==='distance'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">📍 Nähe</button>
        <button onclick="setRouteSort('emergency')" id="sort-emergency" class="px-2 py-1 text-xs rounded ${window._routeSortMode==='emergency'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">⚡ Notfälle</button>
      </div>

    </div>

    <!-- Kapazitäts-Balken -->

    <div class="card mb-3 overflow-hidden" style="height:400px">
      <div id="route-map" style="height:100%;width:100%"></div>
    </div>

    <div id="route-result" class="mb-3"></div>

    <!-- Order list -->

function initRouteMap() {
  const mapEl = document.getElementById('route-map');
  if (!mapEl) return;

  // If map already exists, just resize it (Leaflet needs this after tab switch)
  if (routeMap) {
    routeMap.invalidateSize();
    return;
  }

  routeMap = L.map('route-map', { center: [51.55, 8.1], zoom: 9, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO', maxZoom: 19,
  }).addTo(routeMap);

  showTechHomes();
}

function showTechHomes() {
  if (!routeMap) return;
  const show = routeSelectedTech ? TECHS.filter(t => t.id === routeSelectedTech) : TECHS;
  for (const t of show) {
    const icon = L.divIcon({
      html: `<div style="color:${t.color};font-size:24px;text-shadow:0 0 4px rgba(0,0,0,0.8);">🏠</div>`,
      className: '', iconSize: [28, 28], iconAnchor: [14, 14],
    });
    const m = L.marker([t.home[1], t.home[0]], { icon }).addTo(routeMap)
      .bindPopup(`<strong style="color:${t.color}">${t.name}</strong><br>${t.city} (Start)`);
    routeMapLayers.push(m);
  }
}

function clearRouteMap() {
  if (!routeMap) return;
  for (const l of routeMapLayers) routeMap.removeLayer(l);
  routeMapLayers = [];
}

function onTechSelected() {
  const sel = document.getElementById('techSelect');
  routeSelectedTech = sel.value ? parseInt(sel.value) : null;
  routeSelectedOrders.clear();
  document.getElementById('route-result').innerHTML = '';
  clearRouteMap();
  showTechHomes();
  // Auto-load: if "Zugeordnete" view mode, load assigned orders
  loadRouteOrders();
  updateOptimizeBtn();
}

function updateOptimizeBtn() {
  const btn = document.getElementById('optimizeBtn');
  if (btn) btn.disabled = !(routeSelectedTech && routeSelectedOrders.size > 0);
}

function toggleOrderSelection(orderId) {
  if (routeSelectedOrders.has(orderId)) {
    routeSelectedOrders.delete(orderId);
  } else {
    routeSelectedOrders.add(orderId);
  }
  // Update checkbox UI
  const cb = document.getElementById('cb-' + orderId);
  if (cb) cb.checked = routeSelectedOrders.has(orderId);
  // Update row highlight
  const row = document.getElementById('row-' + orderId);
  if (row) {
    if (routeSelectedOrders.has(orderId)) {
      row.classList.add('bg-slate-800/60');
      row.classList.remove('hover:bg-dark-hover');
    } else {
      row.classList.remove('bg-slate-800/60');
      row.classList.add('hover:bg-dark-hover');
    }
  }
  updateOptimizeBtn();
  updateSelectionCounter();
  renderCapacityBar();
  showSelectedOnMap();
}

function selectAllOrders() {
  if (!routeAllOrders) return;
  const sorted = getSortedOrders();
  if (routeSelectedOrders.size === sorted.length) {
    routeSelectedOrders.clear(); // deselect all
  } else {
    sorted.forEach(o => routeSelectedOrders.add(o.id));
  }
  renderOrderList();
  updateOptimizeBtn();
  showSelectedOnMap();
}

function setRouteSort(mode) {
  window._routeSortMode = mode;
  // Update button styles
  ['newest','oldest','distance','emergency'].forEach(m => {
    const btn = document.getElementById('sort-' + m);
    if (btn) {
      if (m === mode) { btn.className = 'px-2 py-1 text-xs rounded bg-blue-600 text-white'; }
      else { btn.className = 'px-2 py-1 text-xs rounded bg-slate-700 text-slate-400 hover:bg-slate-600'; }
    }
  });
  if (routeAllOrders) renderOrderList();
}

function getSortedOrders() {
  if (!routeAllOrders) return [];
  const mode = window.routeSort || window._routeSortMode || 'distance';
  const arr = [...routeAllOrders];

  if (mode === 'newest') {
    arr.sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || ''));
  } else if (mode === 'oldest') {
    arr.sort((a, b) => (a.dateStr || '').localeCompare(b.dateStr || ''));
  } else if (mode === 'distance' && routeSelectedTech) {
    arr.sort((a, b) => (a.distances?.[routeSelectedTech] || 999) - (b.distances?.[routeSelectedTech] || 999));
  } else if (mode === 'emergency') {
    arr.sort((a, b) => {
      if (a.emergency && !b.emergency) return -1;
      if (!a.emergency && b.emergency) return 1;
      return (b.dateStr || '').localeCompare(a.dateStr || '');
    });
  }
  return arr;
}

function renderCapacityBar() {
  const el = document.getElementById('tech-capacity');
  if (!el) return;
  if (!routeSelectedTech || !routeAllOrders) { el.innerHTML = ''; return; }

  const tech = TECHS.find(t => t.id === routeSelectedTech);
  if (!tech) return;

  const MAX_JOBS_PER_DAY = 8; // ~8 Aufträge pro Tag realistisch
  const selectedCount = routeSelectedOrders.size;
  const totalForTech = routeAllOrders.filter(o => {
    const d = o.distances?.[routeSelectedTech];
    return d !== undefined && d < 60; // within 60km range
  }).length;
  const pct = Math.min(100, Math.round(selectedCount / MAX_JOBS_PER_DAY * 100));
  const color = pct > 90 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#22c55e';
  const label = pct > 90 ? '⚠️ Überlastet' : pct > 60 ? '🟡 Gut ausgelastet' : '🟢 Kapazität frei';

  el.innerHTML = `<div class="card p-3">
    <div class="flex items-center justify-between mb-2">
      <span class="text-sm text-white font-medium" style="color:${tech.color}">${esc(tech.name)}</span>
      <span class="text-xs text-slate-400">${selectedCount} / ${MAX_JOBS_PER_DAY} Aufträge ausgewählt ${label}</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    <div class="flex justify-between mt-1 text-xs text-slate-500">
      <span>${totalForTech} Aufträge im Umkreis 60km</span>
      <span>Max ~${MAX_JOBS_PER_DAY}/Tag</span>
    </div>
  </div>`;
}

function updateSelectionCounter() {
  const el = document.getElementById('selection-count');
  if (el) el.textContent = routeSelectedOrders.size;
}

function showSelectedOnMap() {
  if (!routeMap) initRouteMap();
  clearRouteMap();
  showTechHomes();
  if (!routeMap || !routeAllOrders) return;
  routeMap.invalidateSize();

  const tech = TECHS.find(t => t.id === routeSelectedTech);
  if (!tech) return;

  const selected = routeAllOrders.filter(o => routeSelectedOrders.has(o.id) && o.coords);
  if (!selected.length) {
    // Debug: if no coords, check why
    const noCoords = routeAllOrders.filter(o => routeSelectedOrders.has(o.id) && !o.coords);
    if (noCoords.length > 0) {
      console.warn('[MAP] Selected orders ohne coords:', noCoords.map(o => ({id:o.id, zipcode:o.zipcode, city:o.city})));
    }
    return;
  }

  const allCoords = [[tech.home[1], tech.home[0]]];
  selected.forEach((o) => {
    const latLng = [o.coords[1], o.coords[0]];
    allCoords.push(latLng);
    const icon = L.divIcon({
      html: `<div style="background:${tech.color};color:#fff;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.7);"></div>`,
      className: '', iconSize: [14, 14], iconAnchor: [7, 7],
    });
    const m = L.marker(latLng, { icon }).addTo(routeMap)
      .bindPopup(`<b>${esc(o.renter)}</b><br>${esc(o.street)}<br>${esc(o.zipcode)} ${esc(o.city)}${o.telephone ? '<br>📞 '+esc(o.telephone) : ''}`);
    routeMapLayers.push(m);
  });

  if (selected.length === 1) {
    routeMap.setView([selected[0].coords[1], selected[0].coords[0]], 13);
  } else if (allCoords.length > 1) {
    routeMap.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
  }
}

function haversineKm(lon1, lat1, lon2, lat2) {
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return Math.round(6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 10) / 10;
}

function loadRouteOrders() {
  const list = document.getElementById('route-order-list');
  const infoEl = document.getElementById('route-info');

  if (!STATE.ready) {
    // Try to build state from existing DATA
    if (DATA?.orders) {
      buildSharedState().then(() => loadRouteOrders());
      list.innerHTML = '<div class="card p-8 text-center text-slate-400">⏳ Lade Aufträge…</div>';
    } else {
      list.innerHTML = '<div class="card p-8 text-center text-slate-500">Erst oben "Aktualisieren" klicken</div>';
    }
    return;
  }

  const viewMode = document.getElementById('routeViewMode')?.value || '3d';
  let filtered;

  if (viewMode === 'assigned' && routeSelectedTech) {
    const assignedIds = STATE.assignments[routeSelectedTech] || [];
    filtered = STATE.orders.filter(o => assignedIds.includes(o.id) && o.coords);
    routeSelectedOrders = new Set(filtered.map(o => o.id));
  } else if (viewMode.endsWith('d')) {
    const days = parseInt(viewMode);
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    const cut = cutoff.toISOString().split('T')[0];
    filtered = STATE.orders.filter(o => o.dateStr >= cut && o.coords);
  } else {
    filtered = STATE.orders.filter(o => o.coords);
  }

  routeAllOrders = filtered;

  // Update info text
  const assignedCount = routeSelectedTech ? (STATE.assignments[routeSelectedTech]?.length || 0) : 0;
  if (infoEl) {
    infoEl.innerHTML = `${filtered.length} Aufträge` +
      (routeSelectedTech && assignedCount > 0 ? ` · <span class="text-emerald-400">${assignedCount} zugeordnet im Tagesplan</span>` : '') +
      (viewMode === 'assigned' && assignedCount === 0 ? ' · <span class="text-amber-400">Noch keine Zuordnung — erst im Tagesplan zuordnen</span>' : '');
  }

  renderOrderList();
  showSelectedOnMap();
  updateOptimizeBtn();
}

function renderOrderList() {
  const list = document.getElementById('route-order-list');
  if (!routeAllOrders || !routeAllOrders.length) {
    list.innerHTML = '<div class="card p-8 text-center text-slate-500">Keine offenen Aufträge</div>';
    return;
  }

  const sorted = getSortedOrders().filter(o => o.coords);
  const allSelected = routeSelectedOrders.size === sorted.length && sorted.length > 0;

  let html = `<div class="card overflow-hidden">
    <div class="p-3 border-b border-dark-border flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="selectAllOrders()" class="px-3 py-1 text-xs font-medium rounded ${allSelected ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}">${allSelected ? '☑ Alle abwählen' : '☐ Alle auswählen'}</button>
        <span class="text-sm text-slate-400"><span id="selection-count">${routeSelectedOrders.size}</span> / ${sorted.length} ausgewählt</span>
      </div>
      <div class="flex gap-1">
        <button onclick="window.routeSort='distance';renderOrderList()" class="px-2 py-1 text-xs rounded ${(window.routeSort||'distance')==='distance'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400'}">📍 Nähe</button>
        <button onclick="window.routeSort='newest';renderOrderList()" class="px-2 py-1 text-xs rounded ${(window.routeSort||'distance')==='newest'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400'}">🕐 Neueste</button>
        <button onclick="window.routeSort='oldest';renderOrderList()" class="px-2 py-1 text-xs rounded ${(window.routeSort||'distance')==='oldest'?'bg-blue-600 text-white':'bg-slate-700 text-slate-400'}">📅 Älteste</button>
      </div>
    </div>
    <div class="divide-y divide-dark-border/30" style="max-height:500px;overflow-y:auto">`;

  for (const o of sorted) {
    const dist = routeSelectedTech ? o.distances?.[routeSelectedTech] : null;
    const checked = routeSelectedOrders.has(o.id);
    const bgClass = checked ? 'bg-slate-800/60' : o.emergency ? 'bg-red-900/20 hover:bg-red-900/30' : 'hover:bg-dark-hover';
    const borderClass = o.emergency ? 'border-l-4 border-red-500' : '';
    const recDate = o.dateOfReceipt ? o.dateOfReceipt.substring(0, 10) : '';
    const age = recDate ? Math.floor((Date.now() - new Date(recDate).getTime()) / 86400000) : null;
    const ageText = age !== null ? (age === 0 ? 'heute' : age === 1 ? 'gestern' : `${age} Tage`) : '';

    html += `<div id="row-${esc(o.id)}" class="p-3 cursor-pointer transition-colors ${bgClass} ${borderClass}" onclick="toggleOrderSelection('${esc(o.id)}')">
      <div class="flex items-center gap-3">
        <input type="checkbox" id="cb-${esc(o.id)}" ${checked ? 'checked' : ''} class="w-4 h-4 accent-blue-500 pointer-events-none" tabindex="-1">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-mono text-xs text-slate-500">#${esc(o.id)}</span>
            ${o.emergency ? '<span class="text-red-400 font-bold text-xs px-1 py-0.5 bg-red-900/50 rounded">⚡</span>' : ''}
            <span class="text-white font-medium text-sm">${esc(o.renter)}</span>
            ${o.contacted ? '<span class="text-xs px-1.5 py-0.5 rounded bg-green-900/50 text-green-400">✅</span>' : '<span class="text-xs px-1.5 py-0.5 rounded bg-red-900/50 text-red-400">📞</span>'}
            ${o.region === 'nord' ? '<span class="text-xs px-1 py-0.5 rounded bg-red-900/50 text-red-300">Nord</span>' : o.region === 'ost' ? '<span class="text-xs px-1 py-0.5 rounded bg-blue-900/50 text-blue-300">Ost</span>' : ''}
          </div>
          <div class="text-xs text-slate-400 mt-0.5">${esc(o.street)}, ${esc(o.zipcode)} ${esc(o.city)} · <span class="${age > 14 ? 'text-amber-400' : 'text-slate-500'}">📥 ${o.dateStr ? new Date(o.dateStr).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) : '?'}${ageText ? ' ('+ageText+')' : ''}</span></div>
          <div class="text-xs text-slate-500">${esc(o.craft || '')}${o.damage ? ' — ' + esc(o.damage.substring(0, 60)) : o.disturbanceType ? ' — ' + esc(o.disturbanceType) : ''}${o.telephone ? ' · <a href="tel:'+esc(o.telephone.replace(/[^\\d+]/g,''))+'" class="text-blue-400" onclick="event.stopPropagation()">'+esc(o.telephone)+'</a>' : ''}</div>
        </div>
        ${dist !== null ? `<div class="text-right flex-shrink-0">
          <div class="text-sm font-bold ${dist < 20 ? 'text-green-400' : dist < 40 ? 'text-amber-400' : 'text-red-400'}">${dist} km</div>

      </div>

  }

  html += '</div></div>';
  list.innerHTML = html;
  updateSelectionCounter();
  renderCapacityBar();
}

function formatDuration(seconds) {
  if (!seconds) return '—';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}min` : `${m} min`;
}

async function optimizeSelectedRoute() {
  console.log('[Route] Tech:', routeSelectedTech, 'Selected:', routeSelectedOrders.size, 'AllOrders:', routeAllOrders?.length);
  if (!routeSelectedTech || routeSelectedOrders.size === 0) {
    const result = document.getElementById('route-result');
    if (result) result.innerHTML = `<div class="card p-4 text-center text-amber-400">⚠️ ${!routeSelectedTech ? 'Bitte Monteur auswählen' : 'Bitte Aufträge auswählen (Checkboxen oder "Alle auswählen")'}</div>`;
    return;
  }
  const btn = document.getElementById('optimizeBtn');
  const result = document.getElementById('route-result');
  btn.disabled = true;
  btn.textContent = '⏳ Berechne…';
  result.innerHTML = '<div class="card p-4 text-center text-slate-400">Route wird optimiert…</div>';

  try {
    // Send orders with coords directly — no server-side B&O lookup needed
    const selectedOrders = routeAllOrders
      .filter(o => routeSelectedOrders.has(o.id))
      .map(o => ({ id: o.id, renter: o.renter, street: o.street, zipcode: o.zipcode, city: o.city, telephone: o.telephone, craft: o.craft, disturbanceType: o.disturbanceType, damage: o.damage, emergency: o.emergency, coords: o.coords, dateStr: o.dateStr, age: o.age }));

    const res = await fetch('/api/routes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'optimize', techId: routeSelectedTech, orders: selectedOrders }),
    });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'HTTP ' + res.status);
    const data = await res.json();
    lastRouteResult = data; // persist for re-render
    renderRouteResult(data);
  } catch (err) {
    result.innerHTML = `<div class="card p-4 text-center text-red-400">❌ ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🗺️ Route berechnen';
    updateOptimizeBtn();
  }
}

function renderRouteResult(data) {
  const result = document.getElementById('route-result');
  const tech = data.tech;
  const orders = data.orders || [];
  if (!orders.length) {
    result.innerHTML = '<div class="card p-4 text-center text-slate-500">Keine Route berechnet</div>';
    return;
  }

  // Google Maps URL: start → waypoints → last stop
  const origin = `${tech.home[1]},${tech.home[0]}`;
  const waypoints = orders.slice(0, -1).map(o => `${o.coords[1]},${o.coords[0]}`).join('|');
  const lastOrder = orders[orders.length - 1];
  const destination = `${lastOrder.coords[1]},${lastOrder.coords[0]}`;
  let gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
  if (waypoints) gmapsUrl += `&waypoints=${waypoints}`;

  let html = `<div class="card overflow-hidden" style="border-left: 4px solid ${tech.color}">
    <div class="p-4 border-b border-dark-border flex items-center justify-between flex-wrap gap-3">
      <div>
        <div class="text-white font-bold text-lg" style="color:${tech.color}">📋 Route: ${esc(tech.name)}</div>
        <div class="text-sm text-slate-400">${orders.length} Aufträge · ${data.totalDistance} km · ${formatDuration(data.totalDuration)}</div>
      </div>
      <div class="flex gap-2">
        <a href="${gmapsUrl}" target="_blank" rel="noopener"
          class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white rounded-lg text-sm font-medium transition-colors whitespace-nowrap">
          📍 In Google Maps öffnen
        </a>
        <button onclick="copyRouteText()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium transition-colors whitespace-nowrap">
          📋 Kopieren
        </button>
        <button onclick="shareWhatsApp()" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-medium transition-colors whitespace-nowrap">
          💬 WhatsApp
        </button>
      </div>
    </div>
    <div class="divide-y divide-dark-border/50">`;

  orders.forEach((o, idx) => {
    const dateText = o.dateStr ? new Date(o.dateStr).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'}) : '';
    const ageText = o.age !== undefined && o.age !== null ? (o.age === 0 ? 'heute' : o.age === 1 ? 'gestern' : `vor ${o.age} Tagen`) : '';
    const ageColor = o.age > 14 ? 'text-amber-400' : 'text-slate-500';

    html += `<div class="p-3">
      <div class="flex items-start gap-3">
        <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white" style="background:${tech.color}">${idx + 1}</div>
        <div class="flex-1">
          <div class="flex items-center gap-2">
            <span class="text-white font-medium text-sm">${esc(o.renter)}</span>
            ${o.emergency ? '<span class="text-red-400 text-xs font-bold">⚡</span>' : ''}
            ${dateText ? `<span class="text-xs ${ageColor}">📅 ${dateText}${ageText ? ' (' + ageText + ')' : ''}</span>` : ''}
          </div>
          <div class="text-xs text-slate-400">${esc(o.street)}, ${esc(o.zipcode)} ${esc(o.city)}</div>
          <div class="text-xs text-slate-500">${esc(o.craft || '')}${o.damage ? ' — ' + esc(o.damage.substring(0,60)) : o.disturbanceType ? ' — ' + esc(o.disturbanceType) : ''}${o.telephone ? ' · <a href="tel:'+esc(o.telephone.replace(/[^\\d+]/g,''))+'" class="text-blue-400">'+esc(o.telephone)+'</a>' : ''}</div>
        </div>
      </div>
    </div>`;
  });

  html += '</div></div>';

  // Store for copy (WhatsApp-friendly format)
  window._lastRouteText = `🗺️ Route ${tech.name} — ${orders.length} Aufträge, ${data.totalDistance} km, ca. ${formatDuration(data.totalDuration)}\n\n` +
    orders.map((o, i) => `${i+1}. *${o.renter}*\n   📍 ${o.street}, ${o.zipcode} ${o.city}${o.telephone ? '\n   📞 ' + o.telephone : ''}${o.craft ? '\n   🔧 ' + o.craft : ''}`).join('\n\n') +
    `\n\n📍 Google Maps:\n${gmapsUrl}`;
  window._lastRouteGmaps = gmapsUrl;

  result.innerHTML = html;

  // Update map with optimized route
  clearRouteMap();
  showTechHomes();
  if (!routeMap) return;

  const allCoords = [[tech.home[1], tech.home[0]]];

  // Draw actual road route if available
  if (data.routeGeometry && data.routeGeometry.length > 1) {
    const roadCoords = data.routeGeometry.map(c => [c[1], c[0]]);
    const polyline = L.polyline(roadCoords, { color: tech.color, weight: 4, opacity: 0.8 }).addTo(routeMap);
    routeMapLayers.push(polyline);
    roadCoords.forEach(c => allCoords.push(c));
  } else {
    // Fallback: straight lines
    const lineCoords = [[tech.home[1], tech.home[0]], ...orders.map(o => [o.coords[1], o.coords[0]])];
    const polyline = L.polyline(lineCoords, { color: tech.color, weight: 3, opacity: 0.7, dashArray: '8 4' }).addTo(routeMap);
    routeMapLayers.push(polyline);
  }

  // Numbered markers
  orders.forEach((o, idx) => {
    const latLng = [o.coords[1], o.coords[0]];
    allCoords.push(latLng);
    const icon = L.divIcon({
      html: `<div style="background:${tech.color};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);">${idx + 1}</div>`,
      className: '', iconSize: [26, 26], iconAnchor: [13, 13],
    });
    const m = L.marker(latLng, { icon }).addTo(routeMap)
      .bindPopup(`<strong>Stop ${idx+1}</strong><br>${esc(o.renter)}<br>${esc(o.street)}<br>${esc(o.zipcode)} ${esc(o.city)}`);
    routeMapLayers.push(m);
  });

  routeMap.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
}

function copyRouteText() {
  if (window._lastRouteText) {
    navigator.clipboard.writeText(window._lastRouteText).then(() => {
      const btn = event.target;
      btn.textContent = '✅ Kopiert!';
      setTimeout(() => btn.textContent = '📋 Kopieren', 2000);
    });

}

function shareWhatsApp() {
  if (window._lastRouteText) {
    const url = `https://wa.me/?text=${encodeURIComponent(window._lastRouteText)}`;
    window.open(url, '_blank');

}

// TAB 4: TAGESPLAN (Drag & Drop Kanban)
// ═══════════════════════════════════════════════════════════════
let plannerAssignments = {}; // { techId: [orderId, ...] }
let plannerOrders = []; // all orders for planner
let plannerFiltered = []; // filtered subset
let plannerFilter = 'newest3'; // default: last 3 days (neueste sind relevant)
let plannerRegionMap = null; // PLZ→region from DATA

function renderPlanner() {
  const container = document.getElementById('content-planner');
  const allRaw = DATA.orders?.all?.length
    ? DATA.orders.all.filter(o => o.OrderState <= 3)
    : [...(DATA.orders?.needContact || []), ...(DATA.orders?.contacted || [])];

  if (!allRaw.length) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Aufträge — erst oben "Aktualisieren"</div>';
    return;
  }

  // Build region map from addressGroups if available
  if (DATA.addressGroups) {
    plannerRegionMap = {};
    for (const g of DATA.addressGroups) {
      if (g.zipcode && g.region) plannerRegionMap[g.zipcode] = g.region;
    }
  }

  loadPLZCoords().then(plzCoords => {
    plannerOrders = allRaw.map(o => {
      const coords = plzCoords[o.Zipcode];
      const distances = {};
      if (coords) {
        TECHS.forEach(t => { distances[t.id] = haversineKm(coords[0], coords[1], t.home[0], t.home[1]); });
      }
      const dateStr = o.DateOfReceipt ? o.DateOfReceipt.substring(0, 10) : '';
      const age = dateStr ? Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000) : null;
      const region = o._region || (plannerRegionMap && plannerRegionMap[o.Zipcode]) || null;
      return {
        id: getSourceId(o),
        renter: o.Renter || '',
        street: o.Street || '',
        zipcode: o.Zipcode || '',
        city: o.City || '',
        telephone: o.Telephone || '',
        craft: o.Craft || '',
        damage: o.Damage || '',
        disturbanceType: o.DisturbanceType || '',
        emergency: o.Emergency === 1,
        dateStr,
        age,
        region,
        distances,
        coords,
      };
    }).sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || '')); // newest first

    applyPlannerFilter();
    renderPlannerBoard();
  });
}

function applyPlannerFilter() {
  const f = plannerFilter;
  if (f === 'all') {
    plannerFiltered = [...plannerOrders];
  } else if (f.startsWith('newest')) {
    const days = parseInt(f.replace('newest', ''));
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    const cut = cutoff.toISOString().split('T')[0];
    plannerFiltered = plannerOrders.filter(o => o.dateStr >= cut);
  } else if (f === 'emergency') {
    plannerFiltered = plannerOrders.filter(o => o.emergency);
  } else {
    plannerFiltered = [...plannerOrders];
  }

  // Reset shared assignments for filtered set
  STATE.assignments = { _init: true, unassigned: plannerFiltered.map(o => o.id) };
  TECHS.forEach(t => { STATE.assignments[t.id] = []; });
  plannerAssignments = { ...STATE.assignments };
}

function setPlannerFilter(f) {
  plannerFilter = f;
  applyPlannerFilter();
  renderPlannerBoard();
}

function renderPlannerBoard() {
  const container = document.getElementById('content-planner');
  const MAX_JOBS = 8;

  // Header with filter + actions
  const filterBtns = [
    ['newest1', 'Heute'],
    ['newest2', '2 Tage'],
    ['newest3', '3 Tage'],
    ['newest7', '7 Tage'],
    ['newest14', '14 Tage'],
    ['newest30', '30 Tage'],
    ['all', 'Alle'],
    ['emergency', '⚡ Notfälle'],
  ].map(([val, label]) =>
    `<button onclick="setPlannerFilter('${val}')" class="px-2 py-1 text-xs rounded ${plannerFilter===val?'bg-blue-600 text-white':'bg-slate-700 text-slate-400 hover:bg-slate-600'}">${label}</button>`
  ).join('');

  let html = `<div class="card p-3 mb-3">
    <div class="flex items-center justify-between flex-wrap gap-2 mb-2">
      <h2 class="text-base font-bold text-white">📋 Tagesplan</h2>
      <div class="flex gap-2">
        <button onclick="autoAssignPlanner()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-medium">
          🤖 Smart-Zuordnung
        </button>
        <button onclick="resetPlanner()" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium">
          🔄 Reset
        </button>
        <button onclick="exportPlannerRoutes()" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium">
          📤 Export
        </button>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-500">Zeitraum:</span>
      ${filterBtns}
      <span class="text-xs text-slate-400 ml-2">${plannerFiltered.length} Aufträge</span>
    </div>
  </div>`;

  // Kanban board — responsive: stack on mobile
  html += `<div class="grid gap-3" style="grid-template-columns: repeat(${TECHS.length + 1}, minmax(180px, 1fr)); overflow-x: auto;">`;

  // Unassigned column
  const unassigned = (STATE.assignments.unassigned || []).map(id => plannerFiltered.find(o => o.id === id)).filter(Boolean);
  html += renderPlannerColumn('unassigned', '📥 Offen', '#64748b', unassigned, null);

    html += renderPlannerColumn(t.id, `${t.name}`, t.color, assigned, t);

  html += '</div>';
