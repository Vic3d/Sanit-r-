<html lang="de" class="dark">
<head>

    tailwind.config = {
      darkMode: 'class',

  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    /* ── Nav ── */
    #top-nav { position: sticky; top: 0; z-index: 40; background: #0f172a; border-bottom: 1px solid #1e293b; padding: 10px 16px; display: flex; align-items: center; gap: 6px; }
    #top-nav .nav-logo { font-size: 18px; font-weight: 700; color: #fff; margin-right: 8px; white-space: nowrap; }
    #top-nav .nav-logo span { color: #3b82f6; }
    .nav-tab { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; border: none; transition: background 0.15s, color 0.15s; }
    .nav-tab.active { background: #fff; color: #0f172a; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .nav-tab.inactive { background: transparent; color: #64748b; }

    #status-bar { position: sticky; top: 57px; z-index: 39; background: #0a1020; border-bottom: 1px solid #1e293b; padding: 6px 16px; display: flex; align-items: center; gap: 6px; overflow-x: auto; flex-wrap: nowrap; }
    .status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1px solid transparent; transition: border-color 0.15s; }

    @media (max-width: 768px) { #app-content { padding-bottom: 16px; } #top-nav .nav-logo { display: none; } }

    .tech-card:hover { background: #263349; }
    .tech-card.selected { background: #172033; }

    /* ── Wizard Steps ── */

    /* ── Buttons ── */
    .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; background: #3b82f6; color: #fff; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: background 0.15s; min-height: 40px; }
    .btn-primary:hover { background: #2563eb; }

    .btn-secondary:hover { background: #3d4f66; }

    <button onclick="switchTab('einsatz')" id="tab-einsatz" class="nav-tab inactive" style="position:relative"><span class="tab-emoji">🔧</span><span class="tab-label">Einsatz</span><span id="badge-einsatz" class="hidden" style="position:absolute;top:4px;right:2px;background:#8b5cf6;color:#fff;font-size:9px;border-radius:9999px;padding:0 4px;line-height:15px;min-width:15px;text-align:center"></span></button>
    <button onclick="switchTab('rechnung')" id="tab-rechnung" class="nav-tab inactive" style="position:relative"><span class="tab-emoji">💶</span><span class="tab-label">Rechnung</span><span id="badge-rechnung" class="hidden" style="position:absolute;top:4px;right:2px;background:#dc2626;color:#fff;font-size:9px;border-radius:9999px;padding:0 4px;line-height:15px;min-width:15px;text-align:center"></span></button>

  <!-- ═══ STATUS BAR ═══ -->

    <!-- Globale Suche -->

      <input type="text" id="globalSearch" placeholder="🔍 Suche: Name, Adresse, PLZ, Telefon, Gewerk..."

    <!-- Hidden stat elements (keep for backward compat) -->

        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.3s"></div>
        <div class="w-3 h-3 bg-blue-500 rounded-full loading-dot" style="animation-delay:0.6s"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let DATA = null;
let currentTab = 'dashboard';
let searchQuery = '';
let sortField = 'date';
let sortDir = 'desc';

// ═══════════════════════════════════════════════════════════════
// SHARED STATE — alle Tabs lesen + schreiben hier
// ═══════════════════════════════════════════════════════════════
const STATE = {
  orders: [],           // enriched orders (with coords, distances, age, region, contactStatus)
  assignments: {},      // { techId: [orderId, ...], unassigned: [...] }
  ready: false,
};

// Build enriched orders from DATA — call after loadData()
async function buildSharedState() {
  if (!DATA?.orders) return;
  const plzCoords = await loadPLZCoords();

  // Build replied-phones Set from Superchat (time_window.state === 'open')
  const repliedPhones = new Set((DATA.superchat?.repliedPhones || []).map(p =>
    p.replace(/[\s\-()]/g, '').replace(/^0049/, '+49').replace(/^0(\d)/, '+49$1')
  ));

  // Use ALL orders, but filter out fertiggestellt (4,6,7) + abgerechnet (8,9)
  const allRaw = DATA.orders?.all?.length
    ? DATA.orders.all.filter(o => o.OrderState <= 3)
    : [...(DATA.orders?.needContact || []), ...(DATA.orders?.contacted || [])];

  STATE.orders = allRaw.map(o => {
    const coords = plzCoords[o.Zipcode];
    const distances = {};
    if (coords) {
      TECHS.forEach(t => { distances[t.id] = haversineKm(coords[0], coords[1], t.home[0], t.home[1]); });
    }
    const dateStr = o.DateOfReceipt ? o.DateOfReceipt.substring(0, 10) : '';
    const age = dateStr ? Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000) : null;
    const region = o._region || null;
    const contacted = DATA.orders.contacted?.some(c => getSourceId(c) === getSourceId(o)) || false;

    // Collect ALL phone numbers from all fields
    const allPhones = [];
    const addPhone = (p) => { if (!p) return; const c = p.replace(/[\s/\-()]/g,'').replace(/^49/,'+49'); if (c.length >= 6 && !allPhones.includes(c)) allPhones.push(c); };
    addPhone(o.Telephone);
    addPhone(o.Telephone2);
    // Extract from CustomerContactPerson (e.g. "HM: Name T:021174070-2345")
    const contactText = (o.CustomerContactPerson || '') + ' ' + (o.Damage || '') + ' ' + (o.DisturbanceType || '');
    const phoneMatches = contactText.match(/(?:0[\d\s/\-]{6,15}|\+?49[\d\s/\-]{6,15})/g);
    if (phoneMatches) phoneMatches.forEach(p => addPhone(p));
    const telephone = allPhones[0] || '';

    return {
      id: String(getSourceId(o)),
      renter: o.Renter || '',
      street: o.Street || '',
      zipcode: o.Zipcode || '',
      city: o.City || '',
      telephone,
      allPhones: allPhones.filter(Boolean),
      craft: o.Craft || '',
      damage: o.Damage || '',
      disturbanceType: o.DisturbanceType || '',
      emergency: o.Emergency === 1 || o.Emergency > 0,
      dateStr,
      executionDate: o.ExecutionDate ? o.ExecutionDate.substring(0, 10) : '',
      stateDateTime: o.StateDateTime ? o.StateDateTime.substring(0, 10) : '',
      age,
      region,
      contacted,
      replied: allPhones.filter(Boolean).some(p => repliedPhones.has(p)),
      distances,
      coords,
      orderState: o.OrderState,
      currentState: o.OrderCurrentState || '',
      heroJob: o._heroJob || null,
      // Keep raw for other tabs
      _raw: o,
    };
  }).sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || ''));

  // Init assignments if not set
  if (!STATE.assignments._init) {
    STATE.assignments = { _init: true, unassigned: STATE.orders.map(o => o.id) };
    TECHS.forEach(t => { STATE.assignments[t.id] = []; });
  }

  STATE.ready = true;
  // TRA-210: Update status bar + lifecycle badges immediately after state is ready
  if (typeof updateStatusBar === 'function') updateStatusBar();
  if (typeof updateLifecycleBadges === 'function') updateLifecycleBadges();
}

// Get assignment for an order: returns tech or null
function getAssignedTech(orderId) {
  for (const t of TECHS) {
    if (STATE.assignments[t.id]?.includes(orderId)) return t;
  }
  return null;
}

// Assign order to tech (used from any tab)
function assignOrderToTech(orderId, techId) {
  const oid = String(orderId);
  // Remove from all columns
  let removed = false;
  for (const key of Object.keys(STATE.assignments)) {
    if (key === '_init' || key === '_plannerInit') continue;
    const arr = STATE.assignments[key];
    if (!Array.isArray(arr)) continue;
    const idx = arr.indexOf(oid);
    if (idx !== -1) { arr.splice(idx, 1); removed = true; }
  }
  // Add to target
  const targetKey = techId === 'unassigned' ? 'unassigned' : parseInt(techId);
  if (!STATE.assignments[targetKey]) STATE.assignments[targetKey] = [];
  STATE.assignments[targetKey].push(oid);
  console.log('[Assign]', oid, '→', targetKey, 'removed:', removed, 'unassigned:', STATE.assignments.unassigned?.length, 'target:', STATE.assignments[targetKey]?.length);
}

// ═══════════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData(force = false) {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⏳';
  btn.disabled = true;
  updateNavDate();

  try {
    const url = '/api/state' + (force ? '?refresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    document.getElementById('loading').classList.add('hidden');
    await buildSharedState();
    updateStats();
    renderCurrentTab();
    updateLastUpdate();
  } catch (err) {
    console.error('Laden fehlgeschlagen:', err);
    document.getElementById('loading').innerHTML =
      `<div class="card p-8 text-center">
        <p class="text-red-400 mb-4">❌ Fehler beim Laden: ${err.message}</p>
        <button onclick="loadData(true)" class="btn-primary">🔄 Erneut versuchen</button>
      </div>`;
  } finally {
    btn.textContent = '🔄';
    btn.disabled = false;
  }
}

function updateLastUpdate() {
  const el = document.getElementById('lastUpdate');
  const now = new Date();
  el.textContent = `Letzte: ${now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}`;
}

function updateStats() {
  if (!DATA?.stats) return;
  const el = (id) => document.getElementById(id);
  if (el('statTotal')) el('statTotal').textContent = DATA.stats.total;
  if (el('statNeedContact')) el('statNeedContact').textContent = DATA.stats.needContact;
  if (el('statContacted')) el('statContacted').textContent = DATA.stats.contacted;
  if (el('statGroups')) el('statGroups').textContent = DATA.stats.addressGroups;
  updateStatusBar();
  updateNavDate();
}

function updateNavDate() {
  const el = document.getElementById('nav-date');
  if (!el) return;
  const now = new Date();
  const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const monthNames = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  el.textContent = `${dayNames[now.getDay()]}. ${now.getDate()}. ${monthNames[now.getMonth()]}`;
}

function updateStatusBar() {
  const sbEl = document.getElementById('sb-content');
  if (!sbEl) return;

  if (!STATE.ready) {
    sbEl.innerHTML = '⏳ Lädt…';
    return;
  }

  // Count statuses
  let neu = 0, kontaktiert = 0, termin = 0, erledigt = 0;
  STATE.orders.forEach(o => {
    const s = getOrderStatus(o.id);
    if (s === 'neu') neu++;
    else if (s === 'kontaktiert') kontaktiert++;
    else if (s === 'termin') termin++;
    else if (s === 'erledigt' || s === 'abgerechnet') erledigt++;
  });
  const activeTechs = TECHS.filter(t => (STATE.assignments[t.id] || []).length > 0).length;

  const parent = sbEl.parentElement;
  parent.innerHTML = `
    <span class="status-pill pill-red" onclick="dashFilter('neu')" title="Noch nicht kontaktiert">🔴 ${neu} neu anzuschreiben</span>
    <span class="pill-sep">•</span>
    <span class="status-pill pill-yellow" onclick="dashFilter('kontaktiert')" title="Kontaktiert, wartet auf Termin">🟡 ${kontaktiert} kontaktiert</span>
    <span class="pill-sep">•</span>
    <span class="status-pill pill-green" onclick="dashFilter('termin')" title="Termin vereinbart">✅ ${termin} mit Termin</span>
    <span class="pill-sep">•</span>
    <span class="status-pill pill-blue" style="cursor:default">👷 ${activeTechs} Monteure aktiv</span>
  `;
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  const allTabs = ['dashboard','neu','kontakt','termin','einsatz','rechnung','routes','email','orders','contact','planner','techs','calendar','pipeline'];
  allTabs.forEach(t => {
    const el = document.getElementById('content-' + t);
    if (el) el.classList.toggle('hidden', t !== tab);
    const tabBtn = document.getElementById('tab-' + t);
    if (tabBtn) tabBtn.className = t === tab ? 'nav-tab active' : 'nav-tab inactive';
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!DATA) return;
  switch (currentTab) {
    case 'dashboard':  renderDashboard(); break;
    case 'neu':        renderLifecycleNeu(); break;
    case 'kontakt':    renderLifecycleKontakt(); break;
    case 'termin':     renderLifecycleTermin(); break;
    case 'einsatz':    renderLifecycleEinsatz(); break;
    case 'rechnung':   renderLifecycleRechnung(); break;
    case 'routes':     renderRoutes(); loadRoadDistances(); break;
    case 'email':      renderEmail(); break;
    // Legacy (accessible via dashFilter or code)
    case 'orders':     renderOrders(); break;
    case 'contact':    renderContact(); break;
    case 'planner':    renderPlanner(); break;
    case 'techs':      renderTechs(); break;
    case 'calendar':   renderCalendar(); break;
    case 'pipeline':   renderPipeline(); break;
  }
}

let globalSearchQuery = '';
function onGlobalSearch(q) {
  globalSearchQuery = q.toLowerCase().trim();
  renderCurrentTab();
}

function matchesGlobalSearch(o) {
  if (!globalSearchQuery) return true;
  const q = globalSearchQuery;
  const fields = [o.renter, o.street, o.zipcode, o.city, o.telephone, o.craft, o.damage, o.disturbanceType].filter(Boolean);
  return fields.some(f => f.toLowerCase().includes(q));
}

// ── B&O Annehmen ─────────────────────────────────────────────
async function boAcceptOrder(orderId) {
  const btn = document.getElementById('bo-accept-btn-' + orderId);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⏳ Wird angenommen…';
  btn.style.color = '#94a3b8';

  try {
    const r = await fetch(`/api/accept?id=${encodeURIComponent(orderId)}`);
    const data = await r.json();

    if (data.ok) {
      localStorage.setItem('josh-bo-accepted-' + orderId, '1');
      btn.outerHTML = `<span class="text-xs px-2 py-0.5 rounded bg-green-900/50 text-green-400 font-medium">✅ Angenommen</span>`;
      // Daten sofort neu laden damit der Auftrag aus der Neu-Liste verschwindet
      setTimeout(() => loadData(true), 800);
    } else {
      btn.disabled = false;
      btn.textContent = '✅ Annehmen';
      btn.style.color = '#4ade80';
      alert('Fehler beim Annehmen: ' + (data.error || 'Unbekannt'));
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '✅ Annehmen';
    btn.style.color = '#4ade80';
    alert('Netzwerkfehler: ' + e.message);
  }
}

}

  renderCurrentTab();
}

// Termin (Appointment date + time)
function getOrderAppointment(orderId) {
  return localStorage.getItem('josh-appointment-' + orderId) || '';
}

function setOrderAppointment(orderId, datetime) {
  if (datetime) {
    localStorage.setItem('josh-appointment-' + datetime.split('T')[0] + '-' + orderId, orderId);
    localStorage.setItem('josh-appointment-' + orderId, datetime);
  } else {
    const old = localStorage.getItem('josh-appointment-' + orderId);
    if (old) localStorage.removeItem('josh-appointment-' + old.split('T')[0] + '-' + orderId);
    localStorage.removeItem('josh-appointment-' + orderId);
  }
  renderCurrentTab();
}

// Get all appointments for a date (YYYY-MM-DD)
function getAppointmentsForDate(dateStr) {
  const results = [];
  if (!STATE.ready) return results;
  STATE.orders.forEach(o => {
    const apt = getOrderAppointment(o.id);
    if (apt && apt.startsWith(dateStr)) {
      results.push({ order: o, datetime: apt, time: apt.includes('T') ? apt.split('T')[1].substring(0,5) : '' });
    }
  });
  results.sort((a, b) => a.datetime.localeCompare(b.datetime));
  return results;
}

// Get all follow-ups for a date
function getFollowUpsForDate(dateStr) {
  const results = [];
  if (!STATE.ready) return results;
  STATE.orders.forEach(o => {
    const fu = getOrderFollowUp(o.id);
    if (fu === dateStr) results.push(o);
  });
  return results;
}

function renderDashboard() {
  const container = document.getElementById('content-dashboard');
  if (!STATE.ready) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Erst "Aktualisieren" klicken</div>';
    return;
  }

  const orders = STATE.orders.filter(o => matchesGlobalSearch(o));
  const now = new Date();
  const today = now.toISOString().split('T')[0];

  // KPIs
  let neuCount = 0, kontaktiertCount = 0, terminCount = 0, erledigtCount = 0, notfallCount = 0, ueberfaelligCount = 0;
  orders.forEach(o => {
    const s = getOrderStatus(o.id);
    if (s === 'neu') neuCount++;
    else if (s === 'kontaktiert') kontaktiertCount++;
    else if (s === 'termin') terminCount++;
    else if (s === 'erledigt' || s === 'abgerechnet') erledigtCount++;
    if (o.emergency) notfallCount++;
    if (o.age > 7 && s !== 'erledigt' && s !== 'abgerechnet') ueberfaelligCount++;
  });

  let html = `
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
    <div class="card p-4 text-center cursor-pointer hover:border-red-500/50" onclick="dashFilter('neu')">

      <div class="text-xs text-slate-400">🔴 Neu</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-amber-500/50" onclick="dashFilter('kontaktiert')">
      <div class="text-2xl font-bold text-amber-400">${kontaktiertCount}</div>
      <div class="text-xs text-slate-400">🟡 Kontaktiert</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-green-500/50" onclick="dashFilter('termin')">
      <div class="text-2xl font-bold text-green-400">${terminCount}</div>
      <div class="text-xs text-slate-400">🟢 Termin</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-blue-500/50" onclick="dashFilter('erledigt')">
      <div class="text-2xl font-bold text-blue-400">${erledigtCount}</div>
      <div class="text-xs text-slate-400">🔵 Erledigt</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-red-500/50" onclick="dashFilter('notfall')">
      <div class="text-2xl font-bold ${notfallCount > 0 ? 'text-red-400 animate-pulse' : 'text-slate-600'}">${notfallCount}</div>
      <div class="text-xs text-slate-400">⚡ Notfälle</div>
    </div>
    <div class="card p-4 text-center cursor-pointer hover:border-amber-500/50" onclick="dashFilter('ueberfaellig')">
      <div class="text-2xl font-bold ${ueberfaelligCount > 0 ? 'text-amber-400' : 'text-slate-600'}">${ueberfaelligCount}</div>
      <div class="text-xs text-slate-400">⏰ Überfällig</div>
    </div>
  </div>`;

  // Hero Software section

  heroHtml += '<h3 class="text-sm font-semibold text-slate-400 mb-3">🔧 Hero Software</h3>';
  if (emergency > 0) {
    heroHtml += `<div style="background:#dc262622;border:1px solid #dc2626;border-radius:8px;padding:10px 14px;margin-bottom:8px;color:#fca5a5">🚨 <strong>${emergency} Notfall-Einsatz${emergency > 1 ? 'e' : ''}</strong> offen</div>`;
  }
  if (invoicePending > 0) {
    heroHtml += `<div style="background:#f59e0b22;border:1px solid #f59e0b;border-radius:8px;padding:10px 14px;margin-bottom:8px;color:#fcd34d">💶 <strong>${invoicePending} Rechnung${invoicePending > 1 ? 'en' : ''}</strong> ausstehend in Hero</div>`;

  const statusPills = Object.entries(byStatus).filter(([s]) => s !== 'Archiviert').map(([s, n]) => `<span style="background:#1e293b;color:#94a3b8;border-radius:4px;padding:2px 8px;font-size:12px">${s}: ${n}</span>`).join(' ');

  // Wiedervorlagen heute
  const todayStr = now.toISOString().split('T')[0];
  const todayFollowUps = orders.filter(o => getOrderFollowUp(o.id) === todayStr);

    html += `<div class="card p-4 mb-4 border-amber-500/50 bg-amber-900/10">
      <h3 class="text-amber-400 font-bold text-sm mb-2">🔔 Wiedervorlagen heute (${todayFollowUps.length})</h3>

      <div class="text-xs text-slate-500 mt-1">${esc(t.city)}</div>
    </div>`;
  });
  html += '</div>';

  // Neueste Aufträge (alle, nach Datum sortiert)
  const newest = [...orders].sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || '')).slice(0, 10);
  if (newest.length) {
    html += `<h3 class="text-white font-bold text-sm mb-3">📥 Neueste Aufträge</h3>
    <div class="grid gap-2 mb-6">`;
    newest.forEach(o => { html += renderOrderCard(o, 'compact'); });
    html += '</div>';
  }

  container.innerHTML = html;

function toggleStatusDropdown(orderId) {
  const dd = document.getElementById('status-dd-' + orderId);
  if (!dd) return;
  // Close all other dropdowns first
  document.querySelectorAll('[id^="status-dd-"]').forEach(el => { if (el !== dd) el.classList.add('hidden'); });
  dd.classList.toggle('hidden');
}

function toggleNote(orderId) {
  const el = document.getElementById('note-' + orderId);
  if (el) {
    el.classList.toggle('hidden');
    if (!el.classList.contains('hidden')) {
      const input = document.getElementById('note-input-' + orderId);
      if (input) input.focus();
    }
  }
}

function toggleFollowUp(orderId) {
  const el = document.getElementById('followup-' + orderId);
  if (el) el.classList.toggle('hidden');
}

function toggleAppointment(orderId) {
  const el = document.getElementById('appointment-' + orderId);
  if (el) el.classList.toggle('hidden');
}

// Close dropdowns on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('[id^="status-dd-"]') && !e.target.closest('button')) {
    document.querySelectorAll('[id^="status-dd-"]').forEach(el => el.classList.add('hidden'));
  }
});

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function regionBadge(region) {
  if (!region) return '<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">—</span>';
  if (region === 'nord') return '<span class="px-2 py-0.5 text-xs rounded-full badge-nord font-medium">Nord 🔴</span>';
  if (region === 'ost') return '<span class="px-2 py-0.5 text-xs rounded-full badge-ost font-medium">Ost 🔵</span>';
  return `<span class="px-2 py-0.5 text-xs rounded-full bg-slate-600 text-slate-300">${esc(region)}</span>`;
}

function contactBadge(matched) {
  if (matched) return '<span class="px-2 py-0.5 text-xs rounded-full badge-contacted font-medium">🟢 Kontaktiert</span>';
  return '<span class="px-2 py-0.5 text-xs rounded-full badge-open font-medium">🔴 Noch offen</span>';
}

function phoneLink(phone) {
  if (!phone || phone === '-') return '<span class="text-slate-500">—</span>';
  const clean = phone.replace(/[^\d+]/g, '');
  return `<a href="tel:${esc(clean)}" class="text-blue-400 hover:text-blue-300 hover:underline">${esc(phone)}</a>`;
}

function allPhonesDisplay(order) {
  const phones = order._allPhones || [];
  const mainPhone = order.Telephone || '';
  if (phones.length <= 1) return phoneLink(mainPhone);
  // Show main phone + extras from Remarks
  let html = phoneLink(mainPhone);
  const mainNorm = phones[0] || '';
  const extras = phones.filter((p, i) => i > 0 || !mainPhone);
  if (extras.length) {
    html += '<div class="mt-1">';
    for (const p of extras) {
      html += `<div class="text-xs"><a href="tel:${esc(p)}" class="text-emerald-400 hover:text-emerald-300">📱 ${esc(p)}</a></div>`;
    }
    html += '</div>';
  }
  return html;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
  } catch { return dateStr; }
}

function getSourceId(order) {
  return order.ID?.SourceId || order.SourceId || '';
}

function matchesSearch(order, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  const fields = [
    getSourceId(order), order.Renter, order.Street, order.City,
    order.Zipcode, order.Telephone, order.Craft, order.DisturbanceType,
    order.Damage
  ];
  return fields.some(f => f && String(f).toLowerCase().includes(lower));
}

function sortOrders(orders, field, dir) {
  const mult = dir === 'asc' ? 1 : -1;
  return [...orders].sort((a, b) => {
    let va, vb;
    switch (field) {
      case 'date':
        va = a.DateOfReceipt || ''; vb = b.DateOfReceipt || '';
        return mult * va.localeCompare(vb);
      case 'region':
        va = a._region || 'zzz'; vb = b._region || 'zzz';
        return mult * va.localeCompare(vb);
      case 'contact':
        va = a._match?.matched ? 1 : 0; vb = b._match?.matched ? 1 : 0;
        return mult * (va - vb);
      case 'plz':
        va = a.Zipcode || ''; vb = b.Zipcode || '';
        return mult * va.localeCompare(vb);
      default:
        return 0;
    }
  });
}

let orderStatusFilter = 'alle';

function renderOrders() {
  const container = document.getElementById('content-orders');
  if (!STATE.ready) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Erst "Aktualisieren" klicken</div>';
    return;
  }

  const allOrders = STATE.orders.filter(o => matchesGlobalSearch(o));

  // Status filter buttons
  const counts = { alle: allOrders.length, neu: 0, kontaktiert: 0, termin: 0, erledigt: 0, notfall: 0, ueberfaellig: 0 };
  allOrders.forEach(o => {
    const s = getOrderStatus(o.id);
    if (counts[s] !== undefined) counts[s]++;
    if (o.emergency) counts.notfall++;
    if (o.age > 7 && s !== 'erledigt' && s !== 'abgerechnet') counts.ueberfaellig++;
  });

  let html = `<div class="flex flex-wrap gap-2 mb-3">
    ${['alle','neu','kontaktiert','termin','erledigt','ueberfaellig'].map(f => {
      const labels = {alle:'📋 Alle',neu:'🔴 Neu',kontaktiert:'🟡 Kontaktiert',termin:'🟢 Termin',erledigt:'🔵 Erledigt',ueberfaellig:'⏰ Überfällig'};
      return `<button onclick="orderStatusFilter='${f}';renderOrders()"
        class="px-3 py-1.5 rounded-lg text-xs font-medium ${orderStatusFilter===f ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}">${labels[f]} (${counts[f]})</button>`;
    }).join('')}
  </div>
  <div class="flex flex-wrap gap-2 mb-3 items-center">
    <span class="text-xs text-slate-500">Eingang:</span>
    ${(() => {
      const now2 = new Date();
      const todayISO = now2.toISOString().split('T')[0];
      const yesterdayISO = new Date(now2.getTime() - 86400000).toISOString().split('T')[0];
      const threeDaysAgo = new Date(now2.getTime() - 3*86400000).toISOString().split('T')[0];
      const weekAgo = new Date(now2.getTime() - 7*86400000).toISOString().split('T')[0];
      const od = (o) => o.stateDateTime > o.dateStr ? o.stateDateTime : o.dateStr;
      const cToday = allOrders.filter(o => od(o) === todayISO || o.dateStr === todayISO).length;
      const cYesterday = allOrders.filter(o => od(o) === yesterdayISO || o.dateStr === yesterdayISO).length;
      const c3d = allOrders.filter(o => od(o) >= threeDaysAgo || o.dateStr >= threeDaysAgo).length;
      const c7d = allOrders.filter(o => od(o) >= weekAgo || o.dateStr >= weekAgo).length;
      const filters = [
        {k:'alle', l:'Alle', c:allOrders.length},
        {k:'heute', l:'Heute', c:cToday},
        {k:'gestern', l:'Gestern', c:cYesterday},
        {k:'3d', l:'3 Tage', c:c3d},
        {k:'7d', l:'7 Tage', c:c7d},
      ];
      return filters.map(f => `<button onclick="window.dateFilter='${f.k}';renderOrders()" class="px-2 py-1 text-xs rounded ${(window.dateFilter||'alle')===f.k?'bg-green-600 text-white':'bg-slate-700 text-slate-400'}">${f.l} (${f.c})</button>`).join('');
    })()}
  </div>`;

  // Filter
  let filtered = allOrders;
  if (orderStatusFilter === 'notfall') {
    filtered = allOrders.filter(o => o.emergency);
  } else if (orderStatusFilter === 'ueberfaellig') {
    filtered = allOrders.filter(o => o.age > 7 && !['erledigt','abgerechnet'].includes(getOrderStatus(o.id)));
  } else if (orderStatusFilter !== 'alle') {
    filtered = allOrders.filter(o => getOrderStatus(o.id) === orderStatusFilter);
  }

  // Date filter — checks DateOfReceipt OR StateDateTime (when B&O processed it)
  const df = window.dateFilter || 'alle';
  if (df !== 'alle') {
    const now2 = new Date();
    const todayISO = now2.toISOString().split('T')[0];
    const yesterdayISO = new Date(now2.getTime() - 86400000).toISOString().split('T')[0];
    const threeDaysAgo = new Date(now2.getTime() - 3*86400000).toISOString().split('T')[0];
    const weekAgo = new Date(now2.getTime() - 7*86400000).toISOString().split('T')[0];
    const orderDate = (o) => o.stateDateTime > o.dateStr ? o.stateDateTime : o.dateStr;

    if (df === 'heute') {
      filtered = filtered.filter(o => orderDate(o) === todayISO || o.dateStr === todayISO);
    } else if (df === 'gestern') {
      filtered = filtered.filter(o => orderDate(o) === yesterdayISO || o.dateStr === yesterdayISO);
    } else if (df === '3d') {
      filtered = filtered.filter(o => orderDate(o) >= threeDaysAgo || o.dateStr >= threeDaysAgo);
    } else if (df === '7d') {
      filtered = filtered.filter(o => orderDate(o) >= weekAgo || o.dateStr >= weekAgo);
    }
  }

  // Sort: newest first (DateOfReceipt)
  filtered.sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || ''));

  if (!filtered.length) {
    html += '<div class="card p-8 text-center text-slate-400">Keine Aufträge in dieser Kategorie</div>';
  } else {
    html += `<div class="grid gap-2">`;
    filtered.forEach(o => { html += renderOrderCard(o, 'full'); });
    html += '</div>';
  }

  html += `<div class="mt-3 text-xs text-slate-500">${filtered.length} von ${allOrders.length} Aufträgen</div>`;
  container.innerHTML = html;
}

              const waUrl = 'https://wa.me/' + waPhone + '?text=' + enc;
              return '<div class="mt-2 flex gap-2">'
                + '<button onclick="navigator.clipboard.writeText(decodeURIComponent(\'' + enc + '\')).then(function(){ this.textContent=\'✅ Kopiert!\'; }.bind(this)).catch(function(){})" class="text-xs px-2 py-1 bg-slate-700 hover:bg-slate-600 text-white rounded transition-colors">📋 Kopieren</button>'
                + '<a href="' + waUrl + '" target="_blank" class="text-xs px-2 py-1 bg-green-700 hover:bg-green-600 text-white rounded transition-colors">💬 WhatsApp</a>'
                + '</div>';
            }(o)}
          </div>` : '<div class="text-slate-500 mb-3">Keine Telefonnummer</div>'}
        <div class="text-xs text-slate-500 mb-2">${esc(o.Craft)} — ${esc(o.Damage || o.DisturbanceType || '')}</div>
        ${techRec ? `<div class="text-xs text-slate-400">👷 Empfehlung: <span class="text-white font-medium">${esc(techRec.name)}</span></div>` : ''}
        ${o.Remarks ? `<div class="text-xs text-yellow-500 mt-2">📝 ${esc(o.Remarks.substring(0, 100))}${o.Remarks.length > 100 ? '…' : ''}</div>` : ''}
      </div>`;
    }
    h += '</div></div>';
    return h;
  }

  html += renderRegionGroup('🔴 Region Nord', nord, 'text-red-400');
  html += renderRegionGroup('🔵 Region Ost', ost, 'text-blue-400');
  if (other.length) html += renderRegionGroup('— Ohne Region', other, 'text-slate-400');

  container.innerHTML = html;
}

function initRouteMap() {
  const mapEl = document.getElementById('route-map');

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO', maxZoom: 19,
  }).addTo(routeMap);

  showTechHomes();
}

function showTechHomes() {
  if (!routeMap) return;
  const show = routeSelectedTech ? TECHS.filter(t => t.id === routeSelectedTech) : TECHS;
  for (const t of show) {

      className: '', iconSize: [28, 28], iconAnchor: [14, 14],

      .bindPopup(`<strong style="color:${t.color}">${t.name}</strong><br>${t.city} (Start)`);
    routeMapLayers.push(m);
  }
}

function clearRouteMap() {

  for (const l of routeMapLayers) routeMap.removeLayer(l);
  routeMapLayers = [];
}

function setRouteSort(mode) {
  window._routeSortMode = mode;
  // Update button styles
  ['newest','oldest','distance','emergency'].forEach(m => {
    const btn = document.getElementById('sort-' + m);
    if (btn) {
      if (m === mode) { btn.className = 'px-2 py-1 text-xs rounded bg-blue-600 text-white'; }
      else { btn.className = 'px-2 py-1 text-xs rounded bg-slate-700 text-slate-400 hover:bg-slate-600'; }
    }
  });
  if (routeAllOrders) renderOrderList();
}

function getSortedOrders() {
  if (!routeAllOrders) return [];
  const mode = window.routeSort || window._routeSortMode || 'distance';
  const arr = [...routeAllOrders];

  if (mode === 'newest') {
    arr.sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || ''));
  } else if (mode === 'oldest') {
    arr.sort((a, b) => (a.dateStr || '').localeCompare(b.dateStr || ''));
  } else if (mode === 'distance' && routeSelectedTech) {
    arr.sort((a, b) => (a.distances?.[routeSelectedTech] || 999) - (b.distances?.[routeSelectedTech] || 999));
  } else if (mode === 'emergency') {
    arr.sort((a, b) => {
      if (a.emergency && !b.emergency) return -1;
      if (!a.emergency && b.emergency) return 1;
      return (b.dateStr || '').localeCompare(a.dateStr || '');
    });
  }
  return arr;
}

function haversineKm(lon1, lat1, lon2, lat2) {
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return Math.round(6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 10) / 10;
}

// Straßendistanzen via OSRM Matrix API laden (lazy, wenn Route-Tab geöffnet)
// Überschreibt o.distances[techId] mit echten Fahrstrecken (statt Luftlinie)
let _roadDistancesLoaded = false;
async function loadRoadDistances() {
  if (_roadDistancesLoaded || !STATE.ready || !STATE.orders.length) return;

  const ordersWithCoords = STATE.orders.filter(o => o.coords).slice(0, 200); // max 200
  if (!ordersWithCoords.length) return;

  const infoEl = document.getElementById('route-info');
  if (infoEl) infoEl.innerHTML = '⏳ Berechne echte Fahrstrecken…';

  try {
    const payload = { orders: ordersWithCoords.map(o => ({ id: o.id, coords: o.coords })) };
    const res  = await fetch('/api/matrix', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('Matrix API ' + res.status);
    const data = await res.json();

    if (data.matrix && Object.keys(data.matrix).length > 0) {
      // o.distances[techId] mit echten km überschreiben
      STATE.orders.forEach(o => {
        const techDistances = data.matrix[o.id];
        if (!techDistances) return;
        TECHS.forEach(t => {
          const d = techDistances[t.id];
          if (d && d.distance_km != null) {
            o.distances[t.id] = d.distance_km; // Überschreibt Haversine-Wert
          }
        });
      });
      _roadDistancesLoaded = true;
      console.log('[matrix] Straßendistanzen geladen:', data.cached ? 'Cache' : 'frisch', '| Größe:', Object.keys(data.matrix).length);
      // Route-Tab neu rendern mit echten Distanzen
      if (document.getElementById('content-routes')?.style.display !== 'none') {
        loadRouteOrders();
      }
    }
  } catch (err) {
    console.warn('[matrix] Fehler, nutze Luftlinie:', err.message);
    // Kein Error anzeigen — Haversine als stiller Fallback
  } finally {
    if (infoEl && infoEl.innerHTML.includes('Berechne')) infoEl.innerHTML = '';
  }
}

function loadRouteOrders() {
  const list = document.getElementById('route-order-list');
  const infoEl = document.getElementById('route-info');

  if (!STATE.ready) {
    // Try to build state from existing DATA
    if (DATA?.orders) {
      buildSharedState().then(() => loadRouteOrders());
      list.innerHTML = '<div class="card p-8 text-center text-slate-400">⏳ Lade Aufträge…</div>';
    } else {
      list.innerHTML = '<div class="card p-8 text-center text-slate-500">Erst oben "Aktualisieren" klicken</div>';
    }
    return;
  }

  const viewMode = document.getElementById('routeViewMode')?.value || '3d';
  let filtered;

  if (viewMode === 'assigned' && routeSelectedTech) {
    const assignedIds = STATE.assignments[routeSelectedTech] || [];
    filtered = STATE.orders.filter(o => assignedIds.includes(o.id) && o.coords);
    routeSelectedOrders = new Set(filtered.map(o => o.id));
  } else if (viewMode.endsWith('d')) {
    const days = parseInt(viewMode);
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    const cut = cutoff.toISOString().split('T')[0];
    filtered = STATE.orders.filter(o => o.dateStr >= cut && o.coords);
    // Wenn Techniker ausgewählt: nur Aufträge im 60km Radius anzeigen
    if (routeSelectedTech) {
      filtered = filtered.filter(function(o) { return (o.distances && o.distances[routeSelectedTech] !== undefined ? o.distances[routeSelectedTech] : 999) < 60; });
    }
  } else {
    filtered = STATE.orders.filter(o => o.coords);
    if (routeSelectedTech) {
      filtered = filtered.filter(function(o) { return (o.distances && o.distances[routeSelectedTech] !== undefined ? o.distances[routeSelectedTech] : 999) < 60; });
    }
  }

  routeAllOrders = filtered;

  // Update info text
  const assignedCount = routeSelectedTech ? (STATE.assignments[routeSelectedTech]?.length || 0) : 0;
  if (infoEl) {
    infoEl.innerHTML = `${filtered.length} Aufträge` +
      (routeSelectedTech && assignedCount > 0 ? ` · <span class="text-emerald-400">${assignedCount} zugeordnet im Tagesplan</span>` : '') +
      (viewMode === 'assigned' && assignedCount === 0 ? ' · <span class="text-amber-400">Noch keine Zuordnung — erst im Tagesplan zuordnen</span>' : '');
  }

  renderOrderList();
  showSelectedOnMap();
  updateOptimizeBtn();
}

function formatDuration(seconds) {
  if (!seconds) return '—';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}min` : `${m} min`;
}

async function optimizeSelectedRoute() {
  console.log('[Route] Tech:', routeSelectedTech, 'Selected:', routeSelectedOrders.size, 'AllOrders:', routeAllOrders?.length);
  if (!routeSelectedTech || routeSelectedOrders.size === 0) {
    const result = document.getElementById('route-result');
    if (result) result.innerHTML = `<div class="card p-4 text-center text-amber-400">⚠️ ${!routeSelectedTech ? 'Bitte Monteur auswählen' : 'Bitte Aufträge auswählen (Checkboxen oder "Alle auswählen")'}</div>`;
    return;
  }
  const btn = document.getElementById('optimizeBtn');
  const result = document.getElementById('route-result');
  btn.disabled = true;
  btn.innerHTML = '⏳ Berechne…';
  result.innerHTML = '<div class="card p-4 text-center text-slate-400">Route wird optimiert…</div>';

  try {
    // Send orders with coords directly — no server-side B&O lookup needed
    const selectedOrders = routeAllOrders
      .filter(o => routeSelectedOrders.has(o.id))
      .map(o => ({ id: o.id, renter: o.renter, street: o.street, zipcode: o.zipcode, city: o.city, telephone: o.telephone, craft: o.craft, disturbanceType: o.disturbanceType, damage: o.damage, emergency: o.emergency, coords: o.coords, dateStr: o.dateStr, age: o.age }));

    const res = await fetch('/api/routes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'optimize', techId: routeSelectedTech, orders: selectedOrders }),
    });
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'HTTP ' + res.status);
    const data = await res.json();
    lastRouteResult = data; // persist for re-render
    renderRouteResult(data);
  } catch (err) {
    result.innerHTML = `<div class="card p-4 text-center text-red-400">❌ ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🗺️ Route optimieren →';
    updateOptimizeBtn();
  }
}

function buildGmapsUrl(tech, orders) {
  // TRA-215: Echte Straßenadressen statt PLZ-Koordinaten — Google Maps geocodet selbst
  // TRA-229: KEIN optimize:true — OSRM-Reihenfolge wird respektiert (Dashboard = Google Maps)
  // Origin + Destination = Heimatort (Koordinaten für präzisen Startpunkt)
  const home = tech.home[1] + ',' + tech.home[0];

  // Deduplicate nach exakter Adresse (Straße + PLZ + Stadt)
  // → besser als PLZ-Koordinaten-Dedup, fängt auch gleiche Straßen in gleicher PLZ
  const seen = new Set();
  const stops = orders
    .filter(function(o) { return o.street && o.zipcode; })
    .map(function(o) {
      const addr = (o.street + ', ' + o.zipcode + ' ' + o.city).trim();
      return addr;
    })
    .filter(function(addr) {
      const key = addr.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .map(function(addr) { return encodeURIComponent(addr); })
    .join('|');

  let url = 'https://www.google.com/maps/dir/?api=1&origin=' + home + '&destination=' + home + '&travelmode=driving';
  if (stops) url += '&waypoints=' + stops; // TRA-229: kein optimize:true → OSRM-Reihenfolge beibehalten
  return url;
}

function removeRouteStop(orderId) {
  if (!lastRouteResult) return;
  lastRouteResult.orders = lastRouteResult.orders.filter(o => o.id !== orderId);
  // Add to outliers so it shows in the panel
  const removed = routeAllOrders?.find(o => o.id === orderId);
  if (removed && lastRouteResult.outliers) lastRouteResult.outliers.push({ ...removed, distFromHome: removed.distFromHome || 0, isOutlier: true });
  renderRouteResult(lastRouteResult);
}

function includeOutlier(orderId) {
  if (!lastRouteResult) return;
  const o = lastRouteResult.outliers?.find(x => x.id === orderId);
  if (!o) return;
  lastRouteResult.outliers = lastRouteResult.outliers.filter(x => x.id !== orderId);
  lastRouteResult.orders.push(o);
  renderRouteResult(lastRouteResult);
}

function copyRouteText() {
  if (window._lastRouteText) {
    navigator.clipboard.writeText(window._lastRouteText).then(() => {
      const btn = event.target;
      btn.textContent = '✅ Kopiert!';
      setTimeout(() => btn.textContent = '📋 Kopieren', 2000);

}

function shareWhatsApp() {

let plannerAssignments = {}; // { techId: [orderId, ...] }
let plannerOrders = []; // all orders for planner
let plannerFiltered = []; // filtered subset
let plannerFilter = 'newest3'; // default: last 3 days (neueste sind relevant)
let plannerRegionMap = null; // PLZ→region from DATA

function renderPlanner() {
  const container = document.getElementById('content-planner');
  const allRaw = DATA.orders?.all?.length
    ? DATA.orders.all.filter(o => o.OrderState <= 3)
    : [...(DATA.orders?.needContact || []), ...(DATA.orders?.contacted || [])];

  if (!allRaw.length) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Aufträge — erst oben "Aktualisieren"</div>';
    return;
  }

  // Build region map from addressGroups if available
  if (DATA.addressGroups) {
    plannerRegionMap = {};
    for (const g of DATA.addressGroups) {
      if (g.zipcode && g.region) plannerRegionMap[g.zipcode] = g.region;
    }
  }

  loadPLZCoords().then(plzCoords => {
    plannerOrders = allRaw.map(o => {
      const coords = plzCoords[o.Zipcode];
      const distances = {};
      if (coords) {
        TECHS.forEach(t => { distances[t.id] = haversineKm(coords[0], coords[1], t.home[0], t.home[1]); });
      }
      const dateStr = o.DateOfReceipt ? o.DateOfReceipt.substring(0, 10) : '';
      const age = dateStr ? Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000) : null;
      const region = o._region || (plannerRegionMap && plannerRegionMap[o.Zipcode]) || null;
      return {
        id: String(getSourceId(o)),
        renter: o.Renter || '',
        street: o.Street || '',
        zipcode: o.Zipcode || '',
        city: o.City || '',
        telephone: o.Telephone || '',
        craft: o.Craft || '',
        damage: o.Damage || '',
        disturbanceType: o.DisturbanceType || '',
        emergency: o.Emergency === 1,
        dateStr,
        age,
        region,
        distances,
        coords,
      };
    }).sort((a, b) => (b.dateStr || '').localeCompare(a.dateStr || '')); // newest first

    // Only reset assignments if not already set (preserve drag & drop state)
    if (!STATE.assignments._plannerInit) {
      applyPlannerFilter();
    } else {
      // Just update the filtered list without resetting assignments
      const f = plannerFilter;
      if (f === 'all') {
        plannerFiltered = [...plannerOrders];
      } else if (f.startsWith('newest')) {
        const days = parseInt(f.replace('newest', ''));
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
        const cut = cutoff.toISOString().split('T')[0];
        plannerFiltered = plannerOrders.filter(o => o.dateStr >= cut);
      } else if (f === 'emergency') {
        plannerFiltered = plannerOrders.filter(o => o.emergency);
      } else {
        plannerFiltered = [...plannerOrders];
      }
    }
    renderPlannerBoard();
  });
}

function applyPlannerFilter() {
  const f = plannerFilter;
  if (f === 'all') {
    plannerFiltered = [...plannerOrders];
  } else if (f.startsWith('newest')) {
    const days = parseInt(f.replace('newest', ''));
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    const cut = cutoff.toISOString().split('T')[0];
    plannerFiltered = plannerOrders.filter(o => o.dateStr >= cut);
  } else if (f === 'emergency') {
    plannerFiltered = plannerOrders.filter(o => o.emergency);
  } else {
    plannerFiltered = [...plannerOrders];
  }

  // Reset shared assignments for filtered set
  STATE.assignments = { _init: true, _plannerInit: true, unassigned: plannerFiltered.map(o => String(o.id)) };
  TECHS.forEach(t => { STATE.assignments[t.id] = []; });
  plannerAssignments = { ...STATE.assignments };
}

function setPlannerFilter(f) {
  plannerFilter = f;
  applyPlannerFilter();
  renderPlannerBoard();
}

function renderPlannerColumn(colId, title, color, orders, tech) {
  const MAX_JOBS = 8;
  const count = orders.length;
  const pct = tech ? Math.min(100, Math.round(count / MAX_JOBS * 100)) : 0;
  const capColor = pct > 90 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#22c55e';

  let html = `<div class="card overflow-hidden" style="border-top: 3px solid ${color}">
    <div class="p-3 border-b border-dark-border planner-drop rounded-t" data-col="${colId}">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-white">${esc(title)}</span>
        <span class="text-xs px-2 py-0.5 rounded-full" style="background:${color}22;color:${color}">${count}</span>
      </div>
      ${tech ? (() => {
        // Calculate total route distance (Nearest Neighbor from home)
        let totalKm = 0;
        if (orders.length > 0) {
          let current = tech.home;
          const remaining = orders.filter(o => o.coords).map(o => ({...o}));
          const visited = [];
          while (remaining.length > 0) {
            let bestIdx = 0, bestDist = Infinity;
            for (let i = 0; i < remaining.length; i++) {
              const d = haversineKm(current[0], current[1], remaining[i].coords[0], remaining[i].coords[1]);
              if (d < bestDist) { bestDist = d; bestIdx = i; }
            }
            totalKm += bestDist;
            current = remaining[bestIdx].coords;
            remaining.splice(bestIdx, 1);
          }
          totalKm += haversineKm(current[0], current[1], tech.home[0], tech.home[1]);
          totalKm = Math.round(totalKm);
        }
        return `<div class="progress-bar mt-1"><div class="progress-fill" style="width:${pct}%;background:${capColor}"></div></div>
      <div class="flex items-center justify-between mt-1">
        <span class="text-xs text-slate-500">${count}/${MAX_JOBS} Aufträge${totalKm > 0 ? ` · 🗺️ ~${totalKm} km` : ''}</span>
        ${count > 0 ? `<button onclick="calcTechRoute(${tech.id})" class="text-xs px-2 py-0.5 bg-blue-600 hover:bg-blue-500 text-white rounded">🗺️ Route</button>` : ''}
      </div>`;
      })() : `<div class="text-xs text-slate-500">${count} übrig</div>`}
    </div>
    <div class="p-2 space-y-2 min-h-[200px] max-h-[600px] overflow-y-auto planner-drop" id="col-${colId}" data-col="${colId}">`;

  let prevCoords = tech ? tech.home : null;
  for (let oi = 0; oi < orders.length; oi++) {
    const o = orders[oi];
    const dist = tech ? o.distances?.[tech.id] : null;
    const ageText = o.age !== null ? (o.age === 0 ? 'heute' : o.age === 1 ? 'gestern' : `${o.age}d`) : '';
    const ageColor = o.age > 14 ? 'text-amber-400' : 'text-slate-500';

    // Distance to previous stop
    let distBetween = null;
    if (tech && prevCoords && o.coords) {
      distBetween = haversineKm(prevCoords[0], prevCoords[1], o.coords[0], o.coords[1]);
      prevCoords = o.coords;
    }

    const regionBadge = o.region === 'nord' ? '<span class="text-xs px-1 rounded bg-red-900/50 text-red-400">N</span>'
      : o.region === 'ost' ? '<span class="text-xs px-1 rounded bg-blue-900/50 text-blue-400">O</span>' : '';

    // Show distance arrow between stops
    if (tech && distBetween !== null && oi > 0) {
      html += `<div class="text-center text-xs text-slate-500 py-0.5">↓ ${distBetween} km</div>`;
    } else if (tech && dist !== null && oi === 0) {
      html += `<div class="text-center text-xs text-slate-500 py-0.5">🏠 → ${dist} km</div>`;
    }

    html += `<div class="p-2 rounded-lg bg-dark-bg border ${o.emergency ? 'border-red-500/50 bg-red-900/10' : 'border-dark-border'} cursor-grab hover:border-blue-400 transition-colors planner-card" data-order-id="${esc(o.id)}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1">
            ${o.emergency ? '<span class="text-red-400 text-xs font-bold">⚡</span>' : ''}
            <span class="text-xs font-medium text-white truncate">${esc(o.renter)}</span>
            ${regionBadge}
          </div>
          <div class="text-xs text-slate-400 truncate">${esc(o.street ? o.street + ', ' : '')}${esc(o.zipcode)} ${esc(o.city)}</div>
          <div class="text-xs text-slate-500 truncate">${esc(o.craft || '')} · 📥 ${o.dateStr ? new Date(o.dateStr).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) : '?'}</div>
          ${o.telephone ? `<div class="text-xs text-blue-400 mt-0.5"><a href="tel:${esc(o.telephone.replace(/[^\\d+]/g,''))}" onclick="event.stopPropagation()">${esc(o.telephone)}</a></div>` : ''}

        </div>
        <div class="text-right flex-shrink-0">
          ${dist !== null ? `<div class="text-xs font-bold ${dist < 20 ? 'text-green-400' : dist < 40 ? 'text-amber-400' : 'text-red-400'}">${dist}km</div>` : ''}
          ${ageText ? `<div class="text-xs ${ageColor}">${ageText}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  html += '</div></div>';
  return html;
}

function initPlannerDragDrop() {
  // Make children non-interactive during drag so drop targets work
  const style = document.getElementById('drag-style') || document.createElement('style');
  style.id = 'drag-style';
  document.head.appendChild(style);

  document.querySelectorAll('.planner-card').forEach(card => {
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', this.dataset.orderId);
      e.dataTransfer.effectAllowed = 'move';
      this.classList.add('dragging');
      // All children of drop zones become transparent to pointer events
      style.textContent = '.planner-drop > *:not(.dragging) { pointer-events: none; } .planner-drop { outline: 2px dashed #60a5fa; outline-offset: -2px; }';
    });
    card.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      style.textContent = '';
      document.querySelectorAll('.planner-drop').forEach(d => { d.style.background = ''; d.style.outline = ''; });
    });
  });

  document.querySelectorAll('.planner-drop').forEach(zone => {
    zone.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.style.background = 'rgba(96,165,250,0.2)';
      this.style.outline = '2px solid #60a5fa';
    });
    zone.addEventListener('dragleave', function(e) {
      if (e.relatedTarget && this.contains(e.relatedTarget)) return;
      this.style.background = '';
      this.style.outline = '2px dashed #60a5fa';
    });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.style.background = '';
      const orderId = e.dataTransfer.getData('text/plain');
      const targetCol = this.dataset.col;
      console.log('[DnD] Drop:', orderId, '→', targetCol);
      if (orderId && targetCol) moveOrderToColumn(orderId, targetCol);
    });
  });

  console.log('[DnD] Init:', document.querySelectorAll('.planner-card').length, 'cards,', document.querySelectorAll('.planner-drop').length, 'zones');
}

function moveOrderToColumn(orderId, targetCol) {
  // Update BOTH planner local state AND shared STATE
  assignOrderToTech(orderId, targetCol); // shared state

  // Sync planner local from shared
  plannerAssignments = { ...STATE.assignments };
  renderPlannerBoard();
}

function autoAssignPlanner() {
  // Smart assignment: Region → Cluster → Nearest → Capacity
  STATE.assignments = { _init: true, unassigned: [] };
  TECHS.forEach(t => { STATE.assignments[t.id] = []; });

  const MAX_JOBS = 8;

  // Region → Tech mapping
  // Nord (Ramiz=4 Hamm, Nico K=1 Gütersloh) | Ost (Adem=3 Sundern, Nico W=2 Sundern)
  const regionTechs = {
    'nord': [4, 1], // Ramiz, Nico K
    'ost': [3, 2],  // Adem, Nico W
  };

  // Step 1: Group by PLZ cluster (same PLZ = same cluster)
  const clusters = {};
  for (const o of plannerFiltered) {
    const key = o.zipcode || 'unknown';
    if (!clusters[key]) clusters[key] = [];
    clusters[key].push(o);
  }

  // Step 2: Sort clusters — emergencies first, then newest, then largest clusters
  const sortedClusters = Object.values(clusters).sort((a, b) => {
    const aEmg = a.some(o => o.emergency) ? 1 : 0;
    const bEmg = b.some(o => o.emergency) ? 1 : 0;
    if (bEmg !== aEmg) return bEmg - aEmg; // emergencies first
    // newest cluster first (by most recent order)
    const aDate = Math.max(...a.map(o => o.dateStr || '').filter(Boolean).map(d => new Date(d).getTime())) || 0;
    const bDate = Math.max(...b.map(o => o.dateStr || '').filter(Boolean).map(d => new Date(d).getTime())) || 0;
    if (bDate !== aDate) return bDate - aDate;
    return b.length - a.length; // larger clusters first
  });

  // Step 3: Assign each cluster to best tech
  for (const cluster of sortedClusters) {
    const sample = cluster[0];
    const region = sample.region?.toLowerCase();

    // Preferred techs for this region
    let preferredTechs = regionTechs[region] || TECHS.map(t => t.id);

    // Find best tech: preferred region + closest + has capacity
    let bestTech = null, bestScore = Infinity;
    for (const tid of [...preferredTechs, ...TECHS.map(t => t.id)]) {
      if (STATE.assignments[tid].length + cluster.length > MAX_JOBS) continue;
      const dist = sample.distances?.[tid] || 999;
      const regionBonus = preferredTechs.includes(tid) ? 0 : 50; // penalty for wrong region
      const score = dist + regionBonus;
      if (score < bestScore) { bestScore = score; bestTech = tid; }
    }

    if (bestTech !== null) {
      // Sort cluster: emergencies first, then by distance to assigned tech
      cluster.sort((a, b) => {
        if (a.emergency && !b.emergency) return -1;
        if (!a.emergency && b.emergency) return 1;
        return (a.distances?.[bestTech] || 999) - (b.distances?.[bestTech] || 999);
      });
      for (const o of cluster) {
        if (STATE.assignments[bestTech].length < MAX_JOBS) {
          STATE.assignments[bestTech].push(o.id);
        } else {
          STATE.assignments.unassigned.push(o.id);
        }
      }
    } else {
      cluster.forEach(o => STATE.assignments.unassigned.push(o.id));
    }
  }

  // Sync to shared + local
  plannerAssignments = { ...STATE.assignments };
  renderPlannerBoard();
}

function resetPlanner() {
  STATE.assignments = { _init: true, unassigned: plannerFiltered.map(o => o.id) };
  TECHS.forEach(t => { STATE.assignments[t.id] = []; });
  plannerAssignments = { ...STATE.assignments };
  renderPlannerBoard();
}

async function calcTechRoute(techId) {
  const tech = TECHS.find(t => t.id === techId);
  if (!tech) return;

  const assignedIds = STATE.assignments[techId] || [];
  const orders = assignedIds.map(id => plannerFiltered.find(o => o.id === id)).filter(o => o && o.coords);
  if (!orders.length) { alert('Keine Aufträge mit Koordinaten zugeordnet.'); return; }

  // Show loading in a modal overlay
  const overlay = document.createElement('div');
  overlay.id = 'route-overlay';
  overlay.className = 'fixed inset-0 bg-black/70 z-50 flex items-center justify-center';
  overlay.innerHTML = `<div class="card p-8 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
    <div class="text-center text-slate-400">
      <div class="route-loading"><div class="spinner"></div><span>Route wird berechnet für ${esc(tech.name)}…</span></div>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  try {
    const orderPayload = orders.map(o => ({
      id: o.id, renter: o.renter, street: o.street, zipcode: o.zipcode,
      city: o.city, telephone: o.telephone, craft: o.craft,
      disturbanceType: o.disturbanceType, emergency: o.emergency, coords: o.coords
    }));

    const res = await fetch('/api/routes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'optimize', techId, orders: orderPayload }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'HTTP ' + res.status }));
      throw new Error(err.error || 'Route-Berechnung fehlgeschlagen');
    }
    const data = await res.json();
    const routeOrders = data.orders || orders; // Nearest Neighbor sortierte Orders

    // Google Maps URL — KEIN optimize:true (TRA-229) → OSRM-Reihenfolge wird respektiert
    // buildGmapsUrl dedupliziert Koordinaten (mehrere Aufträge gleiche PLZ → ein Stop)
    const gmapsUrl = buildGmapsUrl(tech, routeOrders);

    // WhatsApp text
    const whatsText = `🗺️ Route ${tech.name} — ${routeOrders.length} Aufträge, ${data.totalDistance || '?'} km, ca. ${formatDuration(data.totalDuration)}\n\n` +
      routeOrders.map((o, i) => `${i+1}. *${o.renter}*\n   📍 ${o.street}, ${o.zipcode} ${o.city}${o.telephone ? '\n   📞 ' + o.telephone : ''}${o.craft ? '\n   🔧 ' + o.craft : ''}`).join('\n\n') +
      `\n\n📍 Google Maps:\n${gmapsUrl}`;

    // Show result in overlay
    let html = `<div class="flex items-center justify-between mb-4">
      <div>
        <h3 class="text-lg font-bold text-white" style="color:${tech.color}">🗺️ Route: ${esc(tech.name)}</h3>
        <p class="text-sm text-slate-400">${routeOrders.length} Aufträge · ${data.totalDistance || '?'} km · ${formatDuration(data.totalDuration)}</p>
      </div>
      <button onclick="document.getElementById('route-overlay').remove()" class="text-slate-400 hover:text-white text-xl">✕</button>
    </div>
    <div class="flex gap-2 mb-4">
      <a href="${gmapsUrl}" target="_blank" class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white rounded-lg text-sm font-medium">📍 Google Maps</a>
      <button onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(whatsText)}')).then(()=>this.textContent='✅ Kopiert!')" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium">📋 Kopieren</button>
      <a href="https://wa.me/?text=${encodeURIComponent(whatsText)}" target="_blank" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-medium">💬 WhatsApp</a>
    </div>
    <div class="space-y-2">`;

    routeOrders.forEach((o, idx) => {
      html += `<div class="flex items-start gap-3 p-2 rounded-lg bg-dark-bg">
        <div class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white" style="background:${tech.color}">${idx + 1}</div>
        <div class="flex-1">
          <div class="text-sm text-white font-medium">${esc(o.renter)} ${o.emergency ? '<span class="text-red-400">⚡</span>' : ''}</div>
          <div class="text-xs text-slate-400">${esc(o.street)}, ${esc(o.zipcode)} ${esc(o.city)}</div>
          ${o.telephone ? `<div class="text-xs text-blue-400"><a href="tel:${esc(o.telephone.replace(/[^\\d+]/g,''))}">${esc(o.telephone)}</a></div>` : ''}
        </div>
      </div>`;
    });

    html += '</div>';
    overlay.querySelector('.card').innerHTML = html;

  } catch (err) {
    overlay.querySelector('.card').innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-red-400">❌ Fehler</h3>
        <button onclick="document.getElementById('route-overlay').remove()" class="text-slate-400 hover:text-white text-xl">✕</button>
      </div>
      <p class="text-slate-400">${esc(err.message)}</p>
      <p class="text-xs text-slate-500 mt-2">Die Route konnte nicht berechnet werden. Versuche es im Routen-Tab mit manueller Auswahl.</p>`;
  }
}

function exportPlannerRoutes() {
  let text = '📋 TAGESPLAN — Gebr. Schutzeichel\n' + new Date().toLocaleDateString('de-DE', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + '\n\n';

  TECHS.forEach(t => {
    const assigned = (STATE.assignments[t.id] || []).map(id => plannerOrders.find(o => o.id === id)).filter(Boolean);
    if (!assigned.length) return;
    text += `👷 *${t.name}* (${t.city}) — ${assigned.length} Aufträge\n`;
    assigned.forEach((o, i) => {
      text += `${i+1}. ${o.renter}\n   📍 ${o.street}, ${o.zipcode} ${o.city}${o.telephone ? '\n   📞 ' + o.telephone : ''}\n   🔧 ${o.craft || o.disturbanceType || ''}\n`;
    });
    // Google Maps link for this tech's route (TRA-215: echte Adressen statt PLZ-Koordinaten)
    if (assigned.length > 0) {
      const gmUrl = buildGmapsUrl(t, assigned);
      if (gmUrl) text += '   📍 Maps: ' + gmUrl + '\n';
    }
    text += '\n';
  });

  const unassigned = (STATE.assignments.unassigned || []).length;
  if (unassigned > 0) text += `⚠️ ${unassigned} Aufträge nicht zugeordnet\n`;

  navigator.clipboard.writeText(text).then(() => {
    alert('✅ Tagesplan kopiert! Jetzt per WhatsApp an Monteure schicken.');
  });
}

let calendarWeekOffset = 0;

function renderCalendar() {
  const container = document.getElementById('content-calendar');
  if (!STATE.ready) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Erst "Aktualisieren" klicken</div>';
    return;
  }

  // Calculate week dates
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - now.getDay() + 1 + calendarWeekOffset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }

  const today = now.toISOString().split('T')[0];
  const weekLabel = `KW ${getWeekNumber(monday)} — ${monday.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})} bis ${days[6].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}`;

  let html = `
  <div class="flex items-center justify-between mb-4">
    <button onclick="calendarWeekOffset--;renderCalendar()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm">← Vorher</button>
    <div class="text-center">
      <div class="text-white font-bold">${weekLabel}</div>
      ${calendarWeekOffset !== 0 ? `<button onclick="calendarWeekOffset=0;renderCalendar()" class="text-xs text-blue-400 hover:underline">Heute</button>` : ''}
    </div>
    <button onclick="calendarWeekOffset++;renderCalendar()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm">Weiter →</button>
  </div>`;

  // Grid: Rows = Techs, Columns = Days
  html += `<div class="overflow-x-auto"><table class="w-full text-sm border-collapse">
    <thead><tr>
      <th class="p-2 text-left text-slate-400 w-32 border-b border-dark-border">Monteur</th>`;
  
  const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  days.forEach((d, i) => {
    const ds = d.toISOString().split('T')[0];
    const isToday = ds === today;
    const isWeekend = i >= 5;
    html += `<th class="p-2 text-center text-xs border-b border-dark-border ${isToday ? 'bg-blue-900/30 text-blue-400 font-bold' : isWeekend ? 'text-slate-600' : 'text-slate-400'}">
      ${dayNames[i]}<br>${d.getDate()}.${d.getMonth()+1}.</th>`;
  });
  html += '</tr></thead><tbody>';

  // Row per tech
  TECHS.forEach(t => {
    html += `<tr class="border-b border-dark-border/30"><td class="p-2 font-medium text-sm" style="color:${t.color}">${esc(t.name)}<br><span class="text-xs text-slate-500">${esc(t.city)}</span></td>`;
    
    days.forEach((d, i) => {
      const ds = d.toISOString().split('T')[0];
      const isToday = ds === today;
      const isWeekend = i >= 5;
      
      // Get appointments for this tech + day
      const apts = getAppointmentsForDate(ds).filter(a => {
        const tech = getAssignedTech(a.order.id);
        return tech && tech.id === t.id;
      });
      
      // Get follow-ups for this day (regardless of tech)
      const followUps = getFollowUpsForDate(ds).filter(o => {
        const tech = getAssignedTech(o.id);
        return tech && tech.id === t.id;
      });

      const cellBg = isToday ? 'bg-blue-900/20' : isWeekend ? 'bg-slate-900/30' : '';
      
      html += `<td class="p-1 align-top ${cellBg} min-w-[120px]">`;
      
      if (apts.length) {
        apts.forEach(a => {
          html += `<div class="text-xs p-1 mb-1 rounded bg-green-900/40 border border-green-800/50 cursor-pointer" onclick="switchTab('orders');setTimeout(()=>document.getElementById('row-${esc(a.order.id)}')?.scrollIntoView(),200)" title="${esc(a.order.street)}, ${esc(a.order.city)}">
            <span class="text-green-400 font-bold">${a.time || '–'}</span> ${esc(a.order.renter.substring(0,15))}
          </div>`;
        });
      }
      
      if (followUps.length) {
        followUps.forEach(o => {
          html += `<div class="text-xs p-1 mb-1 rounded bg-amber-900/40 border border-amber-800/50">
            🔔 ${esc(o.renter.substring(0,15))}
          </div>`;
        });
      }
      
      if (!apts.length && !followUps.length) {
        html += '<div class="text-xs text-slate-700 text-center py-2">—</div>';
      }
      
      html += '</td>';
    });
    
    html += '</tr>';
  });

  // Row for unassigned appointments
  html += `<tr class="border-b border-dark-border/30"><td class="p-2 text-sm text-slate-500">📥 Ohne Monteur</td>`;
  days.forEach((d) => {
    const ds = d.toISOString().split('T')[0];
    const apts = getAppointmentsForDate(ds).filter(a => !getAssignedTech(a.order.id));
    const followUps = getFollowUpsForDate(ds).filter(o => !getAssignedTech(o.id));
    
    html += `<td class="p-1 align-top min-w-[120px]">`;
    apts.forEach(a => {
      html += `<div class="text-xs p-1 mb-1 rounded bg-slate-700/50 border border-slate-600/50">
        <span class="text-slate-400">${a.time || '–'}</span> ${esc(a.order.renter.substring(0,15))}
      </div>`;
    });
    followUps.forEach(o => {
      html += `<div class="text-xs p-1 mb-1 rounded bg-amber-900/30 border border-amber-800/30">🔔 ${esc(o.renter.substring(0,15))}</div>`;
    });
    if (!apts.length && !followUps.length) html += '<div class="text-xs text-slate-700 text-center py-2">—</div>';
    html += '</td>';
  });
  html += '</tr>';

  html += '</tbody></table></div>';

  // Summary
  const totalApts = STATE.orders.filter(o => getOrderAppointment(o.id)).length;
  const totalFollowUps = STATE.orders.filter(o => getOrderFollowUp(o.id)).length;
  const todayFollowUps = getFollowUpsForDate(today).length;
  
  html += `<div class="mt-4 flex gap-4 text-xs text-slate-500">
    <span>📅 ${totalApts} Termine gesamt</span>
    <span>🔔 ${totalFollowUps} Wiedervorlagen</span>
    ${todayFollowUps > 0 ? `<span class="text-amber-400 font-bold">⚠️ ${todayFollowUps} Wiedervorlagen HEUTE</span>` : ''}
  </div>`;

  container.innerHTML = html;
}

function getWeekNumber(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function renderTechs() {
  const container = document.getElementById('content-techs');
  const techs = DATA.technicians;
  if (!techs) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Monteur-Daten</div>';
    return;
  }

  let html = '';

  function renderRegion(title, region, colorBg, colorFill, emoji) {
    const regionTechs = techs[region] || [];
    if (!regionTechs.length) return '';
    
    const maxJobs = Math.max(...regionTechs.map(t => t.jobs), 1);
    const totalJobs = regionTechs.reduce((s, t) => s + t.jobs, 0);
    const minJobsTech = regionTechs.reduce((min, t) => t.jobs < min.jobs ? t : min, regionTechs[0]);
    const maxJobsTech = regionTechs.reduce((max, t) => t.jobs > max.jobs ? t : max, regionTechs[0]);

    let h = `<div class="card p-5 mb-4">
      <h3 class="text-lg font-bold mb-4">${emoji} ${title} <span class="text-sm font-normal text-slate-400">(${totalJobs} offene Aufträge)</span></h3>
      <div class="space-y-4">`;

    for (const t of regionTechs) {
      const pct = maxJobs > 0 ? Math.round((t.jobs / maxJobs) * 100) : 0;
      const isMin = t.name === minJobsTech.name && regionTechs.length > 1 && minJobsTech.jobs < maxJobsTech.jobs;
      // Show Tagesplan assignments
      const techObj = TECHS.find(tc => tc.name.includes(t.name.split(' ')[0]));
      const assignedCount = techObj ? (STATE.assignments[techObj.id]?.length || 0) : 0;
      h += `<div>
        <div class="flex justify-between items-center mb-1">
          <span class="text-white font-medium">${esc(t.name)} ${isMin ? '⭐' : ''}</span>
          <div class="flex items-center gap-3">
            ${assignedCount > 0 ? `<span class="text-xs px-2 py-0.5 rounded bg-emerald-900/50 text-emerald-400">📋 ${assignedCount} im Tagesplan</span>` : ''}
            <span class="text-sm ${isMin ? 'text-green-400' : 'text-slate-400'}">${t.jobs} offene Jobs</span>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${colorFill}" style="width: ${pct}%"></div>
        </div>
      </div>`;
    }

    // Recommendation
    if (minJobsTech.jobs < maxJobsTech.jobs && regionTechs.length > 1) {
      const diff = maxJobsTech.jobs - minJobsTech.jobs;
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-slate-300">
        💡 <strong>${esc(minJobsTech.name)}</strong> hat ${diff} Job${diff !== 1 ? 's' : ''} weniger als ${esc(maxJobsTech.name)} → nächsten ${title.split(' ')[1]}-Auftrag an <strong>${esc(minJobsTech.name)}</strong>
      </div>`;
    } else if (regionTechs.length > 1) {
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-green-400">
        ✅ Gleichmäßig verteilt
      </div>`;
    }

    h += '</div></div>';
    return h;
  }

  html += renderRegion('Region Nord', 'nord', 'bg-red-900/30', 'bg-red-500', '🔴');
  html += renderRegion('Region Ost', 'ost', 'bg-blue-900/30', 'bg-blue-500', '🔵');

  container.innerHTML = html;
}

function logout() {

async function checkAuth() {
  const token = localStorage.getItem('josh_token');
  if (!token) { showLogin(); return false; }
  try {
    const r = await fetch('/api/auth', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    if (!d.valid) { showLogin(); return false; }
    return true;
  } catch { showLogin(); return false; }
}

function showLogin() {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a">
      <div style="background:#1e293b;padding:2rem;border-radius:1rem;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5)">

        <p id="loginErr" style="color:#f87171;margin-top:0.75rem;display:none;font-size:13px">Falsches Passwort</p>
      </div>
    </div>`;
}

async function doLogin() {
  const pw = document.getElementById('loginPw').value;
  const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
  if (r.ok) {
    const {token} = await r.json();
    localStorage.setItem('josh_token', token);
    location.reload();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
