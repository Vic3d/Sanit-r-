let EMAIL_DATA = null;
let EMAIL_LOADING = false;
let SPAM_OPEN = false;

async function loadEmails(force = false) {
  if (EMAIL_LOADING) return;
  EMAIL_LOADING = true;
  const panel = document.getElementById('content-email');
  panel.innerHTML = `<div class="flex items-center justify-center gap-3 py-16 text-slate-400">
    <div class="w-5 h-5 border-2 border-slate-600 border-t-blue-400 rounded-full animate-spin"></div>
    <span>Postfächer werden geladen…</span></div>`;

  try {
    const url = `/api/email${force ? '?refresh=1' : ''}`;
    const r = await fetch(url);
    EMAIL_DATA = await r.json();
    // Unread-Badge auf Tab setzen
    const badge = document.getElementById('email-badge');
    if (EMAIL_DATA.unread > 0) {
      badge.textContent = EMAIL_DATA.unread;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
    renderEmail();
  } catch (e) {
    document.getElementById('content-email').innerHTML =
      `<div class="card p-4 text-red-400">⚠️ Fehler: ${e.message}</div>`;
  } finally {
    EMAIL_LOADING = false;
  }
}

function renderEmail() {
  const panel = document.getElementById('content-email');
  if (!EMAIL_DATA) {
    panel.innerHTML = `<div class="text-slate-400 text-center py-8">Noch nicht geladen.</div>`;
    return;
  }

  const d = EMAIL_DATA;
  const cacheInfo = d.cached
    ? `<span class="text-xs text-slate-500">Cache (${d.cacheAge}s alt)</span>`
    : `<span class="text-xs text-green-600">Live</span>`;

  const cats = [
    { key: 'DRINGEND', label: '🚨 Dringend',   color: 'border-red-700 bg-red-950/40',    badge: 'bg-red-700',    alwaysOpen: true  },
    { key: 'AUFTRAG',  label: '📦 Auftrag',     color: 'border-blue-700 bg-blue-950/30',  badge: 'bg-blue-700',   alwaysOpen: true  },
    { key: 'ANFRAGE',  label: '💬 Anfrage',     color: 'border-yellow-700 bg-yellow-950/30', badge: 'bg-yellow-700', alwaysOpen: true },
    { key: 'SONSTIGE', label: '📄 Sonstige',    color: 'border-slate-700 bg-slate-800/30', badge: 'bg-slate-600',  alwaysOpen: true  },
    { key: 'SPAM',     label: '🗑️ Spam',        color: 'border-slate-800 bg-slate-900/20', badge: 'bg-slate-700',  alwaysOpen: false },
  ];

  let html = `
    <div class="flex items-center justify-between mb-4 gap-2 flex-wrap">
      <div>
        <h2 class="text-lg font-bold text-white">📧 Postfach</h2>
        <div class="text-sm text-slate-400 mt-0.5">${d.total} E-Mails · ${d.unread} ungelesen · ${cacheInfo}</div>
      </div>
      <div class="flex gap-2">
        <button onclick="showEmailSummary()" class="px-3 py-1.5 bg-blue-700 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition-colors">
          📋 Tagesreport
        </button>
        <button onclick="loadEmails(true)" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium transition-colors">
          🔄 Aktualisieren
        </button>
      </div>
    </div>
    <div id="email-summary-box" class="hidden mb-4"></div>`;

  if (d.errors && d.errors.length > 0) {
    html += `<div class="card p-3 mb-4 border border-orange-800 bg-orange-950/30 text-orange-300 text-sm">
      ⚠️ ${d.errors.join(' · ')}</div>`;
  }

  for (const cat of cats) {
    const emails = d.byCategory[cat.key] || [];
    const isOpen = cat.alwaysOpen || SPAM_OPEN;
    const unread = emails.filter(e => e.isUnread).length;

    html += `<div class="card mb-3 border ${cat.color} overflow-hidden">
      <div class="flex items-center gap-3 p-3 cursor-pointer select-none"
           onclick="toggleEmailCat('${cat.key}')">
        <span class="font-semibold text-white text-sm">${cat.label}</span>
        <span class="text-xs px-2 py-0.5 rounded-full text-white ${cat.badge}">${emails.length}</span>
        ${unread > 0 ? `<span class="text-xs px-2 py-0.5 rounded-full bg-white/10 text-white">${unread} ungelesen</span>` : ''}
        <span class="ml-auto text-slate-500 text-sm transition-transform ${isOpen ? 'rotate-0' : '-rotate-90'}"
              id="chevron-${cat.key}">▼</span>
      </div>
      <div id="emailcat-${cat.key}" class="${isOpen ? '' : 'hidden'}">
        ${emails.length === 0
          ? `<div class="px-4 pb-3 text-slate-500 text-sm">Keine E-Mails</div>`
          : emails.map(e => renderEmailRow(e)).join('')}
      </div>
    </div>`;
  }

  panel.innerHTML = html;
}

function renderEmailRow(e) {
  const unreadDot = e.isUnread
    ? `<span class="w-2 h-2 rounded-full bg-blue-400 flex-shrink-0 mt-1.5"></span>`
    : `<span class="w-2 h-2 rounded-full flex-shrink-0 mt-1.5"></span>`;
  const accountBadge = `<span class="text-xs px-1.5 py-0.5 rounded bg-slate-700 text-slate-400">${e.account}</span>`;
  const link = e.owaLink
    ? `<a href="${e.owaLink}" target="_blank" rel="noopener"
          class="text-xs px-2 py-1 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded transition-colors">
          Öffnen ↗</a>`
    : '';

  return `<div class="flex items-start gap-3 px-4 py-2.5 border-t border-slate-800 hover:bg-slate-800/40 transition-colors">
    ${unreadDot}
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-sm ${e.isUnread ? 'font-semibold text-white' : 'text-slate-300'} truncate max-w-xs">
          ${esc(e.sender || '—')}
        </span>
        ${accountBadge}
      </div>
      <div class="text-sm text-slate-400 truncate mt-0.5">${esc(e.subject || e.raw || '—')}</div>
      <div class="text-xs text-slate-600 mt-1">${e.date}</div>
    </div>
    <div class="flex-shrink-0">${link}</div>
  </div>`;
}

function fmtEmailDate(isoDate) {
  if (!isoDate) return '';
  const todayStr = new Date().toISOString().slice(0, 10);
  const yesterStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  const time = isoDate.slice(11, 16);
  if (isoDate.startsWith(todayStr))     return `heute ${time}`;
  if (isoDate.startsWith(yesterStr))    return `gestern ${time}`;
  return isoDate.slice(8,10) + '.' + isoDate.slice(5,7) + '.';
}

function cleanSubject(s) {
  if (!s) return '';
  // Prefixe entfernen: AW:, WG:, FW:, Re:
  return s.replace(/^(AW|WG|FW|RE|FWD):\s*/i, '').replace(/\.\.\.$/, '').trim();
}

function cleanDisplayName(display, sender) {
  if (!display || display === '—') return '';
  // E-Mail-Adressen komplett durch leeren String ersetzen (wird dann weggelassen)
  if (display.includes('@')) return '';
  return display.replace(/\.\.\.$/, '').trim();
}

function showEmailSummary() {
  if (!EMAIL_DATA) return;
  const box = document.getElementById('email-summary-box');
  const d = EMAIL_DATA;
  const today = new Date().toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});

  // AUFTRAG aufteilen: Neue Aufträge vs. Offene Punkte
  const auftraege = d.byCategory.AUFTRAG || [];
  const neueAuftraege = auftraege.filter(e =>
    !/(^|\s)(AW|WG|FW|RE|FWD):/i.test(e.subject || '') &&
    !/(^|\s)(AW|WG|FW|RE|FWD):/i.test(e.sender || '')
  );
  const offen = auftraege.filter(e =>
    /(^|\s)(AW|WG|FW|RE|FWD):/i.test(e.subject || '') ||
    /(^|\s)(AW|WG|FW|RE|FWD):/i.test(e.sender || '')
  );

  const fmtLine = (e) => {
    const name = cleanDisplayName(e.display, e.sender);
    const subj = cleanSubject(e.subject || '');
    const when = fmtEmailDate(e.isoDate);
    const namePart = name ? `${name} – ` : '';
    return `– ${namePart}"${subj}" (${when})`;
  };

  const fmtSection = (emails) =>
    emails.length === 0 ? '– keine' : emails.map(fmtLine).join('\n');

  const dringend = d.byCategory.DRINGEND || [];
  const anfragen = d.byCategory.ANFRAGE || [];

  const text =
`📧 E-Mail Update ${today}

🚨 Dringend:
${dringend.length ? dringend.map(fmtLine).join('\n') : '– nichts'}

📦 Neue Aufträge:
${fmtSection(neueAuftraege)}

📋 Offen / Braucht Rückmeldung:
${fmtSection(offen)}

💬 Kundenanfragen:
${anfragen.length ? anfragen.map(fmtLine).join('\n') : '– keine'}`;

  box.classList.remove('hidden');
  box.innerHTML = `
    <div class="card border border-blue-800 bg-blue-950/30 p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-semibold text-blue-300">📋 Tagesreport für Josh</span>
        <div class="flex gap-2">
          <button onclick="copyEmailSummary()" class="px-2 py-1 bg-blue-700 hover:bg-blue-600 text-white rounded text-xs">📋 Kopieren</button>
          <button onclick="document.getElementById('email-summary-box').classList.add('hidden')" class="px-2 py-1 bg-slate-700 text-slate-300 rounded text-xs">✕</button>
        </div>
      </div>
      <pre id="email-summary-text" class="text-sm text-slate-200 whitespace-pre-wrap leading-relaxed bg-slate-900/60 rounded p-3 select-all">${esc(text)}</pre>
    </div>`;
  window._emailSummaryText = text;
}

function copyEmailSummary() {
  if (!window._emailSummaryText) return;
  navigator.clipboard.writeText(window._emailSummaryText).then(() => {
    const btn = document.querySelector('#email-summary-box button');
    if (btn) { const orig = btn.textContent; btn.textContent = '✅ Kopiert!'; setTimeout(() => btn.textContent = orig, 2000); }
  });
}

function toggleEmailCat(key) {
  const el = document.getElementById('emailcat-' + key);
  const chev = document.getElementById('chevron-' + key);
  if (!el) return;
  const open = el.classList.toggle('hidden');
  if (chev) chev.style.transform = open ? 'rotate(-90deg)' : 'rotate(0deg)';
  if (key === 'SPAM') SPAM_OPEN = !open;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

      <button onclick="closeContactModal()" class="flex-1 px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-sm transition-colors">Schließen</button>
    </div>
  </div>
</div>

<script>
function showContactModal(orderId) {
  const allRaw = [
    ...(DATA.orders?.needContact || []),
    ...(DATA.orders?.contacted || []),
    ...(DATA.orders?.all || [])
  ];
  const o = allRaw.find(x => String(x.ID?.SourceId || x.SourceId || '') === String(orderId));
  if (!o) { alert('Auftrag nicht gefunden: ' + orderId); return; }

  document.getElementById('cModal-id').textContent = 'Auftrag ' + orderId;
  document.getElementById('cModal-name').textContent = o.Renter || '—';
  document.getElementById('cModal-addr').textContent = [o.Street, o.Zipcode, o.City].filter(Boolean).join(', ');

  // Build phones
  const phonesEl = document.getElementById('cModal-phones');
  phonesEl.innerHTML = '';

  function addPhoneRow(label, num, extra) {
    if (!num || num === '-') return;
    const clean = num.replace(/[^\d+]/g, '');
    const row = document.createElement('div');
    row.className = 'flex items-center gap-3 bg-slate-800 rounded-lg px-3 py-2';
    row.innerHTML = `
      <div class="flex-1">
        <div class="text-xs text-slate-500 mb-0.5">${label}</div>
        <a href="tel:${clean}" class="text-blue-400 hover:text-blue-300 font-medium text-sm">${num}</a>
        ${extra ? `<div class="text-xs text-slate-500 mt-0.5">${extra}</div>` : ''}
      </div>
      <button onclick="navigator.clipboard.writeText('${num.trim()}').then(()=>this.textContent='✅').catch(()=>{})" class="text-xs px-2 py-1 bg-slate-700 hover:bg-slate-600 rounded text-slate-300 transition-colors">📋</button>
    `;
    phonesEl.appendChild(row);
  }

  addPhoneRow('Hauptnummer (Mieterin)', o.Telephone);
  if (o.Telephone2) addPhoneRow('Zusatznummer', o.Telephone2);

  // Extract extra phones from CustomerContactPerson
  const cpText = o.CustomerContactPerson || '';
  const extraPhones = (cpText.match(/(?:0[\d\s/\-]{6,15}|\+?49[\d\s/\-]{6,15})/g) || [])
    .map(p => p.trim())
    .filter(p => p.replace(/[\s\-/]/g,'').length >= 7);
  if (extraPhones.length) {
    extraPhones.forEach(p => {
      // Try to extract name context
      const idx = cpText.indexOf(p.slice(0,6));
      const before = idx > 0 ? cpText.substring(Math.max(0, idx-30), idx).replace(/T:|M:|tel:/gi,'').trim() : '';
      addPhoneRow('Kontaktperson', p, before || null);
    });
  }

  if (phonesEl.children.length === 0) {
    phonesEl.innerHTML = '<div class="text-slate-500 text-sm">Keine Telefonnummern vorhanden</div>';
  }

  // CustomerContactPerson full text
  const cpEl = document.getElementById('cModal-contact');
  if (cpText) {
    cpEl.classList.remove('hidden');
    cpEl.innerHTML = '<span class="text-slate-500 font-medium">Ansprechpartner: </span>' + cpText;
  } else {
    cpEl.classList.add('hidden');
  }

  // Remarks
  const remEl = document.getElementById('cModal-remarks');
  if (o.Remarks) {
    remEl.classList.remove('hidden');
    remEl.innerHTML = '<span class="font-medium">📝 Hinweis: </span>' + o.Remarks;
  } else {
    remEl.classList.add('hidden');
  }

  const modal = document.getElementById('contactModal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function closeContactModal() {
  const modal = document.getElementById('contactModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeContactModal(); });
</script>

</body>
</html>
