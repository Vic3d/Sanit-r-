function renderPlannerColumn(colId, title, color, orders, tech) {
  const MAX_JOBS = 8;
  const count = orders.length;
  const pct = tech ? Math.min(100, Math.round(count / MAX_JOBS * 100)) : 0;
  const capColor = pct > 90 ? '#ef4444' : pct > 60 ? '#f59e0b' : '#22c55e';

  let html = `<div class="card overflow-hidden planner-col" data-col="${colId}" style="border-top: 3px solid ${color}">
    <div class="p-3 border-b border-dark-border">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-bold text-white">${esc(title)}</span>
        <span class="text-xs px-2 py-0.5 rounded-full" style="background:${color}22;color:${color}">${count}</span>
      </div>
      ${tech ? (() => {
        // Calculate total route distance (Nearest Neighbor from home)
        let totalKm = 0;
        if (orders.length > 0) {
          let current = tech.home;
          const remaining = orders.filter(o => o.coords).map(o => ({...o}));
          const visited = [];
          while (remaining.length > 0) {
            let bestIdx = 0, bestDist = Infinity;
            for (let i = 0; i < remaining.length; i++) {
              const d = haversineKm(current[0], current[1], remaining[i].coords[0], remaining[i].coords[1]);
              if (d < bestDist) { bestDist = d; bestIdx = i; }
            }
            totalKm += bestDist;
            current = remaining[bestIdx].coords;
            remaining.splice(bestIdx, 1);
          }
          totalKm += haversineKm(current[0], current[1], tech.home[0], tech.home[1]);
          totalKm = Math.round(totalKm);
        }
        return `<div class="progress-bar mt-1"><div class="progress-fill" style="width:${pct}%;background:${capColor}"></div></div>
      <div class="flex items-center justify-between mt-1">
        <span class="text-xs text-slate-500">${count}/${MAX_JOBS} Aufträge${totalKm > 0 ? ` · 🗺️ ~${totalKm} km` : ''}</span>
        ${count > 0 ? `<button onclick="calcTechRoute(${tech.id})" class="text-xs px-2 py-0.5 bg-blue-600 hover:bg-blue-500 text-white rounded">🗺️ Route</button>` : ''}
      </div>`;
      })() : `<div class="text-xs text-slate-500">${count} übrig</div>`}
    </div>
    <div class="p-2 space-y-2 min-h-[200px] max-h-[600px] overflow-y-auto planner-col" id="col-${colId}" data-col="${colId}">`;

  let prevCoords = tech ? tech.home : null;
  for (let oi = 0; oi < orders.length; oi++) {
    const o = orders[oi];
    const dist = tech ? o.distances?.[tech.id] : null;
    const ageText = o.age !== null ? (o.age === 0 ? 'heute' : o.age === 1 ? 'gestern' : `${o.age}d`) : '';
    const ageColor = o.age > 14 ? 'text-amber-400' : 'text-slate-500';

    // Distance to previous stop
    let distBetween = null;
    if (tech && prevCoords && o.coords) {
      distBetween = haversineKm(prevCoords[0], prevCoords[1], o.coords[0], o.coords[1]);
      prevCoords = o.coords;
    }

    const regionBadge = o.region === 'nord' ? '<span class="text-xs px-1 rounded bg-red-900/50 text-red-400">N</span>'
      : o.region === 'ost' ? '<span class="text-xs px-1 rounded bg-blue-900/50 text-blue-400">O</span>' : '';

    // Show distance arrow between stops
    if (tech && distBetween !== null && oi > 0) {
      html += `<div class="text-center text-xs text-slate-500 py-0.5">↓ ${distBetween} km</div>`;
    } else if (tech && dist !== null && oi === 0) {
      html += `<div class="text-center text-xs text-slate-500 py-0.5">🏠 → ${dist} km</div>`;
    }

    html += `<div class="p-2 rounded-lg bg-dark-bg border ${o.emergency ? 'border-red-500/50 bg-red-900/10' : 'border-dark-border'} cursor-grab hover:border-slate-400 transition-colors" draggable="true" data-order-id="${esc(o.id)}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1">
            ${o.emergency ? '<span class="text-red-400 text-xs font-bold">⚡</span>' : ''}
            <span class="text-xs font-medium text-white truncate">${esc(o.renter)}</span>
            ${regionBadge}
          </div>
          <div class="text-xs text-slate-400 truncate">${esc(o.street ? o.street + ', ' : '')}${esc(o.zipcode)} ${esc(o.city)}</div>
          <div class="text-xs text-slate-500 truncate">${esc(o.craft || '')} · 📥 ${o.dateStr ? new Date(o.dateStr).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) : '?'}</div>
          ${o.telephone ? `<div class="text-xs text-blue-400 mt-0.5"><a href="tel:${esc(o.telephone.replace(/[^\\d+]/g,''))}" onclick="event.stopPropagation()">${esc(o.telephone)}</a></div>` : ''}
          <select onchange="if(this.value)moveOrderToColumn('${esc(o.id)}',this.value)" class="mt-1 w-full text-xs bg-dark-bg border border-dark-border rounded px-1 py-0.5 text-slate-400">
            <option value="">→ Zuordnen…</option>
            <option value="unassigned">📥 Offen</option>
            ${TECHS.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}
          </select>
        </div>
        <div class="text-right flex-shrink-0">
          ${dist !== null ? `<div class="text-xs font-bold ${dist < 20 ? 'text-green-400' : dist < 40 ? 'text-amber-400' : 'text-red-400'}">${dist}km</div>` : ''}
          ${ageText ? `<div class="text-xs ${ageColor}">${ageText}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  html += '</div></div>';
  return html;
}

function initPlannerDragDrop() {
  // Make the entire column card a drop zone (not just the inner div)
  document.querySelectorAll('.planner-col').forEach(col => {
    const colId = col.dataset.col;
    if (!colId) return;
    col.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; col.style.outline = '2px dashed #60a5fa'; col.style.outlineOffset = '-2px'; });
    col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.style.outline = ''; });
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.style.outline = '';
      const orderId = e.dataTransfer.getData('text/plain');
      if (orderId && colId) moveOrderToColumn(orderId, colId);
    });
  });

  document.querySelectorAll('[draggable="true"]').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', card.dataset.orderId);
      e.dataTransfer.effectAllowed = 'move';
      card.style.opacity = '0.4';
      // Highlight all drop zones
      document.querySelectorAll('.planner-col').forEach(c => c.style.border = '2px dashed #475569');
    });
    card.addEventListener('dragend', e => {
      card.style.opacity = '1';
      document.querySelectorAll('.planner-col').forEach(c => { c.style.border = ''; c.style.outline = ''; });
    });
  });
}

function moveOrderToColumn(orderId, targetCol) {
  // Update BOTH planner local state AND shared STATE
  assignOrderToTech(orderId, targetCol); // shared state

  // Sync planner local from shared
  plannerAssignments = { ...STATE.assignments };
  renderPlannerBoard();
}

function autoAssignPlanner() {
  // Smart assignment: Region → Cluster → Nearest → Capacity
  STATE.assignments = { _init: true, unassigned: [] };
  TECHS.forEach(t => { STATE.assignments[t.id] = []; });

  const MAX_JOBS = 8;

  // Region → Tech mapping
  // Nord (Ramiz=4 Hamm, Nico K=1 Gütersloh) | Ost (Adem=3 Sundern, Nico W=2 Sundern)
  const regionTechs = {
    'nord': [4, 1], // Ramiz, Nico K
    'ost': [3, 2],  // Adem, Nico W
  };

  // Step 1: Group by PLZ cluster (same PLZ = same cluster)
  const clusters = {};
  for (const o of plannerFiltered) {
    const key = o.zipcode || 'unknown';
    if (!clusters[key]) clusters[key] = [];
    clusters[key].push(o);
  }

  // Step 2: Sort clusters — emergencies first, then newest, then largest clusters
  const sortedClusters = Object.values(clusters).sort((a, b) => {
    const aEmg = a.some(o => o.emergency) ? 1 : 0;
    const bEmg = b.some(o => o.emergency) ? 1 : 0;
    if (bEmg !== aEmg) return bEmg - aEmg; // emergencies first
    // newest cluster first (by most recent order)
    const aDate = Math.max(...a.map(o => o.dateStr || '').filter(Boolean).map(d => new Date(d).getTime())) || 0;
    const bDate = Math.max(...b.map(o => o.dateStr || '').filter(Boolean).map(d => new Date(d).getTime())) || 0;
    if (bDate !== aDate) return bDate - aDate;
    return b.length - a.length; // larger clusters first
  });

  // Step 3: Assign each cluster to best tech
  for (const cluster of sortedClusters) {
    const sample = cluster[0];
    const region = sample.region?.toLowerCase();

    // Preferred techs for this region
    let preferredTechs = regionTechs[region] || TECHS.map(t => t.id);

    // Find best tech: preferred region + closest + has capacity
    let bestTech = null, bestScore = Infinity;
    for (const tid of [...preferredTechs, ...TECHS.map(t => t.id)]) {
      if (STATE.assignments[tid].length + cluster.length > MAX_JOBS) continue;
      const dist = sample.distances?.[tid] || 999;
      const regionBonus = preferredTechs.includes(tid) ? 0 : 50; // penalty for wrong region
      const score = dist + regionBonus;
      if (score < bestScore) { bestScore = score; bestTech = tid; }
    }

    if (bestTech !== null) {
      // Sort cluster: emergencies first, then by distance to assigned tech
      cluster.sort((a, b) => {
        if (a.emergency && !b.emergency) return -1;
        if (!a.emergency && b.emergency) return 1;
        return (a.distances?.[bestTech] || 999) - (b.distances?.[bestTech] || 999);
      });
      for (const o of cluster) {
        if (STATE.assignments[bestTech].length < MAX_JOBS) {
          STATE.assignments[bestTech].push(o.id);
        } else {
          STATE.assignments.unassigned.push(o.id);
        }
      }
    } else {
      cluster.forEach(o => STATE.assignments.unassigned.push(o.id));
    }
  }

  // Sync to shared + local
  plannerAssignments = { ...STATE.assignments };
  renderPlannerBoard();
}

function resetPlanner() {
  STATE.assignments = { _init: true, unassigned: plannerFiltered.map(o => o.id) };
  TECHS.forEach(t => { STATE.assignments[t.id] = []; });
  plannerAssignments = { ...STATE.assignments };
  renderPlannerBoard();
}

async function calcTechRoute(techId) {
  const tech = TECHS.find(t => t.id === techId);
  if (!tech) return;

  const assignedIds = STATE.assignments[techId] || [];
  const orders = assignedIds.map(id => plannerFiltered.find(o => o.id === id)).filter(o => o && o.coords);
  if (!orders.length) { alert('Keine Aufträge mit Koordinaten zugeordnet.'); return; }

  // Show loading in a modal overlay
  const overlay = document.createElement('div');
  overlay.id = 'route-overlay';
  overlay.className = 'fixed inset-0 bg-black/70 z-50 flex items-center justify-center';
  overlay.innerHTML = `<div class="card p-8 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
    <div class="text-center text-slate-400">
      <div class="route-loading"><div class="spinner"></div><span>Route wird berechnet für ${esc(tech.name)}…</span></div>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  try {
    const orderPayload = orders.map(o => ({
      id: o.id, renter: o.renter, street: o.street, zipcode: o.zipcode,
      city: o.city, telephone: o.telephone, craft: o.craft,
      disturbanceType: o.disturbanceType, emergency: o.emergency, coords: o.coords
    }));

    const res = await fetch('/api/routes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'optimize', techId, orders: orderPayload }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'HTTP ' + res.status }));
      throw new Error(err.error || 'Route-Berechnung fehlgeschlagen');
    }
    const data = await res.json();
    const routeOrders = data.orders || orders; // Nearest Neighbor sortierte Orders

    // Google Maps URL
    const origin = `${tech.home[1]},${tech.home[0]}`;
    const waypoints = routeOrders.slice(0, -1).map(o => `${o.coords[1]},${o.coords[0]}`).join('|');
    const last = routeOrders[routeOrders.length - 1];
    const destination = `${last.coords[1]},${last.coords[0]}`;
    let gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
    if (waypoints) gmapsUrl += `&waypoints=${waypoints}`;

    // WhatsApp text
    const whatsText = `🗺️ Route ${tech.name} — ${routeOrders.length} Aufträge, ${data.totalDistance || '?'} km, ca. ${formatDuration(data.totalDuration)}\n\n` +
      routeOrders.map((o, i) => `${i+1}. *${o.renter}*\n   📍 ${o.street}, ${o.zipcode} ${o.city}${o.telephone ? '\n   📞 ' + o.telephone : ''}${o.craft ? '\n   🔧 ' + o.craft : ''}`).join('\n\n') +
      `\n\n📍 Google Maps:\n${gmapsUrl}`;

    // Show result in overlay
    let html = `<div class="flex items-center justify-between mb-4">
      <div>
        <h3 class="text-lg font-bold text-white" style="color:${tech.color}">🗺️ Route: ${esc(tech.name)}</h3>
        <p class="text-sm text-slate-400">${routeOrders.length} Aufträge · ${data.totalDistance || '?'} km · ${formatDuration(data.totalDuration)}</p>
      </div>
      <button onclick="document.getElementById('route-overlay').remove()" class="text-slate-400 hover:text-white text-xl">✕</button>
    </div>
    <div class="flex gap-2 mb-4">
      <a href="${gmapsUrl}" target="_blank" class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white rounded-lg text-sm font-medium">📍 Google Maps</a>
      <button onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(whatsText)}')).then(()=>this.textContent='✅ Kopiert!')" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-medium">📋 Kopieren</button>
      <a href="https://wa.me/?text=${encodeURIComponent(whatsText)}" target="_blank" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white rounded-lg text-sm font-medium">💬 WhatsApp</a>
    </div>
    <div class="space-y-2">`;

    routeOrders.forEach((o, idx) => {
      html += `<div class="flex items-start gap-3 p-2 rounded-lg bg-dark-bg">
        <div class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white" style="background:${tech.color}">${idx + 1}</div>
        <div class="flex-1">
          <div class="text-sm text-white font-medium">${esc(o.renter)} ${o.emergency ? '<span class="text-red-400">⚡</span>' : ''}</div>
          <div class="text-xs text-slate-400">${esc(o.street)}, ${esc(o.zipcode)} ${esc(o.city)}</div>
          ${o.telephone ? `<div class="text-xs text-blue-400"><a href="tel:${esc(o.telephone.replace(/[^\\d+]/g,''))}">${esc(o.telephone)}</a></div>` : ''}
        </div>
      </div>`;
    });

    html += '</div>';
    overlay.querySelector('.card').innerHTML = html;

  } catch (err) {
    overlay.querySelector('.card').innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-red-400">❌ Fehler</h3>
        <button onclick="document.getElementById('route-overlay').remove()" class="text-slate-400 hover:text-white text-xl">✕</button>
      </div>
      <p class="text-slate-400">${esc(err.message)}</p>
      <p class="text-xs text-slate-500 mt-2">Die Route konnte nicht berechnet werden. Versuche es im Routen-Tab mit manueller Auswahl.</p>`;
  }
}

function exportPlannerRoutes() {
  let text = '📋 TAGESPLAN — Gebr. Schutzeichel\n' + new Date().toLocaleDateString('de-DE', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + '\n\n';

  TECHS.forEach(t => {
    const assigned = (STATE.assignments[t.id] || []).map(id => plannerOrders.find(o => o.id === id)).filter(Boolean);
    if (!assigned.length) return;
    text += `👷 *${t.name}* (${t.city}) — ${assigned.length} Aufträge\n`;
    assigned.forEach((o, i) => {
      text += `${i+1}. ${o.renter}\n   📍 ${o.street}, ${o.zipcode} ${o.city}${o.telephone ? '\n   📞 ' + o.telephone : ''}\n   🔧 ${o.craft || o.disturbanceType || ''}\n`;
    });
    // Google Maps link for this tech's route
    if (assigned.length > 0 && assigned[0].coords) {
      const origin = `${t.home[1]},${t.home[0]}`;
      const waypoints = assigned.slice(0, -1).filter(o => o.coords).map(o => `${o.coords[1]},${o.coords[0]}`).join('|');
      const last = assigned.filter(o => o.coords).pop();
      if (last) {
        const dest = `${last.coords[1]},${last.coords[0]}`;
        let gmUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving`;
        if (waypoints) gmUrl += `&waypoints=${waypoints}`;
        text += `   📍 Maps: ${gmUrl}\n`;
      }
    }
    text += '\n';
  });

  const unassigned = (STATE.assignments.unassigned || []).length;
  if (unassigned > 0) text += `⚠️ ${unassigned} Aufträge nicht zugeordnet\n`;

  navigator.clipboard.writeText(text).then(() => {
    alert('✅ Tagesplan kopiert! Jetzt per WhatsApp an Monteure schicken.');
  });
}

// TAB: KALENDER (Wochenansicht)
// ═══════════════════════════════════════════════════════════════
let calendarWeekOffset = 0;

function renderCalendar() {
  const container = document.getElementById('content-calendar');
  if (!STATE.ready) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Erst "Aktualisieren" klicken</div>';
    return;
  }

  // Calculate week dates
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - now.getDay() + 1 + calendarWeekOffset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }

  const today = now.toISOString().split('T')[0];
  const weekLabel = `KW ${getWeekNumber(monday)} — ${monday.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})} bis ${days[6].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}`;

  let html = `
  <div class="flex items-center justify-between mb-4">
    <button onclick="calendarWeekOffset--;renderCalendar()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm">← Vorher</button>
    <div class="text-center">
      <div class="text-white font-bold">${weekLabel}</div>
      ${calendarWeekOffset !== 0 ? `<button onclick="calendarWeekOffset=0;renderCalendar()" class="text-xs text-blue-400 hover:underline">Heute</button>` : ''}
    </div>
    <button onclick="calendarWeekOffset++;renderCalendar()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm">Weiter →</button>
  </div>`;

  // Grid: Rows = Techs, Columns = Days
  html += `<div class="overflow-x-auto"><table class="w-full text-sm border-collapse">
    <thead><tr>
      <th class="p-2 text-left text-slate-400 w-32 border-b border-dark-border">Monteur</th>`;
  
  const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  days.forEach((d, i) => {
    const ds = d.toISOString().split('T')[0];
    const isToday = ds === today;
    const isWeekend = i >= 5;
    html += `<th class="p-2 text-center text-xs border-b border-dark-border ${isToday ? 'bg-blue-900/30 text-blue-400 font-bold' : isWeekend ? 'text-slate-600' : 'text-slate-400'}">
      ${dayNames[i]}<br>${d.getDate()}.${d.getMonth()+1}.</th>`;
  });
  html += '</tr></thead><tbody>';

  // Row per tech
  TECHS.forEach(t => {
    html += `<tr class="border-b border-dark-border/30"><td class="p-2 font-medium text-sm" style="color:${t.color}">${esc(t.name)}<br><span class="text-xs text-slate-500">${esc(t.city)}</span></td>`;
    
    days.forEach((d, i) => {
      const ds = d.toISOString().split('T')[0];
      const isToday = ds === today;
      const isWeekend = i >= 5;
      
      // Get appointments for this tech + day
      const apts = getAppointmentsForDate(ds).filter(a => {
        const tech = getAssignedTech(a.order.id);
        return tech && tech.id === t.id;
      });
      
      // Get follow-ups for this day (regardless of tech)
      const followUps = getFollowUpsForDate(ds).filter(o => {
        const tech = getAssignedTech(o.id);
        return tech && tech.id === t.id;
      });

      const cellBg = isToday ? 'bg-blue-900/20' : isWeekend ? 'bg-slate-900/30' : '';
      
      html += `<td class="p-1 align-top ${cellBg} min-w-[120px]">`;
      
      if (apts.length) {
        apts.forEach(a => {
          html += `<div class="text-xs p-1 mb-1 rounded bg-green-900/40 border border-green-800/50 cursor-pointer" onclick="switchTab('orders');setTimeout(()=>document.getElementById('row-${esc(a.order.id)}')?.scrollIntoView(),200)" title="${esc(a.order.street)}, ${esc(a.order.city)}">
            <span class="text-green-400 font-bold">${a.time || '–'}</span> ${esc(a.order.renter.substring(0,15))}
          </div>`;
        });
      }
      
      if (followUps.length) {
        followUps.forEach(o => {
          html += `<div class="text-xs p-1 mb-1 rounded bg-amber-900/40 border border-amber-800/50">
            🔔 ${esc(o.renter.substring(0,15))}
          </div>`;
        });
      }
      
      if (!apts.length && !followUps.length) {
        html += '<div class="text-xs text-slate-700 text-center py-2">—</div>';
      }
      
      html += '</td>';
    });
    
    html += '</tr>';
  });

  // Row for unassigned appointments
  html += `<tr class="border-b border-dark-border/30"><td class="p-2 text-sm text-slate-500">📥 Ohne Monteur</td>`;
  days.forEach((d) => {
    const ds = d.toISOString().split('T')[0];
    const apts = getAppointmentsForDate(ds).filter(a => !getAssignedTech(a.order.id));
    const followUps = getFollowUpsForDate(ds).filter(o => !getAssignedTech(o.id));
    
    html += `<td class="p-1 align-top min-w-[120px]">`;
    apts.forEach(a => {
      html += `<div class="text-xs p-1 mb-1 rounded bg-slate-700/50 border border-slate-600/50">
        <span class="text-slate-400">${a.time || '–'}</span> ${esc(a.order.renter.substring(0,15))}
      </div>`;
    });
    followUps.forEach(o => {
      html += `<div class="text-xs p-1 mb-1 rounded bg-amber-900/30 border border-amber-800/30">🔔 ${esc(o.renter.substring(0,15))}</div>`;
    });
    if (!apts.length && !followUps.length) html += '<div class="text-xs text-slate-700 text-center py-2">—</div>';
    html += '</td>';
  });
  html += '</tr>';

  html += '</tbody></table></div>';

  // Summary
  const totalApts = STATE.orders.filter(o => getOrderAppointment(o.id)).length;
  const totalFollowUps = STATE.orders.filter(o => getOrderFollowUp(o.id)).length;
  const todayFollowUps = getFollowUpsForDate(today).length;
  
  html += `<div class="mt-4 flex gap-4 text-xs text-slate-500">
    <span>📅 ${totalApts} Termine gesamt</span>
    <span>🔔 ${totalFollowUps} Wiedervorlagen</span>
    ${todayFollowUps > 0 ? `<span class="text-amber-400 font-bold">⚠️ ${todayFollowUps} Wiedervorlagen HEUTE</span>` : ''}
  </div>`;

  container.innerHTML = html;
}

function getWeekNumber(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function renderTechs() {
  const container = document.getElementById('content-techs');
  const techs = DATA.technicians;
  if (!techs) {
    container.innerHTML = '<div class="card p-8 text-center text-slate-400">Keine Monteur-Daten</div>';
    return;
  }

  let html = '';

  function renderRegion(title, region, colorBg, colorFill, emoji) {
    const regionTechs = techs[region] || [];
    if (!regionTechs.length) return '';
    
    const maxJobs = Math.max(...regionTechs.map(t => t.jobs), 1);
    const totalJobs = regionTechs.reduce((s, t) => s + t.jobs, 0);
    const minJobsTech = regionTechs.reduce((min, t) => t.jobs < min.jobs ? t : min, regionTechs[0]);
    const maxJobsTech = regionTechs.reduce((max, t) => t.jobs > max.jobs ? t : max, regionTechs[0]);

    let h = `<div class="card p-5 mb-4">
      <h3 class="text-lg font-bold mb-4">${emoji} ${title} <span class="text-sm font-normal text-slate-400">(${totalJobs} offene Aufträge)</span></h3>
      <div class="space-y-4">`;

    for (const t of regionTechs) {
      const pct = maxJobs > 0 ? Math.round((t.jobs / maxJobs) * 100) : 0;
      const isMin = t.name === minJobsTech.name && regionTechs.length > 1 && minJobsTech.jobs < maxJobsTech.jobs;
      // Show Tagesplan assignments
      const techObj = TECHS.find(tc => tc.name.includes(t.name.split(' ')[0]));
      const assignedCount = techObj ? (STATE.assignments[techObj.id]?.length || 0) : 0;
      h += `<div>
        <div class="flex justify-between items-center mb-1">
          <span class="text-white font-medium">${esc(t.name)} ${isMin ? '⭐' : ''}</span>
          <div class="flex items-center gap-3">
            ${assignedCount > 0 ? `<span class="text-xs px-2 py-0.5 rounded bg-emerald-900/50 text-emerald-400">📋 ${assignedCount} im Tagesplan</span>` : ''}
            <span class="text-sm ${isMin ? 'text-green-400' : 'text-slate-400'}">${t.jobs} offene Jobs</span>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${colorFill}" style="width: ${pct}%"></div>
        </div>
      </div>`;
    }

    // Recommendation
    if (minJobsTech.jobs < maxJobsTech.jobs && regionTechs.length > 1) {
      const diff = maxJobsTech.jobs - minJobsTech.jobs;
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-slate-300">
        💡 <strong>${esc(minJobsTech.name)}</strong> hat ${diff} Job${diff !== 1 ? 's' : ''} weniger als ${esc(maxJobsTech.name)} → nächsten ${title.split(' ')[1]}-Auftrag an <strong>${esc(minJobsTech.name)}</strong>
      </div>`;
    } else if (regionTechs.length > 1) {
      h += `<div class="mt-3 p-3 rounded-lg bg-slate-800/50 text-sm text-green-400">
        ✅ Gleichmäßig verteilt
      </div>`;
    }

    h += '</div></div>';
    return h;
  }

  html += renderRegion('Region Nord', 'nord', 'bg-red-900/30', 'bg-red-500', '🔴');
  html += renderRegion('Region Ost', 'ost', 'bg-blue-900/30', 'bg-blue-500', '🔵');

  container.innerHTML = html;
}
